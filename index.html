<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEBPERA · Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4f8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
            line-height: 1.5;
        }

        /* Minimal abstract background */
        .bg-shape {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.03) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(34, 197, 94, 0.03) 0%, transparent 35%);
            z-index: 0;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            position: relative;
            z-index: 10;
        }

        /* White card with soft shadow */
        .login-card {
            background: white;
            border-radius: 40px;
            padding: 40px 32px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.02);
            backdrop-filter: blur(2px);
        }

        /* Logo / robot area */
        .logo-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: #f1f5f9;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            box-shadow: 0 10px 15px -8px rgba(0,0,0,0.1);
        }

        .logo-icon span {
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.05));
        }

        .brand {
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(145deg, #1e293b, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .brand-sub {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* error */
        .error-msg {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            padding: 14px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            margin-bottom: 24px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .error-msg.show {
            display: block;
        }

        /* form */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: #94a3b8;
            transition: color 0.2s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #0f172a;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px #dbeafe;
            background: white;
        }

        .input-wrapper input:focus ~ .icon {
            color: #2563eb;
        }

        .input-wrapper input::placeholder {
            color: #94a3b8;
            font-weight: 300;
        }

        /* button */
        .login-btn {
            width: 100%;
            padding: 18px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 15px 25px -12px #2563eb80;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -12px #1d4ed8;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            background: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        .login-btn.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* footer */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .login-footer .hrb-name {
            color: #2563eb;
            font-weight: 600;
        }

        /* connection status */
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: white;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #334155;
            box-shadow: 0 6px 16px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
            z-index: 100;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 0 3px #dcfce7;
        }

        /* blackout */
        .blackout {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(6px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .blackout.active {
            display: flex;
        }

        .blackout-msg {
            font-size: 1.4rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .blackout-sub {
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="bg-shape"></div>

    <!-- Connection Status -->
    <div class="connection-status">
        <div class="connection-dot"></div>
        <span>Online</span>
    </div>

    <!-- Blackout -->
    <div class="blackout" id="blackout">
        <div class="blackout-msg">📡 No Internet</div>
        <div class="blackout-sub">Please connect to continue</div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-header">
                <div class="logo-icon">
                    <span>⚡</span>
                </div>
                <div class="brand">WEBPERA</div>
                <div class="brand-sub">Intelligent metering</div>
            </div>

            <div class="error-msg" id="errorMsg"></div>

            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                        <span class="icon">📧</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                        <span class="icon">🔐</span>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Sign in</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="login-footer">
                <span>Powered by <span class="hrb-name">WEBPERA</span></span>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (same as before) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/net-guard.js"></script>
    <script>
        // Firebase init (copied from your original)
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const hasCredits = await checkCredits(user.uid);
                if (hasCredits) {
                    window.location.href = 'app.html';
                } else {
                    auth.signOut();
                    showError('Subscription Expired');
                }
            }
        });

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            
            hideError();
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                const hasCredits = await checkCredits(user.uid);

                if (hasCredits) {
                    window.location.href = 'app.html';
                } else {
                    await auth.signOut();
                    showError('Subscription Expired');
                }

            } catch (error) {
                console.error('Login error:', error);
                
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    showError('Invalid email or password');
                } else if (error.code === 'auth/too-many-requests') {
                    showError('Too many attempts. Try later.');
                } else if (error.code === 'auth/network-request-failed') {
                    showError('Network error. Check internet.');
                } else {
                    showError('Login failed. Try again.');
                }
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        async function checkCredits(uid) {
            try {
                const doc = await db.collection('users').doc(uid).get();
                if (doc.exists) {
                    return doc.data().credits > 0;
                }
                return false;
            } catch (error) {
                return false;
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = '❌ ' + msg;
            errorDiv.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('show');
        }

        // Connection status
        window.addEventListener('online', () => {
            document.querySelector('.connection-dot').style.background = '#22c55e';
            document.querySelector('.connection-status span').textContent = 'Online';
        });

        window.addEventListener('offline', () => {
            document.querySelector('.connection-dot').style.background = '#ef4444';
            document.querySelector('.connection-status span').textContent = 'Offline';
        });

        initNetGuard();
    </script>
</body>
</html>
