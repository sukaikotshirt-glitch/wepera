<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEBPERA · USB Meter Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            line-height: 1.5;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 32px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px -6px rgba(0,0,0,0.05);
            margin-bottom: 24px;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #2563eb, #0f2b5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .credits-box .total {
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2563eb;
        }

        .credits-box .total.critical {
            background: #fef2f2;
            color: #b91c1c;
        }

        .credits-box .daily {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
        }

        .logout-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .usb-status-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
        }

        .usb-status-card.connected {
            box-shadow: 0 10px 25px -8px #22c55e40;
        }

        .usb-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .usb-status-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .usb-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 0 3px #fee2e2;
        }

        .usb-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 0 3px #dcfce7;
        }

        .usb-status-text {
            font-weight: 600;
            font-size: 1rem;
        }

        .usb-status-sub {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .usb-signal {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px -12px rgba(0,0,0,0.1);
        }

        .card h3 {
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .half {
            flex: 1;
        }

        .button-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn-usb {
            flex: 1;
            padding: 18px;
            border-radius: 30px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-size: 1rem;
        }

        .btn-usb.connected {
            background: #22c55e;
        }

        .btn-server {
            flex: 1;
            padding: 18px;
            border-radius: 30px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #e2e8f0;
            color: #64748b;
            font-size: 1rem;
        }

        .btn-server.ready {
            background: #2563eb;
            color: white;
        }

        .btn-server.running {
            background: #ef4444;
            color: white;
        }

        .server-status {
            background: #f8fafc;
            border-radius: 40px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
        }

        .server-status.running .status-text {
            color: #22c55e;
            font-weight: 600;
        }

        .log-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            margin-top: 12px;
        }

        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .log-entry.success { color: #16a34a; }
        .log-entry.warning { color: #ea580c; }
        .log-entry.error { color: #dc2626; }
        .log-entry.info { color: #2563eb; }
        .log-entry.credit { color: #16a34a; font-weight: 600; }
        .log-entry .time { color: #94a3b8; margin-right: 12px; }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-small {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 24px;
            border-radius: 60px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            font-weight: 500;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="toast" id="toast">💳 Credit Used</div>

    <div class="container">
        <div class="app-header">
            <div class="logo">WEBPERA</div>
            <div class="user-info">
                <div class="credits-box">
                    <div class="total" id="creditsDisplay">Credits: --</div>
                    <div class="daily" id="dailyDisplay">Today: --/--</div>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="usb-status-card" id="usbStatusCard">
            <div class="usb-status-row">
                <div class="usb-status-left">
                    <div class="usb-dot" id="usbDot"></div>
                    <div>
                        <div class="usb-status-text" id="usbStatusText">No Device Connected</div>
                        <div class="usb-status-sub" id="usbStatusSub">Click CONNECT USB to start</div>
                    </div>
                </div>
                <div class="usb-status-right">
                    <div class="usb-signal" id="usbSignal">—</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>⚙️ Meter Configuration</h3>
            
            <div class="form-group">
                <label>Meter Profile</label>
                <select id="meterSelect">
                    <option value="avon">Avon Single Phase</option>
                    <option value="avon2">Avon 2 (New Model)</option>
                    <option value="genus">Genus Three Phase</option>
                    <option value="mt">MT Three Phase</option>
                    <option value="hpl">HPL Single Phase</option>
                </select>
            </div>

            <div class="form-group">
                <label>Serial No (Name Plate)</label>
                <input type="text" id="val_serial" placeholder="e.g. 9023456" value="3472454">
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>Current kWh</label>
                    <input type="number" id="val_kwh" value="1234.5" step="0.1">
                </div>
                <div class="form-group half">
                    <label>Current kVAh</label>
                    <input type="number" id="val_kvah" value="1300.0" step="0.1">
                </div>
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>MD (kW)</label>
                    <input type="number" id="val_md_kw" value="1.2" step="0.1">
                </div>
                <div class="form-group half">
                    <label>MD (kVA)</label>
                    <input type="number" id="val_md_kva" value="1.8" step="0.1">
                </div>
            </div>
        </div>

        <div class="button-row">
            <button id="btnUsb" class="btn-usb">🔌 CONNECT USB</button>
            <button id="btnServer" class="btn-server">▶️ START SERVER</button>
        </div>

        <div class="server-status" id="serverStatus">
            <div class="status-text" id="serverStatusText">Server Stopped</div>
        </div>

        <div class="card">
            <div class="log-header">
                <h3>📄 Status Log</h3>
                <button class="btn-small" id="clearLogsBtn">Clear</button>
            </div>
            <div id="logBox" class="log-box">
                <div class="log-entry info"><span class="time">[--:--]</span> System Ready. Click CONNECT USB.</div>
            </div>
        </div>
    </div>
	<!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>

    <!-- Net Guard -->
    <script src="js/net-guard.js"></script>

    <!-- Meter Logic Files -->
    <script src="meters/avon.js"></script>
    <script src="meters/avon2.js"></script>
    <script src="meters/mt_profile.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/logic_avon2.js"></script>
    <script src="js/logic_mt.js"></script>
    <script src="meters/hpl.js"></script>
    <script src="js/logic_hpl.js"></script>
    <script src="meters/genus.js"></script>
    <script src="js/logic_genus.js"></script>

    <!-- Auth Handler -->
    <script src="js/auth.js"></script>
    <script>
        // ============================================
        // JS CODE - WORKS WITH YOUR EXISTING ANDROID CODE
        // NO CHANGES NEEDED IN ANDROID
        // ============================================

        // DOM Elements
        const elements = {
            creditsDisplay: document.getElementById('creditsDisplay'),
            dailyDisplay: document.getElementById('dailyDisplay'),
            usbStatusCard: document.getElementById('usbStatusCard'),
            usbDot: document.getElementById('usbDot'),
            usbStatusText: document.getElementById('usbStatusText'),
            usbStatusSub: document.getElementById('usbStatusSub'),
            usbSignal: document.getElementById('usbSignal'),
            btnUsb: document.getElementById('btnUsb'),
            btnServer: document.getElementById('btnServer'),
            serverStatus: document.getElementById('serverStatus'),
            serverStatusText: document.getElementById('serverStatusText'),
            logBox: document.getElementById('logBox'),
            toast: document.getElementById('toast'),
            meterSelect: document.getElementById('meterSelect'),
            valSerial: document.getElementById('val_serial'),
            valKwh: document.getElementById('val_kwh'),
            valKvah: document.getElementById('val_kvah'),
            valMdKw: document.getElementById('val_md_kw'),
            valMdKva: document.getElementById('val_md_kva'),
            logoutBtn: document.getElementById('logoutBtn'),
            clearLogsBtn: document.getElementById('clearLogsBtn')
        };

        // App State
        let isUsbConnected = false;
        let isServerRunning = false;
        let isConnecting = false;
        let lastDataTime = 0;
        let healthInterval = null;
        let connectionStartTime = 0;

        // User Credits (Mock - Replace with Firebase)
        let userCredits = 100;
        let dailyUsed = 0;
        let dailyLimit = 40;

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function log(msg, type = 'info') {
            const box = elements.logBox;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
            while (box.children.length > 100) box.removeChild(box.firstChild);
        }

        function showToast(message, type = 'success') {
            const toast = elements.toast;
            toast.textContent = message;
            toast.classList.remove('error');
            if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateCreditsDisplay() {
            elements.creditsDisplay.textContent = `Credits: ${userCredits}`;
            if (userCredits <= 10) elements.creditsDisplay.classList.add('critical');
            elements.dailyDisplay.textContent = `Today: ${dailyUsed}/${dailyLimit}`;
        }

        function canUseCredit() {
            if (userCredits <= 0) return { allowed: false, reason: "Subscription Expired" };
            if (dailyUsed >= dailyLimit) return { allowed: false, reason: "Daily limit reached!" };
            return { allowed: true, reason: "" };
        }

        function deductCredit() {
            const check = canUseCredit();
            if (!check.allowed) {
                showToast(check.reason, 'error');
                log(`❌ ${check.reason}`, 'error');
                if (check.reason === "Subscription Expired") {
                    setTimeout(() => logout(), 2000);
                }
                return false;
            }

            userCredits--;
            dailyUsed++;
            updateCreditsDisplay();
            showToast(`💳 Credit Used | Remaining: ${userCredits}`);
            log(`💳 Credit deducted! Remaining: ${userCredits} | Today: ${dailyUsed}/${dailyLimit}`, 'credit');
            return true;
        }

        // ============================================
        // USB STATUS UI
        // ============================================
        function updateUsbStatus(status) {
            const card = elements.usbStatusCard;
            const dot = elements.usbDot;
            const btn = elements.btnUsb;
            const text = elements.usbStatusText;
            const sub = elements.usbStatusSub;
            const signal = elements.usbSignal;

            card.classList.remove('connected');
            dot.classList.remove('connected');
            btn.classList.remove('connected');

            if (status === 'connected') {
                card.classList.add('connected');
                dot.classList.add('connected');
                btn.classList.add('connected');
                btn.textContent = '🔌 DISCONNECT USB';
                text.textContent = '✅ USB Connected';
                sub.textContent = 'Ready for meter reading';
                signal.textContent = '● Active';
                signal.style.color = '#00e676';
                
            } else if (status === 'connecting') {
                btn.textContent = '⏳ CONNECTING...';
                text.textContent = '🔌 Connecting...';
                sub.textContent = 'Please wait';
                signal.textContent = '';
            } else {
                btn.textContent = '🔌 CONNECT USB';
                text.textContent = '❌ No Device Connected';
                sub.textContent = 'Click CONNECT USB to start';
                signal.textContent = '';
            }
        }

        function updateServerButton() {
            const btn = elements.btnServer;
            btn.classList.remove('ready', 'running');

            if (!isUsbConnected) {
                btn.textContent = '▶️ START SERVER';
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
            } else if (isServerRunning) {
                btn.textContent = '⏹️ STOP SERVER';
                btn.classList.add('running');
                btn.disabled = false;
                btn.style.opacity = '1';
            } else {
                btn.textContent = '▶️ START SERVER';
                btn.classList.add('ready');
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        function updateServerStatus() {
            if (isServerRunning) {
                elements.serverStatus.classList.add('running');
                elements.serverStatusText.textContent = '🟢 Server Running - Ready for Reading';
            } else {
                elements.serverStatus.classList.remove('running');
                elements.serverStatusText.textContent = 'Server Stopped';
            }
        }

        // ============================================
        // METER DATA PROCESSING
        // ============================================
        function processMeterData(hexData) {
            if (!hexData || hexData.length === 0) return null;
            
            lastDataTime = Date.now();
            
            // Log different types of requests
            if (hexData.includes("935A64")) {
                log('🔄 Connection request received', 'info');
            } else if (hexData.includes("A041034110") || hexData.includes("A044034110")) {
                log('🔐 Authentication in progress', 'info');
            } else if (hexData.includes("0100010800")) {
                log('⏰ Reading meter clock...', 'info');
            } else if (hexData.includes("0100600100")) {
                log('🔢 Reading serial number...', 'info');
            } else if (hexData.includes("0201020204")) {
                log('📊 Reading billing data...', 'info');
                deductCredit();
            } else if (hexData.includes("0100010700") || hexData.includes("0100030700")) {
                log('⚡ Reading instant values...', 'info');
            } else if (hexData.includes("5356A2")) {
                log('✅ Reading complete!', 'success');
            }
            
            // Build response based on request type
            const serial = elements.valSerial.value || "3472454";
            const kwh = (parseFloat(elements.valKwh.value) || 1234.5).toFixed(1);
            const kvah = (parseFloat(elements.valKvah.value) || 1300.0).toFixed(1);
            const mdKw = (parseFloat(elements.valMdKw.value) || 1.2).toFixed(1);
            const mdKva = (parseFloat(elements.valMdKva.value) || 1.8).toFixed(1);
            
            const now = new Date();
            const dateTime = now.getFullYear().toString() +
                (now.getMonth() + 1).toString().padStart(2, '0') +
                now.getDate().toString().padStart(2, '0') +
                now.getHours().toString().padStart(2, '0') +
                now.getMinutes().toString().padStart(2, '0') +
                now.getSeconds().toString().padStart(2, '0');
            
            let response = null;
            
            if (hexData.includes("0100010800")) {
                response = "A0" + hexData.substring(2, 6) + dateTime + "FF";
            } else if (hexData.includes("0100600100")) {
                response = "A0" + hexData.substring(2, 6) + serial.padStart(14, '0') + "FF";
            } else if (hexData.includes("0201020204")) {
                const kwhVal = Math.floor(parseFloat(kwh) * 10).toString().padStart(8, '0');
                const kvahVal = Math.floor(parseFloat(kvah) * 10).toString().padStart(8, '0');
                response = "A0" + hexData.substring(2, 6) + "0000" + kwhVal + kvahVal + "FF";
            } else if (hexData.includes("0100010700")) {
                const kwVal = Math.floor(parseFloat(mdKw) * 100).toString().padStart(6, '0');
                const kvaVal = Math.floor(parseFloat(mdKva) * 100).toString().padStart(6, '0');
                response = "A0" + hexData.substring(2, 6) + kwVal + kvaVal + "000000FF";
            } else if (hexData.length >= 10) {
                response = "A0" + hexData.substring(2, 6) + "00FF";
            }
            
            return response;
        }

        // ============================================
        // CONNECTION HANDLERS
        // ============================================
        function connectUsb() {
            if (isUsbConnected) {
                disconnectUsb();
                return;
            }
            
            if (isConnecting) {
                log('⏳ Connection already in progress...', 'warning');
                return;
            }
            
            isConnecting = true;
            connectionStartTime = Date.now();
            updateUsbStatus('connecting');
            log('🔌 Connecting to USB device...', 'info');
            
            try {
                if (window.Android && window.Android.connectUSB) {
                    window.Android.connectUSB();
                } else {
                    log('❌ Android bridge not available!', 'error');
                    showToast('Android bridge not available', 'error');
                    updateUsbStatus('disconnected');
                    isConnecting = false;
                }
            } catch(e) {
                log(`❌ Connection error: ${e.message}`, 'error');
                updateUsbStatus('disconnected');
                isConnecting = false;
            }
            
            // Timeout after 10 seconds
            setTimeout(() => {
                if (isConnecting && !isUsbConnected) {
                    log('⚠️ Connection timeout. Make sure USB device is connected.', 'warning');
                    updateUsbStatus('disconnected');
                    isConnecting = false;
                }
            }, 10000);
        }

        function disconnectUsb() {
            if (isServerRunning) {
                stopServer();
            }
            
            if (healthInterval) {
                clearInterval(healthInterval);
                healthInterval = null;
            }
            
            try {
                if (window.Android && window.Android.disconnect) {
                    window.Android.disconnect();
                }
            } catch(e) {}
            
            isUsbConnected = false;
            isConnecting = false;
            updateUsbStatus('disconnected');
            updateServerButton();
            log('🔌 USB Disconnected', 'warning');
        }

        // ============================================
        // SERVER FUNCTIONS
        // ============================================
        function startServer() {
            if (!isUsbConnected) {
                log('⚠️ Please connect USB first!', 'warning');
                showToast('Connect USB first!', 'error');
                return;
            }
            
            if (userCredits <= 0) {
                log('❌ No credits remaining!', 'error');
                showToast('Please recharge credits', 'error');
                return;
            }
            
            isServerRunning = true;
            updateServerButton();
            updateServerStatus();
            log('▶️ Server Started - Ready for meter reading', 'success');
            showToast('Server Started!');
            
            // Start health check
            lastDataTime = Date.now();
            healthInterval = setInterval(() => {
                if (isServerRunning && isUsbConnected) {
                    const timeSince = Date.now() - lastDataTime;
                    const signal = elements.usbSignal;
                    if (timeSince < 5000) {
                        signal.textContent = '● Active';
                        signal.style.color = '#00e676';
                    } else if (timeSince < 15000) {
                        signal.textContent = '● Idle';
                        signal.style.color = '#888';
                    } else {
                        signal.textContent = '● Waiting';
                        signal.style.color = '#ff9800';
                    }
                }
            }, 2000);
        }

        function stopServer() {
            isServerRunning = false;
            if (healthInterval) {
                clearInterval(healthInterval);
                healthInterval = null;
            }
            updateServerButton();
            updateServerStatus();
            log('⏹️ Server Stopped', 'warning');
        }

        function logout() {
            disconnectUsb();
            stopServer();
            log('👋 Logging out...', 'info');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }

        // ============================================
        // ANDROID BRIDGE CALLBACKS
        // YOUR EXISTING ANDROID CODE CALLS THESE
        // ============================================
        
        window.onConnected = function() {
            const connectionTime = (Date.now() - connectionStartTime) / 1000;
            log(`✅ USB Connected Successfully! (${connectionTime.toFixed(1)} sec)`, 'success');
            isUsbConnected = true;
            isConnecting = false;
            updateUsbStatus('connected');
            updateServerButton();
            showToast('USB Connected!');
        };
        
        window.onUsbAttached = function() {
            log('🔌 USB device attached', 'info');
            if (!isUsbConnected && !isConnecting) {
                setTimeout(() => connectUsb(), 500);
            }
        };
        
        window.onUsbDetached = function() {
            log('⚠️ USB device detached!', 'error');
            showToast('USB Disconnected!', 'error');
            disconnectUsb();
        };
        
        window.onUsbError = function(error) {
            log(`❌ USB Error: ${error}`, 'error');
            isConnecting = false;
            updateUsbStatus('disconnected');
            showToast(`USB Error: ${error}`, 'error');
        };
        
        window.onDataReceived = function(hexData) {
            if (!isServerRunning) return;
            
            const reply = processMeterData(hexData);
            if (reply && window.Android && window.Android.sendData) {
                try {
                    window.Android.sendData(reply);
                } catch(e) {
                    log(`❌ Send error: ${e.message}`, 'error');
                }
            }
        };
        
        window.onLog = function(message) {
            if (message && !message.includes('RX:') && !message.includes('TX:') && !message.includes('hex')) {
                if (message.includes('Permission')) {
                    log(message, 'warning');
                } else {
                    log(message, 'info');
                }
            }
        };

        // ============================================
        // EVENT LISTENERS
        // ============================================
        elements.btnUsb.addEventListener('click', connectUsb);
        
        elements.btnServer.addEventListener('click', () => {
            if (isServerRunning) {
                stopServer();
            } else {
                startServer();
            }
        });
        
        elements.logoutBtn.addEventListener('click', logout);
        
        elements.clearLogsBtn.addEventListener('click', () => {
            elements.logBox.innerHTML = '';
            log('📜 Logs cleared', 'info');
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            updateCreditsDisplay();
            updateUsbStatus('disconnected');
            updateServerStatus();
            log('🚀 WEBPERA Ready!', 'success');
            log('📱 Click CONNECT USB to start meter reading', 'info');
            
            if (typeof window.Android !== 'undefined') {
                log('✅ Android Bridge detected', 'success');
            } else {
                log('⚠️ Android Bridge not detected', 'warning');
            }
        }
        
        init();
    </script>
</body>
</html>
