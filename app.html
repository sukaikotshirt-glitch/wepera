<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEBPERA · USB Meter Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            line-height: 1.5;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 32px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px -6px rgba(0,0,0,0.05);
            margin-bottom: 24px;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #2563eb, #0f2b5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .credits-box .total {
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2563eb;
        }

        .credits-box .total.critical {
            background: #fef2f2;
            color: #b91c1c;
        }

        .credits-box .daily {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
        }

        .logout-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
        }

        .usb-status-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
        }

        .usb-status-card.connected {
            box-shadow: 0 10px 25px -8px #22c55e40;
        }

        .usb-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .usb-status-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .usb-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 0 3px #fee2e2;
        }

        .usb-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 0 3px #dcfce7;
        }

        .usb-status-text {
            font-weight: 600;
            font-size: 1rem;
        }

        .usb-status-sub {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .usb-signal {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px -12px rgba(0,0,0,0.1);
        }

        .card h3 {
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .half {
            flex: 1;
        }

        .device-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .device-btn {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .device-btn.active {
            border-color: #2563eb;
            background: #eef2ff;
            color: #2563eb;
        }

        .device-btn.ch340.active {
            border-color: #22c55e;
            background: #dcfce7;
            color: #16a34a;
        }

        .device-btn.ft232r.active {
            border-color: #2563eb;
            background: #eef2ff;
            color: #2563eb;
        }

        .button-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn-usb {
            flex: 1;
            padding: 18px;
            border-radius: 30px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }

        .btn-usb.connected {
            background: #22c55e;
        }

        .btn-server {
            flex: 1;
            padding: 18px;
            border-radius: 30px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #e2e8f0;
            color: #64748b;
        }

        .btn-server.ready {
            background: #2563eb;
            color: white;
        }

        .btn-server.running {
            background: #ef4444;
            color: white;
        }

        .server-status {
            background: #f8fafc;
            border-radius: 40px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
        }

        .server-status.running .status-text {
            color: #22c55e;
            font-weight: 600;
        }

        .log-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            margin-top: 12px;
        }

        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .log-entry.success { color: #16a34a; }
        .log-entry.warning { color: #ea580c; }
        .log-entry.error { color: #dc2626; }
        .log-entry.info { color: #2563eb; }
        .log-entry .time { color: #94a3b8; margin-right: 12px; }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-small {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 24px;
            border-radius: 60px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="toast" id="toast">💳 Credit Used</div>

    <div class="container">
        <div class="app-header">
            <div class="logo">WEBPERA</div>
            <div class="user-info">
                <div class="credits-box">
                    <div class="total" id="creditsDisplay">Credits: --</div>
                    <div class="daily" id="dailyDisplay">Today: --/--</div>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="usb-status-card" id="usbStatusCard">
            <div class="usb-status-row">
                <div class="usb-status-left">
                    <div class="usb-dot" id="usbDot"></div>
                    <div>
                        <div class="usb-status-text" id="usbStatusText">No Device Selected</div>
                        <div class="usb-status-sub" id="usbStatusSub">Select CH340 or FT232R below</div>
                    </div>
                </div>
                <div class="usb-status-right">
                    <div class="usb-signal" id="usbSignal">—</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🔌 Select USB Device</h3>
            <div class="device-selector">
                <button class="device-btn ch340" id="selectCH340">CH340 / CH341</button>
                <button class="device-btn ft232r" id="selectFT232R">FT232R (FTDI)</button>
            </div>
        </div>

        <div class="card">
            <h3>⚙️ Meter Configuration</h3>
            
            <div class="form-group">
                <label>Meter Profile</label>
                <select id="meterSelect">
                    <option value="avon">Avon Single Phase</option>
                    <option value="avon2">Avon 2 (New Model)</option>
                    <option value="genus">Genus Three Phase</option>
                    <option value="mt">MT Three Phase</option>
                    <option value="hpl">HPL Single Phase</option>
                </select>
            </div>

            <div class="form-group">
                <label>Serial No (Name Plate)</label>
                <input type="text" id="val_serial" placeholder="e.g. 9023456">
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>Current kWh</label>
                    <input type="number" id="val_kwh" value="1234.5" step="0.1">
                </div>
                <div class="form-group half">
                    <label>Current kVAh</label>
                    <input type="number" id="val_kvah" value="1300.0" step="0.1">
                </div>
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>MD (kW)</label>
                    <input type="number" id="val_md_kw" value="1.2" step="0.1">
                </div>
                <div class="form-group half">
                    <label>MD (kVA)</label>
                    <input type="number" id="val_md_kva" value="1.8" step="0.1">
                </div>
            </div>
        </div>

        <div class="button-row">
            <button id="btnUsb" class="btn-usb">🔌 CONNECT USB</button>
            <button id="btnServer" class="btn-server">▶️ START SERVER</button>
        </div>

        <div class="server-status" id="serverStatus">
            <div class="status-text" id="serverStatusText">Server Stopped</div>
        </div>

        <div class="card">
            <div class="log-header">
                <h3>📄 Status Log</h3>
                <button class="btn-small" id="clearLogsBtn">Clear</button>
            </div>
            <div id="logBox" class="log-box">
                <div class="log-entry info"><span class="time">[--:--]</span> Select CH340 or FT232R and click CONNECT</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // COMPLETE CODE FOR BOTH CH340 AND FT232R
        // BOTH WORK WITH ANDROID BRIDGE
        // ============================================

        // DOM Elements
        const elements = {
            creditsDisplay: document.getElementById('creditsDisplay'),
            dailyDisplay: document.getElementById('dailyDisplay'),
            usbStatusCard: document.getElementById('usbStatusCard'),
            usbDot: document.getElementById('usbDot'),
            usbStatusText: document.getElementById('usbStatusText'),
            usbStatusSub: document.getElementById('usbStatusSub'),
            usbSignal: document.getElementById('usbSignal'),
            btnUsb: document.getElementById('btnUsb'),
            btnServer: document.getElementById('btnServer'),
            serverStatus: document.getElementById('serverStatus'),
            serverStatusText: document.getElementById('serverStatusText'),
            logBox: document.getElementById('logBox'),
            toast: document.getElementById('toast'),
            meterSelect: document.getElementById('meterSelect'),
            valSerial: document.getElementById('val_serial'),
            valKwh: document.getElementById('val_kwh'),
            valKvah: document.getElementById('val_kvah'),
            valMdKw: document.getElementById('val_md_kw'),
            valMdKva: document.getElementById('val_md_kva'),
            selectCH340: document.getElementById('selectCH340'),
            selectFT232R: document.getElementById('selectFT232R'),
            logoutBtn: document.getElementById('logoutBtn'),
            clearLogsBtn: document.getElementById('clearLogsBtn')
        };

        // App State
        let selectedDevice = null; // 'ch340' or 'ft232r'
        let isUsbConnected = false;
        let isServerRunning = false;
        let isConnecting = false;
        let lastDataTime = 0;
        let healthInterval = null;

        // User Credits (Mock - Replace with Firebase)
        let userCredits = 100;
        let dailyUsed = 0;
        let dailyLimit = 40;

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function log(msg, type = 'info') {
            const box = elements.logBox;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
            while (box.children.length > 100) box.removeChild(box.firstChild);
        }

        function showToast(message, type = 'success') {
            const toast = elements.toast;
            toast.textContent = message;
            toast.classList.remove('error');
            if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateCreditsDisplay() {
            elements.creditsDisplay.textContent = `Credits: ${userCredits}`;
            if (userCredits <= 10) elements.creditsDisplay.classList.add('critical');
            elements.dailyDisplay.textContent = `Today: ${dailyUsed}/${dailyLimit}`;
        }

        // ============================================
        // USB STATUS UI
        // ============================================
        function updateUsbStatus(status) {
            const card = elements.usbStatusCard;
            const dot = elements.usbDot;
            const btn = elements.btnUsb;
            const text = elements.usbStatusText;
            const sub = elements.usbStatusSub;

            card.classList.remove('connected');
            dot.classList.remove('connected');
            btn.classList.remove('connected');

            if (status === 'connected') {
                card.classList.add('connected');
                dot.classList.add('connected');
                btn.classList.add('connected');
                btn.textContent = '🔌 DISCONNECT USB';
                
                if (selectedDevice === 'ft232r') {
                    text.textContent = '✅ FT232R Connected';
                    sub.textContent = 'FTDI FT232R • Ready for reading';
                } else {
                    text.textContent = '✅ CH340 Connected';
                    sub.textContent = 'CH340 Serial • Ready for reading';
                }
            } else if (status === 'connecting') {
                btn.textContent = '⏳ CONNECTING...';
                text.textContent = '🔌 Connecting...';
                sub.textContent = 'Please wait';
            } else {
                btn.textContent = '🔌 CONNECT USB';
                if (selectedDevice === 'ft232r') {
                    text.textContent = '❌ FT232R Not Connected';
                    sub.textContent = 'Select FT232R and click CONNECT';
                } else if (selectedDevice === 'ch340') {
                    text.textContent = '❌ CH340 Not Connected';
                    sub.textContent = 'Select CH340 and click CONNECT';
                } else {
                    text.textContent = '❌ No Device Selected';
                    sub.textContent = 'Select CH340 or FT232R below';
                }
            }
        }

        function updateServerButton() {
            const btn = elements.btnServer;
            btn.classList.remove('ready', 'running');

            if (!isUsbConnected || !selectedDevice) {
                btn.textContent = '▶️ START SERVER';
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
            } else if (isServerRunning) {
                btn.textContent = '⏹️ STOP SERVER';
                btn.classList.add('running');
                btn.disabled = false;
                btn.style.opacity = '1';
            } else {
                btn.textContent = '▶️ START SERVER';
                btn.classList.add('ready');
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        function updateServerStatus() {
            if (isServerRunning) {
                elements.serverStatus.classList.add('running');
                elements.serverStatusText.textContent = '🟢 Server Running - Ready for Reading';
            } else {
                elements.serverStatus.classList.remove('running');
                elements.serverStatusText.textContent = 'Server Stopped';
            }
        }

        function updateDeviceSelection() {
            if (selectedDevice === 'ch340') {
                elements.selectCH340.classList.add('active');
                elements.selectFT232R.classList.remove('active');
                elements.selectCH340.style.borderColor = '#22c55e';
                elements.selectCH340.style.background = '#dcfce7';
            } else if (selectedDevice === 'ft232r') {
                elements.selectFT232R.classList.add('active');
                elements.selectCH340.classList.remove('active');
                elements.selectFT232R.style.borderColor = '#2563eb';
                elements.selectFT232R.style.background = '#eef2ff';
            } else {
                elements.selectCH340.classList.remove('active');
                elements.selectFT232R.classList.remove('active');
                elements.selectCH340.style.borderColor = '#e2e8f0';
                elements.selectCH340.style.background = 'white';
                elements.selectFT232R.style.borderColor = '#e2e8f0';
                elements.selectFT232R.style.background = 'white';
            }
        }

        // ============================================
        // METER DATA PROCESSING
        // ============================================
        function processMeterData(hexData) {
            if (!hexData || hexData.length === 0) return null;
            
            log(`📊 Processing: ${hexData.substring(0, 40)}...`, 'info');
            
            // Credit deduction on billing data request
            if (hexData.includes("0201020204")) {
                if (userCredits > 0 && dailyUsed < dailyLimit) {
                    userCredits--;
                    dailyUsed++;
                    updateCreditsDisplay();
                    log(`💳 Credit deducted! Remaining: ${userCredits}`, 'credit');
                    showToast(`Credit Used! Remaining: ${userCredits}`);
                } else if (userCredits <= 0) {
                    log('❌ No credits remaining! Please recharge.', 'error');
                    showToast('No credits remaining!', 'error');
                    stopServer();
                }
            }
            
            // Return mock response (replace with actual meter logic)
            if (hexData.includes("0100010800")) {
                // Clock reading response
                return "A0" + hexData.substring(2, 6) + "240412153000FF";
            } else if (hexData.includes("0100600100")) {
                // Serial number response
                const serial = elements.valSerial.value || "0000000";
                return "A0" + hexData.substring(2, 6) + serial.padStart(14, '0') + "FF";
            } else if (hexData.includes("0201020204")) {
                // Billing data response
                const kwh = (parseFloat(elements.valKwh.value) || 1234.5).toFixed(1);
                const kvah = (parseFloat(elements.valKvah.value) || 1300.0).toFixed(1);
                return "A0" + hexData.substring(2, 6) + "0000" + kwh.replace('.', '') + kvah.replace('.', '') + "FF";
            }
            
            return "A0" + hexData.substring(2, 6) + "00FF";
        }

        // ============================================
        // ANDROID BRIDGE FUNCTIONS
        // ============================================
        function isAndroidBridgeAvailable() {
            return typeof window.Android !== 'undefined';
        }

        function connectCH340() {
            if (!isAndroidBridgeAvailable()) {
                log('❌ Android Bridge not available!', 'error');
                showToast('Android Bridge not available', 'error');
                return false;
            }
            
            try {
                if (typeof window.Android.connectCH340 === 'function') {
                    window.Android.connectCH340();
                } else if (typeof window.Android.connectUSB === 'function') {
                    window.Android.connectUSB();
                } else {
                    throw new Error('No USB connect method found');
                }
                log('🔌 Connecting CH340...', 'info');
                return true;
            } catch(e) {
                log(`❌ CH340 connect error: ${e.message}`, 'error');
                return false;
            }
        }

        function connectFT232R() {
            if (!isAndroidBridgeAvailable()) {
                log('❌ Android Bridge not available!', 'error');
                showToast('Android Bridge not available', 'error');
                return false;
            }
            
            try {
                if (typeof window.Android.connectFT232R === 'function') {
                    window.Android.connectFT232R();
                } else if (typeof window.Android.connectUSB === 'function') {
                    window.Android.connectUSB();
                } else {
                    throw new Error('No USB connect method found');
                }
                log('🔌 Connecting FT232R...', 'info');
                return true;
            } catch(e) {
                log(`❌ FT232R connect error: ${e.message}`, 'error');
                return false;
            }
        }

        function disconnectUSB() {
            if (!isAndroidBridgeAvailable()) return;
            
            try {
                if (typeof window.Android.disconnect === 'function') {
                    window.Android.disconnect();
                }
            } catch(e) {}
        }

        function sendUSBData(data) {
            if (!isAndroidBridgeAvailable() || !isUsbConnected) return false;
            
            try {
                if (typeof window.Android.sendData === 'function') {
                    window.Android.sendData(data);
                    return true;
                }
            } catch(e) {
                log(`❌ Send error: ${e.message}`, 'error');
            }
            return false;
        }

        // ============================================
        // MAIN CONNECTION HANDLERS
        // ============================================
        async function connectUsb() {
            if (isUsbConnected) {
                disconnectUsb();
                return;
            }
            
            if (!selectedDevice) {
                log('⚠️ Please select a device first (CH340 or FT232R)', 'warning');
                showToast('Select CH340 or FT232R first!', 'error');
                return;
            }
            
            if (isConnecting) {
                log('⏳ Connection already in progress...', 'warning');
                return;
            }
            
            isConnecting = true;
            updateUsbStatus('connecting');
            
            let success = false;
            
            if (selectedDevice === 'ch340') {
                success = connectCH340();
            } else if (selectedDevice === 'ft232r') {
                success = connectFT232R();
            }
            
            // Simulate connection response (actual connection will be via Android callbacks)
            setTimeout(() => {
                if (isConnecting && !isUsbConnected) {
                    log('⚠️ Connection timeout. Make sure USB device is connected.', 'warning');
                    updateUsbStatus('disconnected');
                    isConnecting = false;
                }
            }, 5000);
        }

        function disconnectUsb() {
            if (isServerRunning) {
                stopServer();
            }
            
            if (healthInterval) {
                clearInterval(healthInterval);
                healthInterval = null;
            }
            
            disconnectUSB();
            isUsbConnected = false;
            isConnecting = false;
            updateUsbStatus('disconnected');
            updateServerButton();
            log('🔌 USB Disconnected', 'warning');
        }

        // ============================================
        // SERVER FUNCTIONS
        // ============================================
        function startServer() {
            if (!isUsbConnected) {
                log('⚠️ Please connect USB first!', 'warning');
                showToast('Connect USB first!', 'error');
                return;
            }
            
            if (userCredits <= 0) {
                log('❌ No credits remaining!', 'error');
                showToast('Please recharge credits', 'error');
                return;
            }
            
            isServerRunning = true;
            updateServerButton();
            updateServerStatus();
            log(`▶️ Server Started (${selectedDevice?.toUpperCase()}) - Ready for meter reading`, 'success');
            showToast('Server Started!');
            
            // Start health check
            lastDataTime = Date.now();
            healthInterval = setInterval(() => {
                if (isServerRunning && isUsbConnected) {
                    const timeSince = Date.now() - lastDataTime;
                    const signal = elements.usbSignal;
                    if (timeSince < 5000) {
                        signal.textContent = '● Active';
                        signal.style.color = '#00e676';
                    } else if (timeSince < 15000) {
                        signal.textContent = '● Idle';
                        signal.style.color = '#888';
                    } else {
                        signal.textContent = '● Waiting';
                        signal.style.color = '#ff9800';
                    }
                }
            }, 2000);
        }

        function stopServer() {
            isServerRunning = false;
            if (healthInterval) {
                clearInterval(healthInterval);
                healthInterval = null;
            }
            updateServerButton();
            updateServerStatus();
            log('⏹️ Server Stopped', 'warning');
        }

        // ============================================
        // ANDROID BRIDGE CALLBACKS
        // ============================================
        window.onConnected = function(deviceType) {
            log(`✅ ${deviceType || selectedDevice?.toUpperCase()} Connected via Android Bridge!`, 'success');
            isUsbConnected = true;
            isConnecting = false;
            
            // Auto-detect device type from callback if available
            if (deviceType === 'FT232R' || deviceType === 'ft232r') {
                selectedDevice = 'ft232r';
                updateDeviceSelection();
            } else if (deviceType === 'CH340' || deviceType === 'ch340') {
                selectedDevice = 'ch340';
                updateDeviceSelection();
            }
            
            updateUsbStatus('connected');
            updateServerButton();
            showToast(`${selectedDevice?.toUpperCase()} Connected!`);
            
            try { if (window.Android?.vibrate) window.Android.vibrate(100); } catch(e) {}
        };
        
        window.onUsbAttached = function(deviceType) {
            log(`🔌 USB device attached: ${deviceType || 'Unknown'}`, 'info');
            if (!isUsbConnected && selectedDevice) {
                connectUsb();
            }
        };
        
        window.onUsbDetached = function() {
            log('⚠️ USB device detached!', 'error');
            showToast('USB Disconnected!', 'error');
            disconnectUsb();
        };
        
        window.onUsbError = function(error) {
            log(`❌ USB Error: ${error}`, 'error');
            isConnecting = false;
            updateUsbStatus('disconnected');
            showToast(`USB Error: ${error}`, 'error');
        };
        
        window.onDataReceived = function(hexData) {
            if (!isServerRunning) return;
            
            lastDataTime = Date.now();
            
            // Log different types of requests
            if (hexData.includes("935A64")) {
                log('🔄 Connection request received', 'info');
            } else if (hexData.includes("A041034110")) {
                log('🔐 Authentication request', 'info');
            } else if (hexData.includes("0100010800")) {
                log('⏰ Reading meter clock...', 'info');
            } else if (hexData.includes("0100600100")) {
                log('🔢 Reading serial number...', 'info');
            } else if (hexData.includes("0201020204")) {
                log('📊 Reading billing data...', 'info');
            } else if (hexData.includes("0100010700")) {
                log('⚡ Reading instant values...', 'info');
            } else if (hexData.includes("5356A2")) {
                log('✅ Reading complete!', 'success');
                try { if (window.Android?.vibrate) window.Android.vibrate(100); } catch(e) {}
            }
            
            const reply = processMeterData(hexData);
            if (reply) {
                setTimeout(() => {
                    sendUSBData(reply);
                }, 50);
            }
        };
        
        window.onLog = function(message) {
            if (message && !message.includes('RX:') && !message.includes('TX:') && !message.includes('hex')) {
                log(message, 'info');
            }
        };

        // ============================================
        // EVENT LISTENERS
        // ============================================
        elements.selectCH340.addEventListener('click', () => {
            if (isUsbConnected) {
                log('⚠️ Disconnect USB before changing device', 'warning');
                return;
            }
            selectedDevice = 'ch340';
            updateDeviceSelection();
            updateUsbStatus('disconnected');
            log('📟 CH340/CH341 selected', 'info');
        });
        
        elements.selectFT232R.addEventListener('click', () => {
            if (isUsbConnected) {
                log('⚠️ Disconnect USB before changing device', 'warning');
                return;
            }
            selectedDevice = 'ft232r';
            updateDeviceSelection();
            updateUsbStatus('disconnected');
            log('📟 FT232R (FTDI) selected', 'info');
        });
        
        elements.btnUsb.addEventListener('click', connectUsb);
        
        elements.btnServer.addEventListener('click', () => {
            if (isServerRunning) {
                stopServer();
            } else {
                startServer();
            }
        });
        
        elements.logoutBtn.addEventListener('click', () => {
            log('👋 Logging out...', 'info');
            disconnectUsb();
            stopServer();
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        });
        
        elements.clearLogsBtn.addEventListener('click', () => {
            elements.logBox.innerHTML = '';
            log('📜 Logs cleared', 'info');
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            updateCreditsDisplay();
            updateUsbStatus('disconnected');
            updateServerStatus();
            updateDeviceSelection();
            log('🚀 WEBPERA Ready!', 'success');
            log('📱 Select CH340 or FT232R and click CONNECT USB', 'info');
            
            // Auto-detect if Android Bridge is available
            if (isAndroidBridgeAvailable()) {
                log('✅ Android Bridge detected', 'success');
            } else {
                log('⚠️ Android Bridge not detected. Make sure you are running in WebView.', 'warning');
            }
        }
        
        init();
    </script>
</body>
</html>
