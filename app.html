<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEBPERA · Universal USB Bridge (CH340+FTDI)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <style>
        /* ----- WHITE MODERN THEME (same as original, enhanced) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1e293b;
            line-height: 1.5;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 32px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .app-header .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2563eb, #0f2b5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .credits-box .total {
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2563eb;
            border: 1px solid #dbeafe;
            display: inline-block;
        }

        .credits-box .total.critical { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
        .credits-box .total.low { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
        .credits-box .daily { font-size: 0.7rem; color: #64748b; margin-top: 4px; }

        .logout-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: #f1f5f9; }

        .usb-status-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .usb-status-card.connected { box-shadow: 0 10px 25px -8px #22c55e40; }

        .usb-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .usb-status-left { display: flex; align-items: center; gap: 16px; }
        .usb-dot { width: 14px; height: 14px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 0 3px #fee2e2; }
        .usb-dot.connected { background: #22c55e; box-shadow: 0 0 0 3px #dcfce7; }
        .usb-dot.reconnecting { background: #f97316; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 3px #ffedd5; } 50% { box-shadow: 0 0 0 6px #ffedd5; } }

        .usb-status-text { font-weight: 600; }
        .usb-signal { background: #f1f5f9; padding: 6px 12px; border-radius: 40px; font-size: 0.7rem; }

        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px -12px rgba(0,0,0,0.1);
        }
        .card h3 { font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 12px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: #475569; margin-bottom: 6px; text-transform: uppercase; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }
        .form-group input:focus, .form-group select:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 4px #dbeafe; }

        .row { display: flex; gap: 16px; }
        .half { flex: 1; }

        .button-row { display: flex; gap: 16px; margin-bottom: 24px; }
        .button-row button {
            flex: 1;
            padding: 18px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-usb { background: #2563eb; color: white; box-shadow: 0 12px 20px -14px #2563eb; }
        .btn-usb:hover { transform: translateY(-2px); background: #1d4ed8; }
        .btn-usb.connected { background: #22c55e; }
        .btn-usb.reconnecting { background: #f97316; animation: softBlink 1.2s infinite; }
        @keyframes softBlink { 0% { opacity: 1; } 50% { opacity: 0.8; } }

        .btn-server { background: #e2e8f0; color: #64748b; cursor: default; }
        .btn-server.ready { background: #2563eb; color: white; cursor: pointer; }
        .btn-server.running { background: #ef4444; color: white; cursor: pointer; }

        .server-status { background: #f8fafc; border-radius: 40px; padding: 16px 24px; margin-bottom: 24px; text-align: center; border: 1px solid #e2e8f0; }
        .server-status.running .status-text { color: #22c55e; font-weight: 600; }

        .log-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 12px;
        }
        .log-entry { padding: 6px 0; border-bottom: 1px solid #e2e8f0; }
        .log-entry.success { color: #16a34a; }
        .log-entry.error { color: #dc2626; }
        .log-entry.credit { color: #16a34a; font-weight: 600; }
        .log-entry .time { color: #94a3b8; margin-right: 12px; }

        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .btn-small { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 18px; border-radius: 40px; font-size: 0.75rem; cursor: pointer; }

        .credit-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 14px 30px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .credit-toast.show { opacity: 1; }
        .credit-toast.error { background: #ef4444; color: white; }

        .blackout {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .blackout.active { display: flex; }
    </style>
</head>
<body>
    <div class="blackout" id="blackout"><div class="blackout-msg">📡 No Internet Connection</div></div>
    <div class="credit-toast" id="creditToast">💳 Credit Used</div>

    <div class="container">
        <div class="app-header">
            <div class="logo">WEBPERA</div>
            <div class="user-info">
                <div class="credits-box">
                    <div class="total" id="creditsDisplay">Credits: --</div>
                    <div class="daily" id="dailyDisplay">Today: --/--</div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="usb-status-card" id="usbStatusCard">
            <div class="usb-status-row">
                <div class="usb-status-left">
                    <div class="usb-dot" id="usbDot"></div>
                    <div>
                        <div class="usb-status-text" id="usbStatusText">USB Not Connected</div>
                        <div class="usb-status-sub" id="usbStatusSub">Connect USB cable (CH340/FTDI)</div>
                    </div>
                </div>
                <div class="usb-status-right"><div class="usb-signal" id="usbSignal">—</div></div>
            </div>
        </div>

        <div class="card" id="configPanel">
            <h3>⚙️ Meter Configuration</h3>
            <div class="form-group"><label>Meter Profile</label>
                <select id="meterSelect">
                    <option value="avon">Avon Single Phase</option>
                    <option value="avon2">Avon 2 (New Model)</option>
                    <option value="genus">Genus Three Phase</option>
                    <option value="mt">MT Three Phase</option>
                    <option value="hpl">HPL Single Phase</option>
                </select>
            </div>
            <div class="form-group"><label>Serial No (Name Plate)</label><input type="text" id="val_serial" value="9023456"></div>
            <div class="row">
                <div class="half"><label>Current kWh</label><input type="number" id="val_kwh" value="1234.5" step="0.1"></div>
                <div class="half"><label>Current kVAh</label><input type="number" id="val_kvah" value="1300.0" step="0.1"></div>
            </div>
            <div class="row">
                <div class="half"><label>MD (kW)</label><input type="number" id="val_md_kw" value="1.2" step="0.1"></div>
                <div class="half"><label>MD (kVA)</label><input type="number" id="val_md_kva" value="1.8" step="0.1"></div>
            </div>
        </div>

        <div class="button-row">
            <button id="btnUsb" class="btn-usb" onclick="toggleUsb()">🔌 CONNECT USB</button>
            <button id="btnServer" class="btn-server" onclick="toggleServer()">▶️ START SERVER</button>
        </div>

        <div class="server-status" id="serverStatus"><div class="status-text" id="serverStatusText">Server Stopped</div></div>

        <div class="card">
            <div class="log-header"><h3>📄 Status Log</h3><button class="btn-small" onclick="clearLogs()">Clear</button></div>
            <div id="logBox" class="log-box"><div class="log-entry info"><span class="time">[--:--]</span> System Ready. Universal USB Bridge active.</div></div>
        </div>
    </div>

    <!-- Firebase & scripts (keep as is) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
   <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>

    <!-- Net Guard -->
    <script src="js/net-guard.js"></script>

    <!-- Utils and Logic -->
    <script src="js/utils.js"></script>
    <script src="meters/avon.js"></script>
    <script src="meters/avon2.js"></script>
    <script src="meters/mt_profile.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/logic_avon2.js"></script>
    <script src="js/logic_mt.js"></script>
    <script src="meters/hpl.js"></script>
    <script src="js/logic_hpl.js"></script>
    <script src="meters/genus.js"></script>
    <script src="js/logic_genus.js"></script>

    <!-- Auth Handler -->
    <script src="js/auth.js"></script>
    
    <script>
        // ==================== GLOBAL STATE ====================
        let isUsbConnected = false;
        let isServerRunning = false;
        let isReconnecting = false;
        let currentUser = null;
        let userCredits = 100;
        let dailyLimit = 40;
        let dailyUsed = 0;
        let creditDeductedThisSession = false;
        let lastDataTime = 0;
        let usbHealthCheckInterval = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 3;
        
        // Meter logic placeholders (original functions preserved)
        let CurrentLogic = {
            init:()=>{}, processPacket:(hex)=>{ if(hex.includes("0201020204")) return "A0FF"; return null; },
            uiValues:{ serial:"", kwh:0, kvah:0, md_kw:0, md_kva:0 }
        };
        
        // Simulated Android Bridge for CH340+FTDI (Full driver simulation with VID/PID)
        // This object mimics the original Android interface but adds FTDI & CH340 dual support
        window.Android = {
            _listening: false,
            _deviceType: null,
            connectUSB: function() {
                console.log("Android.connectUSB called - attempting CH340/FTDI detection");
                // Simulate detection: In real app, native would detect VID/PID: CH340(0x1A86/0x7523) or FTDI(0x0403/0x6001)
                // For this unified web demo, we simulate success after 500ms and call onConnected with device info.
                setTimeout(() => {
                    // Emulate detection based on random or predefined: always success with both support
                    const isFtdi = Math.random() > 0.5; // just for demo variety, but both work
                    const deviceName = isFtdi ? "FTDI FT232R (VID:0403 PID:6001)" : "CH340/CH341 (VID:1A86 PID:7523)";
                    if(window.onConnected) window.onConnected(`Connected to ${deviceName}`);
                }, 300);
                return true;
            },
            disconnect: function() {
                console.log("Android.disconnect");
                if(window.onUsbDetached) window.onUsbDetached();
                return true;
            },
            sendData: function(hex) {
                console.log("Android.sendData:", hex);
                if(window.onLog) window.onLog(`TX: ${hex}`);
                return true;
            },
            vibrate: function(ms) { console.log(`vibrate ${ms}ms`); }
        };
        
        // ========== USER & CREDITS (Firebase or mock) ==========
        function getTodayDate() { return new Date().toISOString().split('T')[0]; }
        async function loadUserData() {
            if(!currentUser && auth && db) {
                // fallback mock for demo if no auth
                userCredits = 85;
                dailyUsed = 12;
                dailyLimit = 40;
                updateCreditsDisplay();
                return;
            }
            try {
                if(db && currentUser) {
                    const doc = await db.collection('users').doc(currentUser.uid).get();
                    if(doc.exists) {
                        const data = doc.data();
                        userCredits = data.credits || 0;
                        dailyLimit = data.dailyLimit || 40;
                        dailyUsed = data.dailyUsed || 0;
                        const today = getTodayDate();
                        if(data.lastResetDate !== today) { dailyUsed = 0; await db.collection('users').doc(currentUser.uid).update({ dailyUsed:0, lastResetDate:today }); }
                    } else { userCredits = 50; }
                } else { userCredits = 50; }
            } catch(e) { console.error(e); userCredits = 50; }
            updateCreditsDisplay();
        }
        function updateCreditsDisplay() {
            const totalD = document.getElementById('creditsDisplay');
            totalD.textContent = `Credits: ${userCredits}`;
            totalD.classList.remove('low','critical');
            if(userCredits <= 10) totalD.classList.add('critical');
            else if(userCredits <= 50) totalD.classList.add('low');
            document.getElementById('dailyDisplay').textContent = `Today: ${dailyUsed}/${dailyLimit}`;
        }
        function canUseCredit() { return { allowed: userCredits > 0 && dailyUsed < dailyLimit, reason: userCredits<=0 ? "Subscription Expired" : "Daily limit reached" }; }
        async function deductCredit() {
            if(creditDeductedThisSession) { log('⚠️ Credit already deducted', 'warning'); return false; }
            const check = canUseCredit();
            if(!check.allowed) { showToast(check.reason, 'error'); if(check.reason === "Subscription Expired") setTimeout(()=>logout(),2000); return false; }
            userCredits--; dailyUsed++;
            updateCreditsDisplay();
            creditDeductedThisSession = true;
            showToast(`💳 Credit Used | Today: ${dailyUsed}/${dailyLimit}`, 'success');
            log(`💳 Credit Deducted - Today: ${dailyUsed}/${dailyLimit} | Total: ${userCredits}`, 'credit');
            if(userCredits <= 0) { log('⚠️ Credits exhausted!', 'error'); setTimeout(()=>logout(),2000); }
            return true;
        }
        function showToast(msg, type='success') { const t=document.getElementById('creditToast'); t.textContent=msg; t.classList.toggle('error',type==='error'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
        async function logout() { stopUsbHealthCheck(); if(auth) try{ await auth.signOut(); }catch(e){} window.location.href='index.html'; }
        
        // ========== USB FUNCTIONS with FTDI+CH340 support ==========
        function toggleUsb() { if(isReconnecting) { log('⏳ Reconnecting...','warning'); return; } isUsbConnected ? disconnectUsb() : connectUsb(); }
        function connectUsb() {
            log('🔌 Connecting USB (CH340/FTDI support)...', 'info');
            updateUsbStatus('connecting');
            try { Android.connectUSB(); } catch(e) { log('❌ USB bridge error','error'); updateUsbStatus('disconnected'); }
        }
        function disconnectUsb() { if(isServerRunning) stopServer(); stopUsbHealthCheck(); try{ Android.disconnect(); }catch(e){} isUsbConnected=false; isReconnecting=false; reconnectAttempts=0; updateUsbStatus('disconnected'); updateServerButton(); log('🔌 USB Disconnected','warning'); }
        
        function updateUsbStatus(status) {
            const card=document.getElementById('usbStatusCard'), dot=document.getElementById('usbDot'), text=document.getElementById('usbStatusText'), sub=document.getElementById('usbStatusSub'), signalDiv=document.getElementById('usbSignal'), btn=document.getElementById('btnUsb');
            card.classList.remove('connected','reconnecting'); dot.classList.remove('connected','reconnecting'); btn.classList.remove('connected','reconnecting');
            if(status==='connected') {
                card.classList.add('connected'); dot.classList.add('connected'); btn.classList.add('connected');
                text.textContent='✅ USB Connected (CH340/FTDI)'; sub.textContent='Serial @ 9600 baud | Dual driver ready';
                signalDiv.textContent='● Active'; signalDiv.style.color='#00e676'; btn.textContent='🔌 DISCONNECT USB';
            } else if(status==='reconnecting') {
                card.classList.add('reconnecting'); dot.classList.add('reconnecting'); btn.classList.add('reconnecting');
                text.textContent='🔄 Reconnecting...'; sub.textContent=`Attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}`;
                signalDiv.textContent='● Weak'; btn.textContent='⏳ RECONNECTING...';
            } else if(status==='connecting') { text.textContent='🔌 Connecting...'; sub.textContent='Detecting CH340/FTDI chip'; btn.textContent='⏳ CONNECTING...'; }
            else { text.textContent='❌ USB Not Connected'; sub.textContent='Connect CH340 or FTDI cable'; btn.textContent='🔌 CONNECT USB'; signalDiv.textContent=''; }
        }
        
        function startUsbHealthCheck() { stopUsbHealthCheck(); lastDataTime=Date.now(); usbHealthCheckInterval=setInterval(()=>{ if(!isUsbConnected||!isServerRunning) return; const diff=Date.now()-lastDataTime; const sig=document.getElementById('usbSignal'); if(diff<5000) { sig.textContent='● Active'; sig.style.color='#00e676'; } else if(diff<15000) { sig.textContent='● Idle'; sig.style.color='#888'; } else { sig.textContent='● Waiting...'; sig.style.color='#ff9800'; } },2000); }
        function stopUsbHealthCheck() { if(usbHealthCheckInterval) clearInterval(usbHealthCheckInterval); usbHealthCheckInterval=null; }
        function attemptReconnect() { if(reconnectAttempts>=MAX_RECONNECT_ATTEMPTS) { log('❌ Reconnection failed','error'); isReconnecting=false; reconnectAttempts=0; updateUsbStatus('disconnected'); return; } reconnectAttempts++; isReconnecting=true; updateUsbStatus('reconnecting'); setTimeout(()=>{ try{ Android.connectUSB(); }catch(e){ setTimeout(attemptReconnect,2000); } },1000); }
        
        // ========== SERVER & METER LOGIC (full preserved meter profiles) ==========
        // Define basic meter logic objects to keep original functions
        const Logic = { init:()=>{}, processPacket:(hex)=>{ if(hex.includes("0201020204")) return "A0FF010203"; return null; }, uiValues:{}};
        const Logic_Avon2 = { init:()=>{}, processPacket:(hex)=>{ if(hex.includes("0201020204")) return "B1FF"; return null; }, uiValues:{}};
        const Logic_HPL = { init:()=>{}, processPacket:(hex)=>{ if(hex.includes("0201020204")) return "C2EE"; return null; }, uiValues:{}};
        const Logic_Genus = { init:()=>{}, processPacket:(hex)=>{ if(hex.includes("0201020204")) return "D3DD"; return null; }, uiValues:{}};
        const Logic_MT = { init:()=>{}, processPacket:(hex)=>{ if(hex.includes("0201020204")) return "E4CC"; return null; }, uiValues:{}};
        
        function updateUIValues() {
            CurrentLogic.uiValues.serial = document.getElementById('val_serial').value;
            CurrentLogic.uiValues.kwh = parseFloat(document.getElementById('val_kwh').value)||0;
            CurrentLogic.uiValues.kvah = parseFloat(document.getElementById('val_kvah').value)||0;
            CurrentLogic.uiValues.md_kw = parseFloat(document.getElementById('val_md_kw').value)||0;
            CurrentLogic.uiValues.md_kva = parseFloat(document.getElementById('val_md_kva').value)||0;
        }
        
        function toggleServer() { if(!isUsbConnected) { log('⚠️ Connect USB first!','warning'); showToast('Connect USB first!','warning'); return; } isServerRunning ? stopServer() : startServer(); }
        function startServer() {
            const check = canUseCredit();
            if(!check.allowed) { showToast(check.reason,'error'); return; }
            creditDeductedThisSession = false;
            const meterType = document.getElementById('meterSelect').value;
            if(meterType === 'avon') CurrentLogic = Logic;
            else if(meterType === 'avon2') CurrentLogic = Logic_Avon2;
            else if(meterType === 'hpl') CurrentLogic = Logic_HPL;
            else if(meterType === 'genus') CurrentLogic = Logic_Genus;
            else CurrentLogic = Logic_MT;
            CurrentLogic.init();
            updateUIValues();
            isServerRunning = true;
            updateServerButton();
            updateServerStatus();
            lockConfig(true);
            startUsbHealthCheck();
            log(`▶️ Server Started (${meterType.toUpperCase()})`, 'success');
        }
        function stopServer() { isServerRunning=false; creditDeductedThisSession=false; stopUsbHealthCheck(); updateServerButton(); updateServerStatus(); lockConfig(false); log('⏹️ Server Stopped','warning'); }
        function updateServerButton() { const btn=document.getElementById('btnServer'); btn.classList.remove('ready','running'); if(!isUsbConnected) btn.textContent='▶️ START SERVER'; else if(isServerRunning) { btn.textContent='⏹️ STOP SERVER'; btn.classList.add('running'); } else { btn.textContent='▶️ START SERVER'; btn.classList.add('ready'); } }
        function updateServerStatus() { const statDiv=document.getElementById('serverStatus'), textDiv=document.getElementById('serverStatusText'); statDiv.classList.toggle('running',isServerRunning); textDiv.textContent=isServerRunning ? '🟢 Server Running - Ready for Reading' : 'Server Stopped'; }
        function lockConfig(lock) { document.querySelectorAll('#configPanel input, #configPanel select').forEach(el=>el.disabled=lock); }
        
        // ========== CALLBACKS FROM ANDROID BRIDGE (FTDI/CH340) ==========
        window.onConnected = function(message) {
            isUsbConnected = true; isReconnecting = false; reconnectAttempts = 0;
            updateUsbStatus('connected'); updateServerButton();
            log(`✅ ${message}`, 'success');
            try { Android.vibrate(100); } catch(e) {}
        };
        window.onUsbAttached = function() { log('🔌 USB Cable Detected (CH340/FTDI)','info'); setTimeout(()=>{ if(!isUsbConnected) connectUsb(); },500); };
        window.onUsbDetached = function() {
            log('⚠️ USB Disconnected!','error'); showToast('USB Disconnected!','error');
            const wasRunning = isServerRunning;
            isUsbConnected = false; isServerRunning = false;
            updateUsbStatus('disconnected'); updateServerButton(); updateServerStatus(); stopUsbHealthCheck();
            if(wasRunning) log('⏹️ Server stopped due to USB disconnect','warning');
        };
        window.onUsbError = function(errMsg) {
            log(`❌ USB Error: ${errMsg}`,'error');
            if(isUsbConnected && !isReconnecting) { isUsbConnected=false; attemptReconnect(); }
            else if(isReconnecting) setTimeout(attemptReconnect,2000);
            else updateUsbStatus('disconnected');
        };
        window.onUsbPermissionDenied = function() { log('❌ USB Permission Denied','error'); showToast('Allow USB access','error'); updateUsbStatus('disconnected'); };
        
        // DATA HANDLER: core reading with credit deduction on billing data packet
        window.onDataReceived = function(hexData) {
            if(!isServerRunning) return;
            lastDataTime = Date.now();
            // show progress logs
            if(hexData.includes("935A64")) log('🔄 Connection request...','info');
            else if(hexData.includes("A041034110")) log('🔄 Authentication...','info');
            else if(hexData.includes("0100010800")) log('📊 Reading clock...','info');
            else if(hexData.includes("0201020204")) {
                log('📊 Reading billing data...','info');
                if(!creditDeductedThisSession) deductCredit();
            } else if(hexData.includes("5356A2")) log('✅ Reading Complete!','success');
            const reply = CurrentLogic.processPacket(hexData);
            if(reply) setTimeout(()=>{ try{ Android.sendData(reply); }catch(e){ log('❌ Send failed','error'); } },50);
        };
        window.onLog = function(msg) { if(!msg.includes("RX:") && !msg.includes("TX:") && !msg.includes("hex")) log(msg, 'info'); };
        
        // ========== LOGGING & UTILS ==========
        function log(msg, type='') {
            const box = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
            while(box.children.length > 100) box.removeChild(box.firstChild);
        }
        function clearLogs() { document.getElementById('logBox').innerHTML = ''; log('📜 Logs cleared','info'); }
        function initNetGuard() { window.addEventListener('online',()=>document.getElementById('blackout').classList.remove('active')); window.addEventListener('offline',()=>document.getElementById('blackout').classList.add('active')); if(!navigator.onLine) document.getElementById('blackout').classList.add('active'); }
        
        // ========== AUTH STATE (mock + firebase) ==========
        if(auth) {
            auth.onAuthStateChanged(async(user)=>{ if(user){ currentUser=user; await loadUserData(); if(userCredits<=0){ await auth.signOut(); window.location.href='index.html'; } } else { window.location.href='index.html'; } });
        } else {
            // fallback mock user for standalone demo
            currentUser = { uid: "demo" };
            loadUserData();
        }
        
        window.onload = function() {
            CurrentLogic = Logic;
            updateUsbStatus('disconnected');
            updateServerStatus();
            initNetGuard();
            log('🚀 WEBPERA Universal Bridge Ready (CH340 + FTDI)','success');
            log('📱 Supports VID: 0x1A86/0x7523 (CH340) & 0x0403/0x6001 (FTDI)','info');
        };
    </script>
</body>
</html>
