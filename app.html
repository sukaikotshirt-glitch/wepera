<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEBPERA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <style>
        /* ----- WHITE MODERN THEME ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1e293b;
            padding: 0;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 32px;
        }

        /* ----- APP HEADER (elevated) ----- */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0,0,0,0.02);
            margin-bottom: 24px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .app-header .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2563eb, #0f2b5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .credits-box {
            text-align: right;
        }

        .credits-box .total {
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2563eb;
            border: 1px solid #dbeafe;
            display: inline-block;
            box-shadow: 0 2px 4px rgba(37,99,235,0.1);
        }

        .credits-box .total.low {
            background: #fff7ed;
            color: #c2410c;
            border-color: #fed7aa;
        }

        .credits-box .total.critical {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #fecaca;
        }

        .credits-box .daily {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
        }

        .logout-btn {
            background: white;
            border: 1px solid #e2e8f0;
            color: #475569;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .logout-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #0f172a;
        }

        /* ----- USB STATUS CARD (modern) ----- */
        .usb-status-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.02);
            transition: all 0.2s;
        }

        .usb-status-card.connected {
            box-shadow: 0 10px 25px -8px #22c55e40;
        }

        .usb-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .usb-status-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .usb-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 0 3px #fee2e2;
        }

        .usb-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 0 3px #dcfce7;
        }

        .usb-dot.reconnecting {
            background: #f97316;
            box-shadow: 0 0 0 3px #ffedd5;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 3px #ffedd5; }
            50% { box-shadow: 0 0 0 6px #ffedd5; opacity: 0.7; }
        }

        .usb-status-text {
            font-weight: 600;
            font-size: 1rem;
            color: #1e293b;
        }

        .usb-status-sub {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .usb-signal {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #334155;
            font-weight: 500;
        }

        /* ----- CARD (white, soft) ----- */
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .card h3 {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        /* form elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #0f172a;
            transition: all 0.15s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px #dbeafe;
            background: white;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .half {
            flex: 1;
        }

        /* ----- BUTTON ROW (elegant) ----- */
        .button-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .button-row button {
            flex: 1;
            padding: 18px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }

        .btn-usb {
            background: #2563eb;
            color: white;
            box-shadow: 0 12px 20px -14px #2563eb;
        }

        .btn-usb:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-usb.connected {
            background: #22c55e;
            box-shadow: 0 12px 20px -14px #22c55e;
        }

        .btn-usb.reconnecting {
            background: #f97316;
            box-shadow: 0 12px 20px -14px #f97316;
            animation: softBlink 1.2s infinite;
        }

        @keyframes softBlink {
            0% { opacity: 1; }
            50% { opacity: 0.8; background: #fb923c; }
        }

        .btn-server {
            background: #e2e8f0;
            color: #64748b;
            cursor: default;
        }

        .btn-server.ready {
            background: #2563eb;
            color: white;
            box-shadow: 0 12px 20px -14px #2563eb;
            cursor: pointer;
        }

        .btn-server.ready:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-server.running {
            background: #ef4444;
            color: white;
            box-shadow: 0 12px 20px -14px #ef4444;
            cursor: pointer;
        }

        .btn-server.running:hover {
            background: #dc2626;
        }

        /* ----- SERVER STATUS (minimal) ----- */
        .server-status {
            background: #f8fafc;
            border-radius: 40px;
            padding: 16px 24px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .server-status .status-text {
            font-weight: 500;
            color: #475569;
        }

        .server-status.running .status-text {
            color: #22c55e;
            font-weight: 600;
        }

        /* ----- LOG BOX (clean) ----- */
        .log-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.8rem;
            color: #1e293b;
            margin-top: 12px;
        }

        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-entry.success { color: #16a34a; }
        .log-entry.warning { color: #ea580c; }
        .log-entry.error { color: #dc2626; }
        .log-entry.info { color: #2563eb; }
        .log-entry.credit { color: #16a34a; font-weight: 600; }
        .log-entry .time { color: #94a3b8; margin-right: 12px; }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .btn-small {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-small:hover {
            background: #e2e8f0;
        }

        /* toast notification */
        .credit-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #0f172a;
            padding: 14px 30px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            border: 1px solid #e2e8f0;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .credit-toast.show {
            opacity: 1;
        }

        .credit-toast.error { background: #ef4444; color: white; border: none; }
        .credit-toast.warning { background: #f97316; color: white; border: none; }

        /* blackout overlay */
        .blackout {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .blackout.active {
            display: flex;
        }

        .blackout-msg {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .blackout-sub {
            color: #475569;
            font-size: 0.9rem;
        }

        .chip-badge {
            display: inline-block;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-left: 8px;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <!-- Blackout -->
    <div class="blackout" id="blackout">
        <div class="blackout-msg">📡 No Internet Connection</div>
        <div class="blackout-sub">Please connect to continue</div>
    </div>

    <!-- Toast -->
    <div class="credit-toast" id="creditToast">💳 Credit Used</div>

    <div class="container">
        <!-- App Header -->
        <div class="app-header">
            <div class="logo">WEBPERA <span style="font-size: 0.7rem;">Universal USB</span></div>
            <div class="user-info">
                <div class="credits-box">
                    <div class="total" id="creditsDisplay">Credits: --</div>
                    <div class="daily" id="dailyDisplay">Today: --/--</div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- USB Status Card -->
        <div class="usb-status-card" id="usbStatusCard">
            <div class="usb-status-row">
                <div class="usb-status-left">
                    <div class="usb-dot" id="usbDot"></div>
                    <div>
                        <div class="usb-status-text" id="usbStatusText">No Device Connected</div>
                        <div class="usb-status-sub" id="usbStatusSub">Connect CH340 or FT232R USB meter</div>
                    </div>
                </div>
                <div class="usb-status-right">
                    <div class="usb-signal" id="usbSignal">—</div>
                </div>
            </div>
        </div>

        <!-- Meter Config Card -->
        <div class="card" id="configPanel">
            <h3>⚙️ Meter Configuration</h3>
            
            <div class="form-group">
                <label>Meter Profile</label>
                <select id="meterSelect">
                    <option value="avon">Avon Single Phase</option>
                    <option value="avon2">Avon 2 (New Model)</option>
                    <option value="genus">Genus Three Phase</option>
                    <option value="mt">MT Three Phase</option>
                    <option value="hpl">HPL Single Phase</option>
                </select>
            </div>

            <div class="form-group">
                <label>Serial No (Name Plate)</label>
                <input type="text" id="val_serial" value="" placeholder="e.g. 9023456">
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>Current kWh</label>
                    <input type="number" id="val_kwh" value="1234.5" step="0.1">
                </div>
                <div class="form-group half">
                    <label>Current kVAh</label>
                    <input type="number" id="val_kvah" value="1300.0" step="0.1">
                </div>
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>MD (kW)</label>
                    <input type="number" id="val_md_kw" value="1.2" step="0.1">
                </div>
                <div class="form-group half">
                    <label>MD (kVA)</label>
                    <input type="number" id="val_md_kva" value="1.8" step="0.1">
                </div>
            </div>
        </div>

        <!-- Two Action Buttons -->
        <div class="button-row">
            <button id="btnUsb" class="btn-usb" onclick="toggleUsb()">🔌 CONNECT USB</button>
            <button id="btnServer" class="btn-server" onclick="toggleServer()">▶️ START SERVER</button>
        </div>

        <!-- Server Status -->
        <div class="server-status" id="serverStatus">
            <div class="status-text" id="serverStatusText">Server Stopped</div>
        </div>

        <!-- Log Box -->
        <div class="card">
            <div class="log-header">
                <h3>📄 Status Log</h3>
                <button class="btn-small" onclick="clearLogs()">Clear</button>
            </div>
            <div id="logBox" class="log-box">
                <div class="log-entry info"><span class="time">[--:--]</span> System Ready. Connect USB meter.</div>
            </div>
        </div>
    </div>

    <!-- Firebase & scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>

    <!-- Net Guard -->
    <script src="js/net-guard.js"></script>

    <!-- Meter Logic Files -->
    <script src="meters/avon.js"></script>
    <script src="meters/avon2.js"></script>
    <script src="meters/mt_profile.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/logic_avon2.js"></script>
    <script src="js/logic_mt.js"></script>
    <script src="meters/hpl.js"></script>
    <script src="js/logic_hpl.js"></script>
    <script src="meters/genus.js"></script>
    <script src="js/logic_genus.js"></script>

    <!-- Auth Handler -->
    <script src="js/auth.js"></script>

    <script>
        // ============================================
        // UNIVERSAL USB DEVICE SUPPORT
        // Supports: CH340 (Android Bridge) & FT232R (WebUSB)
        // ============================================

        // ============================================
        // DEVICE CONFIGURATIONS
        // ============================================
        const USB_DEVICES = {
            CH340: {
                type: 'ch340',
                name: 'CH340',
                vid: "1A86",
                pid: "7523",
                baudRate: 9600,
                useAndroidBridge: true,
                useWebUSB: false
            },
            FT232R: {
                type: 'ft232r',
                name: 'FT232R',
                vid: "0403",
                pid: "6001",
                baudRate: 9600,
                dataBits: 8,
                stopBits: 1,
                parity: "none",
                useAndroidBridge: false,
                useWebUSB: true
            }
        };

        let currentDeviceType = null; // 'ch340' or 'ft232r'
        let ft232rDevice = null; // Store FT232R device instance

        // ============================================
        // APP STATE & GLOBALS
        // ============================================
        let isUsbConnected = false;
        let isServerRunning = false;
        let isReconnecting = false;
        let currentUser = null;
        let userCredits = 0;
        let dailyLimit = 40;
        let dailyUsed = 0;
        let lastResetDate = "";
        let creditDeductedThisSession = false;

        // USB monitoring
        let lastDataTime = 0;
        let usbHealthCheckInterval = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 3;

        // Default logic handler (AVON)
        let CurrentLogic = Logic;

        // ============================================
        // DOM ELEMENT REFERENCES
        // ============================================
        const elements = {
            creditsDisplay: document.getElementById('creditsDisplay'),
            dailyDisplay: document.getElementById('dailyDisplay'),
            usbStatusCard: document.getElementById('usbStatusCard'),
            usbDot: document.getElementById('usbDot'),
            usbStatusText: document.getElementById('usbStatusText'),
            usbStatusSub: document.getElementById('usbStatusSub'),
            usbSignal: document.getElementById('usbSignal'),
            btnUsb: document.getElementById('btnUsb'),
            btnServer: document.getElementById('btnServer'),
            serverStatus: document.getElementById('serverStatus'),
            serverStatusText: document.getElementById('serverStatusText'),
            logBox: document.getElementById('logBox'),
            creditToast: document.getElementById('creditToast'),
            blackout: document.getElementById('blackout'),
            meterSelect: document.getElementById('meterSelect'),
            valSerial: document.getElementById('val_serial'),
            valKwh: document.getElementById('val_kwh'),
            valKvah: document.getElementById('val_kvah'),
            valMdKw: document.getElementById('val_md_kw'),
            valMdKva: document.getElementById('val_md_kva')
        };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function getTodayDate() {
            return new Date().toISOString().split('T')[0];
        }

        function showToast(message, type = 'success') {
            const toast = elements.creditToast;
            toast.textContent = message;
            toast.classList.remove('error', 'warning');
            if (type === 'error') toast.classList.add('error');
            if (type === 'warning') toast.classList.add('warning');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function log(msg, type = '') {
            const box = elements.logBox;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
            
            while (box.children.length > 100) {
                box.removeChild(box.firstChild);
            }
        }

        function clearLogs() {
            elements.logBox.innerHTML = '';
            log('📜 Logs cleared', 'info');
        }

        function updateUIValues() {
            CurrentLogic.uiValues.serial = elements.valSerial.value || "0000000";
            CurrentLogic.uiValues.kwh = parseFloat(elements.valKwh.value) || 0;
            CurrentLogic.uiValues.kvah = parseFloat(elements.valKvah.value) || 0;
            CurrentLogic.uiValues.md_kw = parseFloat(elements.valMdKw.value) || 0;
            CurrentLogic.uiValues.md_kva = parseFloat(elements.valMdKva.value) || 0;
        }

        function lockConfig(lock) {
            const inputs = document.querySelectorAll('#configPanel input, #configPanel select');
            inputs.forEach(el => el.disabled = lock);
        }

        // ============================================
        // AUTO DETECT CONNECTED USB DEVICE
        // ============================================
        async function autoDetectUSBDevice() {
            log('🔍 Scanning for USB devices...', 'info');
            
            // Check for Android Bridge (CH340)
            if (window.Android && typeof Android.isDeviceConnected === 'function') {
                try {
                    const isConnected = Android.isDeviceConnected();
                    if (isConnected) {
                        log('✅ CH340 detected via Android Bridge', 'success');
                        currentDeviceType = 'ch340';
                        return USB_DEVICES.CH340;
                    }
                } catch(e) {}
            }

            // Check for WebUSB (FT232R)
            if (navigator.usb) {
                try {
                    const devices = await navigator.usb.getDevices();
                    
                    // Check for FT232R
                    const ft232rFound = devices.find(device => 
                        device.vendorId === parseInt(USB_DEVICES.FT232R.vid, 16) && 
                        device.productId === parseInt(USB_DEVICES.FT232R.pid, 16)
                    );
                    
                    if (ft232rFound) {
                        log('✅ FT232R detected via WebUSB', 'success');
                        currentDeviceType = 'ft232r';
                        return USB_DEVICES.FT232R;
                    }
                    
                    // Check for other devices (optional)
                    if (devices.length > 0) {
                        devices.forEach(device => {
                            log(`ℹ️ Found USB device: VID:${device.vendorId.toString(16)} PID:${device.productId.toString(16)}`, 'info');
                        });
                    }
                } catch(e) {
                    console.error('WebUSB detection error:', e);
                }
            }
            
            log('⚠️ No USB device detected. Please connect CH340 or FT232R meter.', 'warning');
            return null;
        }

        // ============================================
        // FT232R SPECIFIC FUNCTIONS (WebUSB)
        // ============================================
        async function connectFT232R() {
            try {
                if (!navigator.usb) {
                    throw new Error('WebUSB not supported in this browser');
                }

                // Request FT232R device
                const device = await navigator.usb.requestDevice({
                    filters: [
                        {
                            vendorId: parseInt(USB_DEVICES.FT232R.vid, 16),
                            productId: parseInt(USB_DEVICES.FT232R.pid, 16)
                        }
                    ]
                });

                ft232rDevice = device;
                
                // Open the device
                await device.open();
                
                // Select configuration
                if (device.configuration === null) {
                    await device.selectConfiguration(1);
                }
                
                // Claim interface
                await device.claimInterface(0);
                
                // Set serial port parameters for FT232R
                await device.controlTransferOut({
                    requestType: 'class',
                    recipient: 'interface',
                    request: 0x22,  // SET_LINE_CODING
                    value: 0,
                    index: 0
                }, new Uint8Array([
                    USB_DEVICES.FT232R.baudRate & 0xFF,
                    (USB_DEVICES.FT232R.baudRate >> 8) & 0xFF,
                    (USB_DEVICES.FT232R.baudRate >> 16) & 0xFF,
                    (USB_DEVICES.FT232R.baudRate >> 24) & 0xFF,
                    0,  // stop bits (1 stop bit)
                    0,  // parity (none)
                    8   // data bits (8)
                ]));
                
                // Set RTS/DTR for FT232R
                await device.controlTransferOut({
                    requestType: 'class',
                    recipient: 'interface',
                    request: 0x21,  // SET_CONTROL_LINE_STATE
                    value: 0x0003,  // RTS | DTR
                    index: 0
                });
                
                // Start reading data
                readFT232RData(device);
                
                isUsbConnected = true;
                currentDeviceType = 'ft232r';
                updateUsbStatus('connected');
                updateServerButton();
                log(`✅ FT232R Connected at ${USB_DEVICES.FT232R.baudRate} baud`, 'success');
                
                try { if (window.Android) Android.vibrate(100); } catch(e) {}
                
                return true;
                
            } catch (error) {
                if (error.name === 'NotFoundError') {
                    log('❌ FT232R device not found. Please connect the USB meter.', 'error');
                } else if (error.name === 'SecurityError') {
                    log('❌ USB permission denied. Please allow access.', 'error');
                } else {
                    log(`❌ FT232R connection error: ${error.message}`, 'error');
                }
                return false;
            }
        }

        async function readFT232RData(device) {
            let endpointIn = null;
            
            for (const endpoint of device.configuration.interfaces[0].alternate.endpoints) {
                if (endpoint.direction === 'in') {
                    endpointIn = endpoint;
                    break;
                }
            }
            
            if (!endpointIn) {
                log('❌ No input endpoint found on FT232R', 'error');
                return;
            }
            
            while (isUsbConnected && device.opened) {
                try {
                    const result = await device.transferIn(endpointIn.endpointNumber, 64);
                    const decoder = new TextDecoder();
                    const data = decoder.decode(result.data);
                    
                    if (data && data.length > 0) {
                        const hexData = arrayBufferToHex(result.data.buffer);
                        lastDataTime = Date.now();
                        processReceivedData(hexData, data);
                    }
                } catch (error) {
                    if (error.name !== 'NetworkError') {
                        log(`FT232R read error: ${error.message}`, 'error');
                    }
                    break;
                }
            }
        }

        async function sendFT232RData(device, data) {
            if (!device || !device.opened) return false;
            
            try {
                let endpointOut = null;
                
                for (const endpoint of device.configuration.interfaces[0].alternate.endpoints) {
                    if (endpoint.direction === 'out') {
                        endpointOut = endpoint;
                        break;
                    }
                }
                
                if (!endpointOut) {
                    log('❌ No output endpoint found on FT232R', 'error');
                    return false;
                }
                
                const encoder = new TextEncoder();
                const encodedData = encoder.encode(data);
                
                await device.transferOut(endpointOut.endpointNumber, encodedData);
                return true;
                
            } catch (error) {
                log(`FT232R send error: ${error.message}`, 'error');
                return false;
            }
        }

        function disconnectFT232R() {
            if (ft232rDevice && ft232rDevice.opened) {
                try {
                    ft232rDevice.close();
                } catch(e) {}
            }
            ft232rDevice = null;
        }

        // ============================================
        // CH340 SPECIFIC FUNCTIONS (Android Bridge)
        // ============================================
        function connectCH340() {
            log('🔌 Connecting CH340 via Android Bridge...', 'info');
            
            try {
                if (window.Android && window.Android.connectUSB) {
                    window.Android.connectUSB();
                    currentDeviceType = 'ch340';
                    log('✅ CH340 connection initiated', 'info');
                } else {
                    throw new Error('Android bridge not available');
                }
            } catch(e) {
                log('❌ CH340 connection failed - Android bridge not found', 'error');
                updateUsbStatus('disconnected');
            }
        }

        function disconnectCH340() {
            try {
                if (window.Android && window.Android.disconnect) {
                    window.Android.disconnect();
                }
            } catch(e) {}
        }

        function sendCH340Data(data) {
            try {
                if (window.Android && window.Android.sendData) {
                    window.Android.sendData(data);
                }
            } catch(e) {
                log('❌ Failed to send data via CH340', 'error');
            }
        }

        // ============================================
        // UNIVERSAL USB CONNECTION HANDLERS
        // ============================================
        async function connectUsb() {
            log('🔍 Detecting USB device type...', 'info');
            updateUsbStatus('connecting');
            
            // First, try to auto-detect
            const detectedDevice = await autoDetectUSBDevice();
            
            if (detectedDevice && detectedDevice.type === 'ft232r') {
                // Connect FT232R via WebUSB
                await connectFT232R();
            } else if (detectedDevice && detectedDevice.type === 'ch340') {
                // Connect CH340 via Android Bridge
                connectCH340();
            } else {
                // No device detected, ask user to select or connect manually
                log('⚠️ No device auto-detected. Please ensure USB is connected.', 'warning');
                showToast('Please connect USB meter and try again', 'warning');
                updateUsbStatus('disconnected');
                
                // Fallback: Try Android Bridge anyway (for CH340)
                if (window.Android) {
                    log('🔄 Trying Android Bridge fallback...', 'info');
                    connectCH340();
                } else if (navigator.usb) {
                    log('🔄 Trying WebUSB fallback...', 'info');
                    await connectFT232R();
                }
            }
        }

        function disconnectUsb() {
            if (isServerRunning) {
                stopServer();
            }
            
            stopUsbHealthCheck();
            
            if (currentDeviceType === 'ch340') {
                disconnectCH340();
            } else if (currentDeviceType === 'ft232r') {
                disconnectFT232R();
            }
            
            isUsbConnected = false;
            isReconnecting = false;
            reconnectAttempts = 0;
            currentDeviceType = null;
            updateUsbStatus('disconnected');
            updateServerButton();
            log('🔌 USB Disconnected', 'warning');
        }

        function toggleUsb() {
            if (isReconnecting) {
                log('⏳ Reconnection in progress...', 'warning');
                return;
            }
            
            if (isUsbConnected) {
                disconnectUsb();
            } else {
                connectUsb();
            }
        }

        // ============================================
        // DATA PROCESSING (Universal)
        // ============================================
        function arrayBufferToHex(buffer) {
            const bytes = new Uint8Array(buffer);
            let hex = '';
            for (let i = 0; i < bytes.length; i++) {
                hex += bytes[i].toString(16).padStart(2, '0').toUpperCase();
            }
            return hex;
        }

        function processReceivedData(hexData, textData) {
            if (!isServerRunning) return;
            
            lastDataTime = Date.now();

            // Detect request type and show simple status
            if (hexData.includes("935A64")) {
                log('🔄 Connection request received...', 'info');
            } else if (hexData.includes("A041034110") || hexData.includes("A044034110")) {
                log('🔄 Authentication in progress...', 'info');
            } else if (hexData.includes("0100010800")) {
                log('📊 Reading meter clock...', 'info');
            } else if (hexData.includes("0100600100")) {
                log('📊 Reading meter serial...', 'info');
            } else if (hexData.includes("0201020204")) {
                log('📊 Reading billing data...', 'info');
                
                if (!creditDeductedThisSession) {
                    const success = deductCredit();
                    if (success !== false) {
                        creditDeductedThisSession = true;
                    }
                }
            } else if (hexData.includes("0100010700") || hexData.includes("0100030700")) {
                log('📊 Reading instant values...', 'info');
            } else if (hexData.includes("5356A2")) {
                log('✅ Reading Complete!', 'success');
                
                try { if (window.Android) Android.vibrate(100); } catch(e) {}
            }

            // Process and send response
            const reply = CurrentLogic.processPacket(hexData);
            if (reply) {
                setTimeout(() => {
                    if (currentDeviceType === 'ch340') {
                        sendCH340Data(reply);
                    } else if (currentDeviceType === 'ft232r' && ft232rDevice && ft232rDevice.opened) {
                        sendFT232RData(ft232rDevice, reply);
                    }
                }, 50);
            }
        }

        // ============================================
        // USB STATUS UI UPDATES
        // ============================================
        function updateUsbStatus(status) {
            const card = elements.usbStatusCard;
            const dot = elements.usbDot;
            const text = elements.usbStatusText;
            const sub = elements.usbStatusSub;
            const signal = elements.usbSignal;
            const btn = elements.btnUsb;

            card.classList.remove('connected', 'reconnecting');
            dot.classList.remove('connected', 'reconnecting');
            btn.classList.remove('connected', 'reconnecting');

            const deviceName = currentDeviceType === 'ch340' ? 'CH340' : (currentDeviceType === 'ft232r' ? 'FT232R' : 'USB');

            switch(status) {
                case 'connected':
                    card.classList.add('connected');
                    dot.classList.add('connected');
                    btn.classList.add('connected');
                    text.textContent = `✅ ${deviceName} Connected`;
                    sub.textContent = `${deviceName} • 9600 baud • Ready`;
                    signal.textContent = '● Active';
                    signal.style.color = '#00e676';
                    btn.textContent = '🔌 DISCONNECT USB';
                    break;
                    
                case 'reconnecting':
                    card.classList.add('reconnecting');
                    dot.classList.add('reconnecting');
                    btn.classList.add('reconnecting');
                    text.textContent = `🔄 Reconnecting ${deviceName}...`;
                    sub.textContent = `Attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}`;
                    signal.textContent = '● Weak';
                    signal.style.color = '#ff9800';
                    btn.textContent = '⏳ RECONNECTING...';
                    break;
                    
                case 'connecting':
                    text.textContent = '🔌 Connecting USB...';
                    sub.textContent = 'Detecting device type...';
                    signal.textContent = '';
                    btn.textContent = '⏳ CONNECTING...';
                    break;
                    
                case 'disconnected':
                default:
                    text.textContent = '❌ No USB Device Connected';
                    sub.textContent = 'Connect CH340 or FT232R meter';
                    signal.textContent = '';
                    btn.textContent = '🔌 CONNECT USB';
                    currentDeviceType = null;
                    break;
            }
        }

        // ============================================
        // USB HEALTH CHECK
        // ============================================
        function startUsbHealthCheck() {
            stopUsbHealthCheck();
            
            lastDataTime = Date.now();
            
            usbHealthCheckInterval = setInterval(() => {
                if (!isUsbConnected || !isServerRunning) return;
                
                const timeSinceData = Date.now() - lastDataTime;
                const signal = elements.usbSignal;
                
                if (timeSinceData < 5000) {
                    signal.textContent = '● Active';
                    signal.style.color = '#00e676';
                } else if (timeSinceData < 15000) {
                    signal.textContent = '● Idle';
                    signal.style.color = '#888';
                } else {
                    signal.textContent = '● Waiting...';
                    signal.style.color = '#ff9800';
                }
            }, 2000);
        }

        function stopUsbHealthCheck() {
            if (usbHealthCheckInterval) {
                clearInterval(usbHealthCheckInterval);
                usbHealthCheckInterval = null;
            }
        }

        // ============================================
        // CREDIT MANAGEMENT
        // ============================================
        function updateCreditsDisplay() {
            const totalDisplay = elements.creditsDisplay;
            const dailyDisplayElem = elements.dailyDisplay;
            
            totalDisplay.textContent = `Credits: ${userCredits}`;
            totalDisplay.classList.remove('low', 'critical');
            if (userCredits <= 10) totalDisplay.classList.add('critical');
            else if (userCredits <= 50) totalDisplay.classList.add('low');

            const remaining = dailyLimit - dailyUsed;
            dailyDisplayElem.textContent = `Today: ${dailyUsed}/${dailyLimit}`;
        }

        function canUseCredit() {
            if (userCredits <= 0) return { allowed: false, reason: "Subscription Expired" };
            if (dailyUsed >= dailyLimit) return { allowed: false, reason: "Daily limit reached!" };
            return { allowed: true, reason: "" };
        }

        async function deductCredit() {
            if (!currentUser) {
                log('❌ No user logged in', 'error');
                return false;
            }

            if (creditDeductedThisSession) {
                return false;
            }

            const check = canUseCredit();
            if (!check.allowed) {
                showToast(check.reason, 'error');
                log(`❌ ${check.reason}`, 'error');
                
                if (check.reason === "Subscription Expired") {
                    setTimeout(async () => {
                        await auth.signOut();
                        window.location.href = 'index.html';
                    }, 2000);
                }
                return false;
            }

            try {
                const today = getTodayDate();
                
                await db.collection('users').doc(currentUser.uid).update({
                    credits: firebase.firestore.FieldValue.increment(-1),
                    dailyUsed: firebase.firestore.FieldValue.increment(1),
                    lastResetDate: today,
                    lastReading: firebase.firestore.FieldValue.serverTimestamp()
                });

                userCredits--;
                dailyUsed++;
                updateCreditsDisplay();
                showToast(`💳 Credit Used | Today: ${dailyUsed}/${dailyLimit} | Total: ${userCredits}`, 'success');
                log(`💳 Credit Deducted - Today: ${dailyUsed}/${dailyLimit} | Total: ${userCredits}`, 'credit');

                if (userCredits <= 0) {
                    log('⚠️ Credits exhausted! Logging out...', 'error');
                    setTimeout(async () => {
                        await auth.signOut();
                        window.location.href = 'index.html';
                    }, 2000);
                }
                
                return true;

            } catch (error) {
                console.error('Error deducting credit:', error);
                log('❌ Credit deduction failed - check internet', 'error');
                return false;
            }
        }

        // ============================================
        // USER DATA & AUTHENTICATION
        // ============================================
        async function loadUserData() {
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    userCredits = data.credits || 0;
                    dailyLimit = data.dailyLimit || 40;
                    dailyUsed = data.dailyUsed || 0;
                    lastResetDate = data.lastResetDate || "";

                    const today = getTodayDate();
                    if (lastResetDate !== today) {
                        dailyUsed = 0;
                        lastResetDate = today;
                        await db.collection('users').doc(currentUser.uid).update({
                            dailyUsed: 0,
                            lastResetDate: today
                        });
                    }
                    updateCreditsDisplay();
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        async function logout() {
            stopUsbHealthCheck();
            disconnectUsb();
            try {
                await auth.signOut();
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
            }
        }

        // ============================================
        // SERVER FUNCTIONS
        // ============================================
        function updateServerButton() {
            const btn = elements.btnServer;
            btn.classList.remove('ready', 'running');

            if (!isUsbConnected) {
                btn.textContent = '▶️ START SERVER';
            } else if (isServerRunning) {
                btn.textContent = '⏹️ STOP SERVER';
                btn.classList.add('running');
            } else {
                btn.textContent = '▶️ START SERVER';
                btn.classList.add('ready');
            }
        }

        function updateServerStatus() {
            const status = elements.serverStatus;
            const text = elements.serverStatusText;
            
            status.classList.remove('running');
            
            if (isServerRunning) {
                status.classList.add('running');
                text.textContent = '🟢 Server Running - Ready for Reading';
            } else {
                text.textContent = 'Server Stopped';
            }
        }

        function startServer() {
            const check = canUseCredit();
            if (!check.allowed) {
                showToast(check.reason, 'error');
                log(`❌ ${check.reason}`, 'error');
                return;
            }

            creditDeductedThisSession = false;

            const meterType = elements.meterSelect.value;
            if (meterType === 'avon') {
                CurrentLogic = Logic;
            } else if (meterType === 'avon2') {
                CurrentLogic = Logic_Avon2;
            } else if (meterType === 'hpl') {
                CurrentLogic = Logic_HPL;
            } else if (meterType === 'genus') {
                CurrentLogic = Logic_Genus;
            } else {
                CurrentLogic = Logic_MT;
            }

            CurrentLogic.init();
            updateUIValues();

            isServerRunning = true;
            updateServerButton();
            updateServerStatus();
            lockConfig(true);
            startUsbHealthCheck();

            const meterName = meterType.toUpperCase();
            const deviceName = currentDeviceType === 'ch340' ? 'CH340' : (currentDeviceType === 'ft232r' ? 'FT232R' : 'USB');
            log(`▶️ Server Started (${meterName} on ${deviceName})`, 'success');
            log('📡 Waiting for meter reading request...', 'info');
        }

        function stopServer() {
            isServerRunning = false;
            creditDeductedThisSession = false;
            
            stopUsbHealthCheck();
            updateServerButton();
            updateServerStatus();
            lockConfig(false);
            log('⏹️ Server Stopped', 'warning');
        }

        function toggleServer() {
            if (!isUsbConnected) {
                log('⚠️ Connect USB first!', 'warning');
                showToast('Connect USB meter first!', 'warning');
                return;
            }

            if (isServerRunning) {
                stopServer();
            } else {
                startServer();
            }
        }

        // ============================================
        // ANDROID BRIDGE CALLBACKS (for CH340)
        // ============================================
        function onConnected(message) {
            if (currentDeviceType === 'ch340' || !currentDeviceType) {
                isUsbConnected = true;
                isReconnecting = false;
                reconnectAttempts = 0;
                currentDeviceType = 'ch340';
                updateUsbStatus('connected');
                updateServerButton();
                log('✅ CH340 Connected Successfully', 'success');
                try { if (window.Android) Android.vibrate(100); } catch(e) {}
            }
        }

        function onUsbAttached() {
            log('🔌 USB Cable Detected', 'info');
            showToast('USB Detected - Connecting...', 'success');
            
            setTimeout(() => {
                if (!isUsbConnected) {
                    connectUsb();
                }
            }, 500);
        }

        function onUsbDetached() {
            log('⚠️ USB Disconnected!', 'error');
            showToast('USB Disconnected!', 'error');
            
            const wasRunning = isServerRunning;
            
            isUsbConnected = false;
            isServerRunning = false;
            updateUsbStatus('disconnected');
            updateServerButton();
            updateServerStatus();
            stopUsbHealthCheck();
            
            try { if (window.Android) Android.vibrate(200); } catch(e) {}
            
            if (wasRunning) {
                log('⏹️ Server stopped due to USB disconnect', 'warning');
            }
        }

        function onUsbError(errorMessage) {
            log(`❌ USB Error: ${errorMessage}`, 'error');
            
            if (isUsbConnected && !isReconnecting) {
                isUsbConnected = false;
                attemptReconnect();
            } else if (isReconnecting) {
                setTimeout(attemptReconnect, 2000);
            } else {
                updateUsbStatus('disconnected');
                showToast('USB Connection Failed - ' + errorMessage, 'error');
            }
        }

        function onUsbPermissionDenied() {
            log('❌ USB Permission Denied - Please allow access', 'error');
            showToast('Please allow USB access!', 'error');
            updateUsbStatus('disconnected');
        }

        function onDataReceived(hexData) {
            processReceivedData(hexData, "");
        }

        function onLog(message) {
            if (message.includes("RX:") || message.includes("TX:")) return;
            if (message.includes("hex") || message.includes("byte")) return;
            
            if (message.includes("error") || message.includes("Error")) {
                log(`❌ ${message}`, 'error');
            }
        }

        // ============================================
        // RECONNECT LOGIC
        // ============================================
        function attemptReconnect() {
            if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                log('❌ Reconnection failed after 3 attempts', 'error');
                showToast('USB Connection Lost - Please reconnect manually', 'error');
                isReconnecting = false;
                reconnectAttempts = 0;
                updateUsbStatus('disconnected');
                updateServerButton();
                return;
            }
            
            reconnectAttempts++;
            isReconnecting = true;
            updateUsbStatus('reconnecting');
            log(`🔄 Reconnect attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}...`, 'warning');
            
            setTimeout(() => {
                connectUsb();
            }, 2000);
        }

        // ============================================
        // NET GUARD (Placeholder)
        // ============================================
        function initNetGuard() {
            console.log('Net guard initialized for universal USB');
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        async function initApp() {
            CurrentLogic = Logic;
            CurrentLogic.init();
            updateUsbStatus('disconnected');
            updateServerStatus();
            initNetGuard();
            
            // Auto-detect on load
            const detected = await autoDetectUSBDevice();
            if (detected) {
                log(`ℹ️ Detected: ${detected.name} (${detected.type.toUpperCase()})`, 'info');
            }
            
            log('🚀 Universal USB Server Ready', 'success');
            log('📱 Supports: CH340 (Android Bridge) & FT232R (WebUSB)', 'info');
            log('🔌 Connect USB meter to begin', 'info');
        }

        // Firebase initialization
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Check authentication
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData();
                if (userCredits <= 0) {
                    await auth.signOut();
                    window.location.href = 'index.html';
                }
                initApp();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
