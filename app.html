<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEBPERA · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ----- WHITE MODERN THEME ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1e293b;
            padding: 0;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 32px;
        }

        /* ----- APP HEADER (elevated) ----- */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0,0,0,0.02);
            margin-bottom: 24px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .app-header .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2563eb, #0f2b5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .credits-box {
            text-align: right;
        }

        .credits-box .total {
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2563eb;
            border: 1px solid #dbeafe;
            display: inline-block;
            box-shadow: 0 2px 4px rgba(37,99,235,0.1);
        }

        .credits-box .total.low {
            background: #fff7ed;
            color: #c2410c;
            border-color: #fed7aa;
        }

        .credits-box .total.critical {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #fecaca;
        }

        .credits-box .daily {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
        }

        .logout-btn {
            background: white;
            border: 1px solid #e2e8f0;
            color: #475569;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .logout-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #0f172a;
        }

        /* ----- USB STATUS CARD (modern) ----- */
        .usb-status-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.02);
            transition: all 0.2s;
        }

        .usb-status-card.connected {
            box-shadow: 0 10px 25px -8px #22c55e40;
        }

        .usb-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .usb-status-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .usb-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 0 3px #fee2e2;
        }

        .usb-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 0 3px #dcfce7;
        }

        .usb-dot.reconnecting {
            background: #f97316;
            box-shadow: 0 0 0 3px #ffedd5;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 3px #ffedd5; }
            50% { box-shadow: 0 0 0 6px #ffedd5; opacity: 0.7; }
        }

        .usb-status-text {
            font-weight: 600;
            font-size: 1rem;
            color: #1e293b;
        }

        .usb-status-sub {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .usb-signal {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #334155;
            font-weight: 500;
        }

        /* ----- CARD (white, soft) ----- */
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .card h3 {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        /* form elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #0f172a;
            transition: all 0.15s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px #dbeafe;
            background: white;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .half {
            flex: 1;
        }

        /* ----- BUTTON ROW (elegant) ----- */
        .button-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .button-row button {
            flex: 1;
            padding: 18px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }

        .btn-usb {
            background: #2563eb;
            color: white;
            box-shadow: 0 12px 20px -14px #2563eb;
        }

        .btn-usb:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-usb.connected {
            background: #22c55e;
            box-shadow: 0 12px 20px -14px #22c55e;
        }

        .btn-usb.reconnecting {
            background: #f97316;
            box-shadow: 0 12px 20px -14px #f97316;
            animation: softBlink 1.2s infinite;
        }

        @keyframes softBlink {
            0% { opacity: 1; }
            50% { opacity: 0.8; background: #fb923c; }
        }

        .btn-server {
            background: #e2e8f0;
            color: #64748b;
            cursor: default;
        }

        .btn-server.ready {
            background: #2563eb;
            color: white;
            box-shadow: 0 12px 20px -14px #2563eb;
            cursor: pointer;
        }

        .btn-server.ready:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-server.running {
            background: #ef4444;
            color: white;
            box-shadow: 0 12px 20px -14px #ef4444;
            cursor: pointer;
        }

        .btn-server.running:hover {
            background: #dc2626;
        }

        /* ----- SERVER STATUS (minimal) ----- */
        .server-status {
            background: #f8fafc;
            border-radius: 40px;
            padding: 16px 24px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .server-status .status-text {
            font-weight: 500;
            color: #475569;
        }

        .server-status.running .status-text {
            color: #22c55e;
            font-weight: 600;
        }

        /* ----- LOG BOX (clean) ----- */
        .log-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.8rem;
            color: #1e293b;
            margin-top: 12px;
        }

        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-entry.success { color: #16a34a; }
        .log-entry.warning { color: #ea580c; }
        .log-entry.error { color: #dc2626; }
        .log-entry.info { color: #2563eb; }
        .log-entry.credit { color: #16a34a; font-weight: 600; }
        .log-entry .time { color: #94a3b8; margin-right: 12px; }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .btn-small {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-small:hover {
            background: #e2e8f0;
        }

        /* toast notification */
        .credit-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #0f172a;
            padding: 14px 30px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            border: 1px solid #e2e8f0;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .credit-toast.show {
            opacity: 1;
        }

        .credit-toast.error { background: #ef4444; color: white; border: none; }
        .credit-toast.warning { background: #f97316; color: white; border: none; }

        /* blackout overlay */
        .blackout {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .blackout.active {
            display: flex;
        }

        .blackout-msg {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .blackout-sub {
            color: #475569;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Blackout -->
    <div class="blackout" id="blackout">
        <div class="blackout-msg">📡 No Internet Connection</div>
        <div class="blackout-sub">Please connect to continue</div>
    </div>

    <!-- Toast -->
    <div class="credit-toast" id="creditToast">💳 Credit Used</div>

    <div class="container">
        <!-- App Header -->
        <div class="app-header">
            <div class="logo">WEBPERA</div>
            <div class="user-info">
                <div class="credits-box">
                    <div class="total" id="creditsDisplay">Credits: --</div>
                    <div class="daily" id="dailyDisplay">Today: --/--</div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- USB Status Card -->
        <div class="usb-status-card" id="usbStatusCard">
            <div class="usb-status-row">
                <div class="usb-status-left">
                    <div class="usb-dot" id="usbDot"></div>
                    <div>
                        <div class="usb-status-text" id="usbStatusText">USB Not Connected</div>
                        <div class="usb-status-sub" id="usbStatusSub">Connect USB cable</div>
                    </div>
                </div>
                <div class="usb-status-right">
                    <div class="usb-signal" id="usbSignal">—</div>
                </div>
            </div>
        </div>

        <!-- Meter Config Card -->
        <div class="card" id="configPanel">
            <h3>⚙️ Meter Configuration</h3>
            
            <div class="form-group">
                <label>Meter Profile</label>
                <select id="meterSelect">
                    <option value="avon">Avon Single Phase</option>
                    <option value="avon2">Avon 2 (New Model)</option>
                    <option value="genus">Genus Three Phase</option>
                    <option value="mt">MT Three Phase</option>
                    <option value="hpl">HPL Single Phase</option>
                </select>
            </div>

            <div class="form-group">
                <label>Serial No (Name Plate)</label>
                <input type="text" id="val_serial" value="" placeholder="e.g. 902345678">
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>Current kWh</label>
                    <input type="number" id="val_kwh" value="1234.5" step="0.1">
                </div>
                <div class="form-group half">
                    <label>Current kVAh</label>
                    <input type="number" id="val_kvah" value="1300.0" step="0.1">
                </div>
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>MD (kW)</label>
                    <input type="number" id="val_md_kw" value="1.2" step="0.1">
                </div>
                <div class="form-group half">
                    <label>MD (kVA)</label>
                    <input type="number" id="val_md_kva" value="1.8" step="0.1">
                </div>
            </div>
        </div>

        <!-- Two Action Buttons -->
        <div class="button-row">
            <button id="btnUsb" class="btn-usb" onclick="toggleUsb()">🔌 CONNECT USB</button>
            <button id="btnServer" class="btn-server" onclick="toggleServer()">▶️ START SERVER</button>
        </div>

        <!-- Server Status -->
        <div class="server-status" id="serverStatus">
            <div class="status-text" id="serverStatusText">Server Stopped</div>
        </div>

        <!-- Log Box -->
        <div class="card">
            <div class="log-header">
                <h3>📄 Status Log</h3>
                <button class="btn-small" onclick="clearLogs()">Clear</button>
            </div>
            <div id="logBox" class="log-box">
                <div class="log-entry info"><span class="time">[--:--]</span> System Ready. Connect USB.</div>
            </div>
        </div>
    </div>

    <!-- Firebase & scripts (keep as is) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
   <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>

    <!-- Net Guard -->
    <script src="js/net-guard.js"></script>

    <!-- Utils and Logic -->
    <script src="js/utils.js"></script>
    <script src="meters/avon.js"></script>
    <script src="meters/avon2.js"></script>
    <script src="meters/mt_profile.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/logic_avon2.js"></script>
    <script src="js/logic_mt.js"></script>
    <script src="meters/hpl.js"></script>
    <script src="js/logic_hpl.js"></script>
    <script src="meters/genus.js"></script>
    <script src="js/logic_genus.js"></script>

    <!-- Auth Handler -->
    <script src="js/auth.js"></script>

    <script>
        // ========== STATE VARIABLES ==========
        let isUsbConnected = false;
        let isServerRunning = false;
        let isReconnecting = false;
        let currentUser = null;
        let userCredits = 0;
        let dailyLimit = 40;
        let dailyUsed = 0;
        let lastResetDate = "";
        let creditDeductedThisSession = false;
        
        // USB monitoring
        let lastDataTime = 0;
        let usbHealthCheckInterval = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 3;

        // Default = AVON
        var CurrentLogic = Logic;

        // ========== FIREBASE INIT ==========
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Check authentication
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData();
                if (userCredits <= 0) {
                    await auth.signOut();
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        // ========== USER DATA ==========
        function getTodayDate() {
            return new Date().toISOString().split('T')[0];
        }

        async function loadUserData() {
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    userCredits = data.credits || 0;
                    dailyLimit = data.dailyLimit || 40;
                    dailyUsed = data.dailyUsed || 0;
                    lastResetDate = data.lastResetDate || "";

                    const today = getTodayDate();
                    if (lastResetDate !== today) {
                        dailyUsed = 0;
                        lastResetDate = today;
                        await db.collection('users').doc(currentUser.uid).update({
                            dailyUsed: 0,
                            lastResetDate: today
                        });
                    }
                    updateCreditsDisplay();
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        function updateCreditsDisplay() {
            const totalDisplay = document.getElementById('creditsDisplay');
            const dailyDisplay = document.getElementById('dailyDisplay');
            
            totalDisplay.textContent = `Credits: ${userCredits}`;
            totalDisplay.classList.remove('low', 'critical');
            if (userCredits <= 10) totalDisplay.classList.add('critical');
            else if (userCredits <= 50) totalDisplay.classList.add('low');

            const remaining = dailyLimit - dailyUsed;
            dailyDisplay.textContent = `Today: ${dailyUsed}/${dailyLimit}`;
            dailyDisplay.classList.remove('warning', 'exhausted');
            if (remaining <= 0) dailyDisplay.classList.add('exhausted');
            else if (remaining <= 5) dailyDisplay.classList.add('warning');
        }

        function canUseCredit() {
            if (userCredits <= 0) return { allowed: false, reason: "Subscription Expired" };
            if (dailyUsed >= dailyLimit) return { allowed: false, reason: "Daily limit reached!" };
            return { allowed: true, reason: "" };
        }

        async function deductCredit() {
            if (!currentUser) {
                log('❌ No user logged in', 'error');
                return false;
            }

            if (creditDeductedThisSession) {
                log('⚠️ Credit already deducted this session', 'warning');
                return false;
            }

            const check = canUseCredit();
            if (!check.allowed) {
                showToast(check.reason, 'error');
                log(`❌ ${check.reason}`, 'error');
                
                if (check.reason === "Subscription Expired") {
                    setTimeout(async () => {
                        await auth.signOut();
                        window.location.href = 'index.html';
                    }, 2000);
                }
                return false;
            }

            try {
                const today = getTodayDate();
                
                await db.collection('users').doc(currentUser.uid).update({
                    credits: firebase.firestore.FieldValue.increment(-1),
                    dailyUsed: firebase.firestore.FieldValue.increment(1),
                    lastResetDate: today,
                    lastReading: firebase.firestore.FieldValue.serverTimestamp()
                });

                userCredits--;
                dailyUsed++;
                updateCreditsDisplay();
                showToast(`💳 Credit Used | Today: ${dailyUsed}/${dailyLimit} | Total: ${userCredits}`, 'success');
                log(`💳 Credit Deducted - Today: ${dailyUsed}/${dailyLimit} | Total: ${userCredits}`, 'credit');

                if (userCredits <= 0) {
                    log('⚠️ Credits exhausted! Logging out...', 'error');
                    setTimeout(async () => {
                        await auth.signOut();
                        window.location.href = 'index.html';
                    }, 2000);
                }
                
                return true;

            } catch (error) {
                console.error('Error deducting credit:', error);
                log('❌ Credit deduction failed - check internet', 'error');
                return false;
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('creditToast');
            toast.textContent = message;
            toast.classList.remove('error', 'warning');
            if (type === 'error') toast.classList.add('error');
            if (type === 'warning') toast.classList.add('warning');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function logout() {
            stopUsbHealthCheck();
            try {
                await auth.signOut();
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
            }
        }

        // ========== USB FUNCTIONS ==========
        function toggleUsb() {
            if (isReconnecting) {
                log('⏳ Reconnection in progress...', 'warning');
                return;
            }
            
            if (isUsbConnected) {
                disconnectUsb();
            } else {
                connectUsb();
            }
        }

        function connectUsb() {
            log('🔌 Connecting USB...', 'info');
            updateUsbStatus('connecting');
            
            try {
                Android.connectUSB();
            } catch(e) {
                log('❌ USB connection failed - Android bridge not found', 'error');
                updateUsbStatus('disconnected');
            }
        }

        function disconnectUsb() {
            if (isServerRunning) {
                stopServer();
            }
            
            stopUsbHealthCheck();
            
            try {
                Android.disconnect();
            } catch(e) {}
            
            isUsbConnected = false;
            isReconnecting = false;
            reconnectAttempts = 0;
            updateUsbStatus('disconnected');
            updateServerButton();
            log('🔌 USB Disconnected', 'warning');
        }

        function updateUsbStatus(status) {
            const card = document.getElementById('usbStatusCard');
            const dot = document.getElementById('usbDot');
            const text = document.getElementById('usbStatusText');
            const sub = document.getElementById('usbStatusSub');
            const signal = document.getElementById('usbSignal');
            const btn = document.getElementById('btnUsb');

            card.classList.remove('connected', 'reconnecting');
            dot.classList.remove('connected', 'reconnecting');
            btn.classList.remove('connected', 'reconnecting');

            switch(status) {
                case 'connected':
                    card.classList.add('connected');
                    dot.classList.add('connected');
                    btn.classList.add('connected');
                    text.textContent = '✅ USB Connected';
                    sub.textContent = 'CH340 Serial • 9600 baud';
                    signal.textContent = '● Strong';
                    signal.style.color = '#00e676';
                    btn.textContent = '🔌 DISCONNECT USB';
                    break;
                    
                case 'reconnecting':
                    card.classList.add('reconnecting');
                    dot.classList.add('reconnecting');
                    btn.classList.add('reconnecting');
                    text.textContent = '🔄 Reconnecting...';
                    sub.textContent = `Attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}`;
                    signal.textContent = '● Weak';
                    signal.style.color = '#ff9800';
                    btn.textContent = '⏳ RECONNECTING...';
                    break;
                    
                case 'connecting':
                    text.textContent = '🔌 Connecting...';
                    sub.textContent = 'Please wait';
                    signal.textContent = '';
                    btn.textContent = '⏳ CONNECTING...';
                    break;
                    
                case 'disconnected':
                default:
                    text.textContent = '❌ USB Not Connected';
                    sub.textContent = 'Connect USB cable to begin';
                    signal.textContent = '';
                    btn.textContent = '🔌 CONNECT USB';
                    break;
            }
        }

        // ========== USB HEALTH CHECK ==========
        function startUsbHealthCheck() {
            stopUsbHealthCheck(); // Clear any existing
            
            lastDataTime = Date.now();
            
            usbHealthCheckInterval = setInterval(() => {
                if (!isUsbConnected || !isServerRunning) return;
                
                // Check if we received data recently (within 30 sec during active session)
                const timeSinceData = Date.now() - lastDataTime;
                
                // Update signal indicator
                const signal = document.getElementById('usbSignal');
                if (timeSinceData < 5000) {
                    signal.textContent = '● Active';
                    signal.style.color = '#00e676';
                } else if (timeSinceData < 15000) {
                    signal.textContent = '● Idle';
                    signal.style.color = '#888';
                } else {
                    signal.textContent = '● Waiting...';
                    signal.style.color = '#ff9800';
                }
            }, 2000);
        }

        function stopUsbHealthCheck() {
            if (usbHealthCheckInterval) {
                clearInterval(usbHealthCheckInterval);
                usbHealthCheckInterval = null;
            }
        }

        // ========== USB AUTO RECONNECT ==========
        function attemptReconnect() {
            if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                log('❌ Reconnection failed after 3 attempts', 'error');
                showToast('USB Connection Lost - Please reconnect manually', 'error');
                isReconnecting = false;
                reconnectAttempts = 0;
                updateUsbStatus('disconnected');
                updateServerButton();
                return;
            }
            
            reconnectAttempts++;
            isReconnecting = true;
            updateUsbStatus('reconnecting');
            log(`🔄 Reconnect attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}...`, 'warning');
            
            setTimeout(() => {
                try {
                    Android.connectUSB();
                } catch(e) {
                    // Will trigger onUsbError or retry
                    setTimeout(attemptReconnect, 2000);
                }
            }, 1000);
        }

        // ========== SERVER FUNCTIONS ==========
        function toggleServer() {
            if (!isUsbConnected) {
                log('⚠️ Connect USB first!', 'warning');
                showToast('Connect USB first!', 'warning');
                return;
            }

            if (isServerRunning) {
                stopServer();
            } else {
                startServer();
            }
        }

        function startServer() {
            const check = canUseCredit();
            if (!check.allowed) {
                showToast(check.reason, 'error');
                log(`❌ ${check.reason}`, 'error');
                return;
            }

            creditDeductedThisSession = false;

            const meterType = document.getElementById('meterSelect').value;
            if (meterType === 'avon') {
                CurrentLogic = Logic;
            } else if (meterType === 'avon2') {
                CurrentLogic = Logic_Avon2;
            } else if (meterType === 'hpl') {
                CurrentLogic = Logic_HPL;
            } else if (meterType === 'genus') {
                CurrentLogic = Logic_Genus;
            } else {
                CurrentLogic = Logic_MT;
            }

            CurrentLogic.init();
            updateUIValues();

            isServerRunning = true;
            updateServerButton();
            updateServerStatus();
            lockConfig(true);
            startUsbHealthCheck();

            const meterName = meterType.toUpperCase();
            log(`▶️ Server Started (${meterName})`, 'success');
            log('📡 Waiting for meter reading request...', 'info');
        }

        function stopServer() {
            isServerRunning = false;
            creditDeductedThisSession = false;
            
            stopUsbHealthCheck();
            updateServerButton();
            updateServerStatus();
            lockConfig(false);
            log('⏹️ Server Stopped', 'warning');
        }

        function updateServerButton() {
            const btn = document.getElementById('btnServer');
            btn.classList.remove('ready', 'running');

            if (!isUsbConnected) {
                btn.textContent = '▶️ START SERVER';
            } else if (isServerRunning) {
                btn.textContent = '⏹️ STOP SERVER';
                btn.classList.add('running');
            } else {
                btn.textContent = '▶️ START SERVER';
                btn.classList.add('ready');
            }
        }

        function updateServerStatus() {
            const status = document.getElementById('serverStatus');
            const text = document.getElementById('serverStatusText');
            
            status.classList.remove('running');
            
            if (isServerRunning) {
                status.classList.add('running');
                text.textContent = '🟢 Server Running - Ready for Reading';
            } else {
                text.textContent = 'Server Stopped';
            }
        }

        function lockConfig(lock) {
            const inputs = document.querySelectorAll('#configPanel input, #configPanel select');
            inputs.forEach(el => el.disabled = lock);
        }

        function updateUIValues() {
            CurrentLogic.uiValues.serial = document.getElementById('val_serial').value || "0000000";
            CurrentLogic.uiValues.kwh = parseFloat(document.getElementById('val_kwh').value) || 0;
            CurrentLogic.uiValues.kvah = parseFloat(document.getElementById('val_kvah').value) || 0;
            CurrentLogic.uiValues.md_kw = parseFloat(document.getElementById('val_md_kw').value) || 0;
            CurrentLogic.uiValues.md_kva = parseFloat(document.getElementById('val_md_kva').value) || 0;
        }

        // ========== LOGGING ==========
        function log(msg, type = '') {
            const box = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
            
            // Keep only last 100 entries
            while (box.children.length > 100) {
                box.removeChild(box.firstChild);
            }
        }

        function clearLogs() {
            document.getElementById('logBox').innerHTML = '';
            log('📜 Logs cleared', 'info');
        }

        // ========== ANDROID BRIDGE CALLBACKS ==========
        
        // ✅ USB Connected Successfully
        function onConnected(message) {
            isUsbConnected = true;
            isReconnecting = false;
            reconnectAttempts = 0;
            updateUsbStatus('connected');
            updateServerButton();
            log('✅ USB Connected Successfully', 'success');
            
            // Vibrate on success (if available)
            try { Android.vibrate(100); } catch(e) {}
        }

        // ✅ USB Attached (Plugged in)
        function onUsbAttached() {
            log('🔌 USB Cable Detected', 'info');
            showToast('USB Detected - Connecting...', 'success');
            
            // Auto connect
            setTimeout(() => {
                if (!isUsbConnected) {
                    connectUsb();
                }
            }, 500);
        }

        // ✅ USB Detached (Unplugged)
        function onUsbDetached() {
            log('⚠️ USB Cable Disconnected!', 'error');
            showToast('USB Disconnected!', 'error');
            
            const wasRunning = isServerRunning;
            
            isUsbConnected = false;
            isServerRunning = false;
            updateUsbStatus('disconnected');
            updateServerButton();
            updateServerStatus();
            stopUsbHealthCheck();
            
            // Vibrate on disconnect
            try { Android.vibrate(200); } catch(e) {}
            
            if (wasRunning) {
                log('⏹️ Server stopped due to USB disconnect', 'warning');
            }
        }

        // ✅ USB Error
        function onUsbError(errorMessage) {
            log(`❌ USB Error: ${errorMessage}`, 'error');
            
            if (isUsbConnected && !isReconnecting) {
                // Connection lost, try to reconnect
                isUsbConnected = false;
                attemptReconnect();
            } else if (isReconnecting) {
                // Reconnect attempt failed, try again
                setTimeout(attemptReconnect, 2000);
            } else {
                // Initial connection failed
                updateUsbStatus('disconnected');
                showToast('USB Connection Failed - ' + errorMessage, 'error');
            }
        }

        // ✅ USB Permission Denied
        function onUsbPermissionDenied() {
            log('❌ USB Permission Denied - Please allow access', 'error');
            showToast('Please allow USB access!', 'error');
            updateUsbStatus('disconnected');
        }

        // ✅ Data received from meter reading app
        function onDataReceived(hexData) {
            if (!isServerRunning) return;
            
            // Update last data time for health check
            lastDataTime = Date.now();

            // Detect request type and show simple status
            if (hexData.includes("935A64")) {
                log('🔄 Connection request received...', 'info');
            } else if (hexData.includes("A041034110") || hexData.includes("A044034110")) {
                log('🔄 Authentication in progress...', 'info');
            } else if (hexData.includes("0100010800")) {
                log('📊 Reading meter clock...', 'info');
            } else if (hexData.includes("0100600100")) {
                log('📊 Reading meter serial...', 'info');
            } else if (hexData.includes("0201020204")) {
                log('📊 Reading billing data...', 'info');
                
                if (!creditDeductedThisSession) {
                    const success = deductCredit();
                    if (success !== false) {
                        creditDeductedThisSession = true;
                    }
                }
            } else if (hexData.includes("0100010700") || hexData.includes("0100030700")) {
                log('📊 Reading instant values...', 'info');
            } else if (hexData.includes("5356A2")) {
                log('✅ Reading Complete!', 'success');
                
                // Vibrate on complete
                try { Android.vibrate(100); } catch(e) {}
            }

            // Process and send response
            const reply = CurrentLogic.processPacket(hexData);
            if (reply) {
                setTimeout(() => {
                    try {
                        Android.sendData(reply);
                    } catch(e) {
                        log('❌ Failed to send response', 'error');
                    }
                }, 50);
            }
        }

        // General log from Java
        function onLog(message) {
            // Filter out technical messages
            if (message.includes("RX:") || message.includes("TX:")) return;
            if (message.includes("hex") || message.includes("byte")) return;
            
            if (message.includes("error") || message.includes("Error")) {
                log(`❌ ${message}`, 'error');
            }
        }

        // ========== INIT ==========
        window.onload = function() {
            CurrentLogic = Logic;
            CurrentLogic.init();
            updateUsbStatus('disconnected');
            updateServerStatus();
            initNetGuard();
            
            log('🚀 Web Server Ready', 'success');
            log('📱 Connect USB cable to begin', 'info');
        };
    </script>
</body>
</html>
