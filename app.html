<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEBPERA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <style>
        /* ----- WHITE MODERN THEME ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1e293b;
            padding: 0;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 32px;
        }

        /* ----- APP HEADER (elevated) ----- */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0,0,0,0.02);
            margin-bottom: 24px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .app-header .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2563eb, #0f2b5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .credits-box {
            text-align: right;
        }

        .credits-box .total {
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2563eb;
            border: 1px solid #dbeafe;
            display: inline-block;
            box-shadow: 0 2px 4px rgba(37,99,235,0.1);
        }

        .credits-box .total.low {
            background: #fff7ed;
            color: #c2410c;
            border-color: #fed7aa;
        }

        .credits-box .total.critical {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #fecaca;
        }

        .credits-box .daily {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
        }

        .logout-btn {
            background: white;
            border: 1px solid #e2e8f0;
            color: #475569;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .logout-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #0f172a;
        }

        /* ----- USB STATUS CARD (modern) ----- */
        .usb-status-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.02);
            transition: all 0.2s;
        }

        .usb-status-card.connected {
            box-shadow: 0 10px 25px -8px #22c55e40;
        }

        .usb-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .usb-status-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .usb-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 0 3px #fee2e2;
        }

        .usb-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 0 3px #dcfce7;
        }

        .usb-dot.reconnecting {
            background: #f97316;
            box-shadow: 0 0 0 3px #ffedd5;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 3px #ffedd5; }
            50% { box-shadow: 0 0 0 6px #ffedd5; opacity: 0.7; }
        }

        .usb-status-text {
            font-weight: 600;
            font-size: 1rem;
            color: #1e293b;
        }

        .usb-status-sub {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .usb-signal {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #334155;
            font-weight: 500;
        }

        /* ----- CARD (white, soft) ----- */
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .card h3 {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        /* form elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #0f172a;
            transition: all 0.15s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px #dbeafe;
            background: white;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .half {
            flex: 1;
        }

        /* ----- BUTTON ROW (elegant) ----- */
        .button-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .button-row button {
            flex: 1;
            padding: 18px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }

        .btn-usb {
            background: #2563eb;
            color: white;
            box-shadow: 0 12px 20px -14px #2563eb;
        }

        .btn-usb:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-usb.connected {
            background: #22c55e;
            box-shadow: 0 12px 20px -14px #22c55e;
        }

        .btn-usb.reconnecting {
            background: #f97316;
            box-shadow: 0 12px 20px -14px #f97316;
            animation: softBlink 1.2s infinite;
        }

        @keyframes softBlink {
            0% { opacity: 1; }
            50% { opacity: 0.8; background: #fb923c; }
        }

        .btn-server {
            background: #e2e8f0;
            color: #64748b;
            cursor: default;
        }

        .btn-server.ready {
            background: #2563eb;
            color: white;
            box-shadow: 0 12px 20px -14px #2563eb;
            cursor: pointer;
        }

        .btn-server.ready:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-server.running {
            background: #ef4444;
            color: white;
            box-shadow: 0 12px 20px -14px #ef4444;
            cursor: pointer;
        }

        .btn-server.running:hover {
            background: #dc2626;
        }

        /* ----- SERVER STATUS (minimal) ----- */
        .server-status {
            background: #f8fafc;
            border-radius: 40px;
            padding: 16px 24px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .server-status .status-text {
            font-weight: 500;
            color: #475569;
        }

        .server-status.running .status-text {
            color: #22c55e;
            font-weight: 600;
        }

        /* ----- LOG BOX (clean) ----- */
        .log-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.8rem;
            color: #1e293b;
            margin-top: 12px;
        }

        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-entry.success { color: #16a34a; }
        .log-entry.warning { color: #ea580c; }
        .log-entry.error { color: #dc2626; }
        .log-entry.info { color: #2563eb; }
        .log-entry.credit { color: #16a34a; font-weight: 600; }
        .log-entry .time { color: #94a3b8; margin-right: 12px; }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .btn-small {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-small:hover {
            background: #e2e8f0;
        }

        /* toast notification */
        .credit-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #0f172a;
            padding: 14px 30px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            border: 1px solid #e2e8f0;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .credit-toast.show {
            opacity: 1;
        }

        .credit-toast.error { background: #ef4444; color: white; border: none; }
        .credit-toast.warning { background: #f97316; color: white; border: none; }

        /* blackout overlay */
        .blackout {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .blackout.active {
            display: flex;
        }

        .blackout-msg {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .blackout-sub {
            color: #475569;
            font-size: 0.9rem;
        }

        .chip-badge {
            display: inline-block;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-left: 8px;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <!-- Blackout -->
    <div class="blackout" id="blackout">
        <div class="blackout-msg">📡 No Internet Connection</div>
        <div class="blackout-sub">Please connect to continue</div>
    </div>

    <!-- Toast -->
    <div class="credit-toast" id="creditToast">💳 Credit Used</div>

    <div class="container">
        <!-- App Header -->
        <div class="app-header">
            <div class="logo">WEBPERA <span style="font-size: 0.7rem;">Universal USB</span></div>
            <div class="user-info">
                <div class="credits-box">
                    <div class="total" id="creditsDisplay">Credits: --</div>
                    <div class="daily" id="dailyDisplay">Today: --/--</div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- USB Status Card -->
        <div class="usb-status-card" id="usbStatusCard">
            <div class="usb-status-row">
                <div class="usb-status-left">
                    <div class="usb-dot" id="usbDot"></div>
                    <div>
                        <div class="usb-status-text" id="usbStatusText">No Device Connected</div>
                        <div class="usb-status-sub" id="usbStatusSub">Connect CH340 or FT232R USB meter</div>
                    </div>
                </div>
                <div class="usb-status-right">
                    <div class="usb-signal" id="usbSignal">—</div>
                </div>
            </div>
        </div>

        <!-- Meter Config Card -->
        <div class="card" id="configPanel">
            <h3>⚙️ Meter Configuration</h3>
            
            <div class="form-group">
                <label>Meter Profile</label>
                <select id="meterSelect">
                    <option value="avon">Avon Single Phase</option>
                    <option value="avon2">Avon 2 (New Model)</option>
                    <option value="genus">Genus Three Phase</option>
                    <option value="mt">MT Three Phase</option>
                    <option value="hpl">HPL Single Phase</option>
                </select>
            </div>

            <div class="form-group">
                <label>Serial No (Name Plate)</label>
                <input type="text" id="val_serial" value="" placeholder="e.g. 9023456">
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>Current kWh</label>
                    <input type="number" id="val_kwh" value="1234.5" step="0.1">
                </div>
                <div class="form-group half">
                    <label>Current kVAh</label>
                    <input type="number" id="val_kvah" value="1300.0" step="0.1">
                </div>
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>MD (kW)</label>
                    <input type="number" id="val_md_kw" value="1.2" step="0.1">
                </div>
                <div class="form-group half">
                    <label>MD (kVA)</label>
                    <input type="number" id="val_md_kva" value="1.8" step="0.1">
                </div>
            </div>
        </div>

        <!-- Two Action Buttons -->
        <div class="button-row">
            <button id="btnUsb" class="btn-usb" onclick="toggleUsb()">🔌 CONNECT USB</button>
            <button id="btnServer" class="btn-server" onclick="toggleServer()">▶️ START SERVER</button>
        </div>

        <!-- Server Status -->
        <div class="server-status" id="serverStatus">
            <div class="status-text" id="serverStatusText">Server Stopped</div>
        </div>

        <!-- Log Box -->
        <div class="card">
            <div class="log-header">
                <h3>📄 Status Log</h3>
                <button class="btn-small" onclick="clearLogs()">Clear</button>
            </div>
            <div id="logBox" class="log-box">
                <div class="log-entry info"><span class="time">[--:--]</span> System Ready. Connect USB meter.</div>
            </div>
        </div>
    </div>

    <!-- Firebase & scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>

    <!-- Net Guard -->
    <script src="js/net-guard.js"></script>

    <!-- Meter Logic Files -->
    <script src="meters/avon.js"></script>
    <script src="meters/avon2.js"></script>
    <script src="meters/mt_profile.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/logic_avon2.js"></script>
    <script src="js/logic_mt.js"></script>
    <script src="meters/hpl.js"></script>
    <script src="js/logic_hpl.js"></script>
    <script src="meters/genus.js"></script>
    <script src="js/logic_genus.js"></script>

    <!-- Auth Handler -->
    <script src="js/auth.js"></script>

    <script>
        // ============================================
		// UNIVERSAL USB DEVICE SUPPORT - FIXED VERSION
		// Supports: CH340 (Android Bridge) & FT232R (WebUSB)
		// ============================================
		
		// ============================================
		// DEVICE CONFIGURATIONS
		// ============================================
		const USB_DEVICES = {
			CH340: {
				type: 'ch340',
				name: 'CH340',
				vid: "1A86",
				pid: "7523",
				baudRate: 9600,
				useAndroidBridge: true,
				useWebUSB: false
			},
			FT232R: {
				type: 'ft232r',
				name: 'FT232R',
				vid: "0403",
				pid: "6001",
				baudRate: 9600,
				dataBits: 8,
				stopBits: 1,
				parity: "none",
				useAndroidBridge: false,
				useWebUSB: true
			}
		};
		
		let currentDeviceType = null; // 'ch340' or 'ft232r'
		let ft232rDevice = null;
		let isConnectingFT232R = false; // Flag to track FT232R connection attempt
		
		// ============================================
		// ANDROID BRIDGE CALLBACKS (Modified for CH340 only)
		// ============================================
		function onConnected(message) {
			// CRITICAL FIX: Only process if we're expecting CH340 or no device is set
			// AND we're NOT in the middle of FT232R connection
			if (!isConnectingFT232R && (currentDeviceType === 'ch340' || !currentDeviceType)) {
				isUsbConnected = true;
				isReconnecting = false;
				reconnectAttempts = 0;
				currentDeviceType = 'ch340';
				updateUsbStatus('connected');
				updateServerButton();
				log('✅ CH340 Connected Successfully', 'success');
				try { if (window.Android) Android.vibrate(100); } catch(e) {}
			} else if (isConnectingFT232R) {
				// This is a false positive from Android bridge, ignore it
				log('⚠️ Ignoring Android bridge signal while connecting FT232R', 'warning');
			}
		}
		
		function onUsbAttached() {
			// Don't auto-connect if we're already connecting FT232R
			if (!isConnectingFT232R) {
				log('🔌 USB Cable Detected', 'info');
				showToast('USB Detected - Connecting...', 'success');
				
				setTimeout(() => {
					if (!isUsbConnected && !isConnectingFT232R) {
						connectUsb();
					}
				}, 500);
			}
		}
		
		function onUsbDetached() {
			// Only handle if current device is CH340
			if (currentDeviceType === 'ch340') {
				log('⚠️ CH340 Disconnected!', 'error');
				showToast('CH340 Disconnected!', 'error');
				
				const wasRunning = isServerRunning;
				
				isUsbConnected = false;
				isServerRunning = false;
				updateUsbStatus('disconnected');
				updateServerButton();
				updateServerStatus();
				stopUsbHealthCheck();
				
				try { if (window.Android) Android.vibrate(200); } catch(e) {}
				
				if (wasRunning) {
					log('⏹️ Server stopped due to USB disconnect', 'warning');
				}
				currentDeviceType = null;
			}
		}
		
		function onUsbError(errorMessage) {
			// Only handle if current device is CH340 or no device
			if (currentDeviceType === 'ch340' || !currentDeviceType) {
				log(`❌ CH340 Error: ${errorMessage}`, 'error');
				
				if (isUsbConnected && !isReconnecting) {
					isUsbConnected = false;
					attemptReconnect();
				} else if (isReconnecting) {
					setTimeout(attemptReconnect, 2000);
				} else {
					updateUsbStatus('disconnected');
					showToast('CH340 Connection Failed - ' + errorMessage, 'error');
				}
			}
		}
		
		function onUsbPermissionDenied() {
			log('❌ USB Permission Denied - Please allow access', 'error');
			showToast('Please allow USB access!', 'error');
			updateUsbStatus('disconnected');
		}
		
		function onDataReceived(hexData) {
			// Process data regardless of device type
			processReceivedData(hexData, "");
		}
		
		function onLog(message) {
			if (message.includes("RX:") || message.includes("TX:")) return;
			if (message.includes("hex") || message.includes("byte")) return;
			
			if (message.includes("error") || message.includes("Error")) {
				log(`❌ ${message}`, 'error');
			}
		}
		
		// ============================================
		// FT232R SPECIFIC FUNCTIONS (WebUSB)
		// ============================================
		async function connectFT232R() {
			isConnectingFT232R = true;
			
			try {
				if (!navigator.usb) {
					throw new Error('WebUSB not supported in this browser');
				}
		
				log('🔌 Requesting FT232R device...', 'info');
				
				// Request FT232R device
				const device = await navigator.usb.requestDevice({
					filters: [
						{
							vendorId: parseInt(USB_DEVICES.FT232R.vid, 16),
							productId: parseInt(USB_DEVICES.FT232R.pid, 16)
						}
					]
				});
		
				ft232rDevice = device;
				
				log('📡 Opening FT232R device...', 'info');
				
				// Open the device
				await device.open();
				
				// Select configuration
				if (device.configuration === null) {
					await device.selectConfiguration(1);
				}
				
				// Claim interface
				await device.claimInterface(0);
				
				log('⚙️ Configuring FT232R serial parameters...', 'info');
				
				// Set serial port parameters for FT232R
				await device.controlTransferOut({
					requestType: 'class',
					recipient: 'interface',
					request: 0x22,  // SET_LINE_CODING
					value: 0,
					index: 0
				}, new Uint8Array([
					USB_DEVICES.FT232R.baudRate & 0xFF,
					(USB_DEVICES.FT232R.baudRate >> 8) & 0xFF,
					(USB_DEVICES.FT232R.baudRate >> 16) & 0xFF,
					(USB_DEVICES.FT232R.baudRate >> 24) & 0xFF,
					0,  // stop bits (1 stop bit)
					0,  // parity (none)
					8   // data bits (8)
				]));
				
				// Set RTS/DTR for FT232R
				await device.controlTransferOut({
					requestType: 'class',
					recipient: 'interface',
					request: 0x21,  // SET_CONTROL_LINE_STATE
					value: 0x0003,  // RTS | DTR
					index: 0
				});
				
				log('📖 Starting FT232R data reader...', 'info');
				
				// Start reading data
				readFT232RData(device);
				
				isUsbConnected = true;
				currentDeviceType = 'ft232r';
				updateUsbStatus('connected');
				updateServerButton();
				log(`✅ FT232R Connected Successfully at ${USB_DEVICES.FT232R.baudRate} baud`, 'success');
				
				try { if (window.Android) Android.vibrate(100); } catch(e) {}
				
				isConnectingFT232R = false;
				return true;
				
			} catch (error) {
				isConnectingFT232R = false;
				
				if (error.name === 'NotFoundError') {
					log('❌ FT232R device not found. Please ensure USB meter is connected.', 'error');
					showToast('FT232R not found - Please connect USB meter', 'error');
				} else if (error.name === 'SecurityError') {
					log('❌ USB permission denied. Please allow access to FT232R device.', 'error');
					showToast('Please allow FT232R USB access!', 'error');
				} else {
					log(`❌ FT232R connection error: ${error.message}`, 'error');
					showToast(`FT232R Error: ${error.message}`, 'error');
				}
				updateUsbStatus('disconnected');
				return false;
			}
		}
		
		async function readFT232RData(device) {
			let endpointIn = null;
			
			// Find input endpoint
			for (const endpoint of device.configuration.interfaces[0].alternate.endpoints) {
				if (endpoint.direction === 'in') {
					endpointIn = endpoint;
					break;
				}
			}
			
			if (!endpointIn) {
				log('❌ No input endpoint found on FT232R', 'error');
				return;
			}
			
			log('📡 FT232R reader active, waiting for data...', 'info');
			
			while (isUsbConnected && currentDeviceType === 'ft232r' && device.opened) {
				try {
					const result = await device.transferIn(endpointIn.endpointNumber, 64);
					
					if (result.data && result.data.byteLength > 0) {
						const hexData = arrayBufferToHex(result.data.buffer);
						const decoder = new TextDecoder();
						const textData = decoder.decode(result.data);
						
						lastDataTime = Date.now();
						
						// Log received data for debugging (optional)
						if (hexData.length > 0) {
							// console.log(`FT232R RX: ${hexData}`);
							processReceivedData(hexData, textData);
						}
					}
				} catch (error) {
					if (error.name !== 'NetworkError') {
						log(`FT232R read error: ${error.message}`, 'error');
					}
					break;
				}
			}
			
			log('📡 FT232R reader stopped', 'info');
		}
		
		async function sendFT232RData(device, data) {
			if (!device || !device.opened || currentDeviceType !== 'ft232r') return false;
			
			try {
				let endpointOut = null;
				
				// Find output endpoint
				for (const endpoint of device.configuration.interfaces[0].alternate.endpoints) {
					if (endpoint.direction === 'out') {
						endpointOut = endpoint;
						break;
					}
				}
				
				if (!endpointOut) {
					log('❌ No output endpoint found on FT232R', 'error');
					return false;
				}
				
				const encoder = new TextEncoder();
				const encodedData = encoder.encode(data);
				
				await device.transferOut(endpointOut.endpointNumber, encodedData);
				// console.log(`FT232R TX: ${data}`);
				return true;
				
			} catch (error) {
				log(`FT232R send error: ${error.message}`, 'error');
				return false;
			}
		}
		
		function disconnectFT232R() {
			if (ft232rDevice && ft232rDevice.opened) {
				try {
					ft232rDevice.close();
					log('🔌 FT232R device closed', 'info');
				} catch(e) {
					console.error('Error closing FT232R:', e);
				}
			}
			ft232rDevice = null;
		}
		
		// ============================================
		// CH340 SPECIFIC FUNCTIONS (Android Bridge)
		// ============================================
		function connectCH340() {
			log('🔌 Connecting CH340 via Android Bridge...', 'info');
			updateUsbStatus('connecting');
			currentDeviceType = 'ch340';
			
			try {
				if (window.Android && window.Android.connectUSB) {
					window.Android.connectUSB();
					log('✅ CH340 connection initiated', 'info');
				} else {
					throw new Error('Android bridge not available');
				}
			} catch(e) {
				log('❌ CH340 connection failed - Android bridge not found', 'error');
				updateUsbStatus('disconnected');
				currentDeviceType = null;
			}
		}
		
		function disconnectCH340() {
			try {
				if (window.Android && window.Android.disconnect) {
					window.Android.disconnect();
				}
			} catch(e) {}
		}
		
		function sendCH340Data(data) {
			try {
				if (window.Android && window.Android.sendData) {
					window.Android.sendData(data);
				}
			} catch(e) {
				log('❌ Failed to send data via CH340', 'error');
			}
		}
		
		// ============================================
		// UNIVERSAL USB CONNECTION HANDLERS (UPDATED)
		// ============================================
		async function connectUsb() {
			if (isUsbConnected) {
				log('⚠️ USB already connected', 'warning');
				return;
			}
			
			log('🔍 Detecting USB device type...', 'info');
			updateUsbStatus('connecting');
			
			// First, try WebUSB for FT232R
			if (navigator.usb) {
				log('🔍 Checking for FT232R via WebUSB...', 'info');
				try {
					const devices = await navigator.usb.getDevices();
					const ft232rFound = devices.find(device => 
						device.vendorId === parseInt(USB_DEVICES.FT232R.vid, 16) && 
						device.productId === parseInt(USB_DEVICES.FT232R.pid, 16)
					);
					
					if (ft232rFound) {
						log('✅ FT232R device found, connecting...', 'success');
						await connectFT232R();
						return;
					}
				} catch(e) {
					console.error('WebUSB check error:', e);
				}
			}
			
			// If no FT232R, try CH340 via Android Bridge
			if (window.Android) {
				log('🔍 Trying CH340 via Android Bridge...', 'info');
				connectCH340();
				
				// Set timeout for CH340 connection
				setTimeout(() => {
					if (!isUsbConnected && currentDeviceType === 'ch340') {
						log('⚠️ CH340 connection timeout', 'warning');
						updateUsbStatus('disconnected');
						currentDeviceType = null;
					}
				}, 5000);
			} else {
				log('❌ No USB connection method available', 'error');
				showToast('No USB support available in this browser', 'error');
				updateUsbStatus('disconnected');
			}
		}
		
		function disconnectUsb() {
			if (isServerRunning) {
				stopServer();
			}
			
			stopUsbHealthCheck();
			
			if (currentDeviceType === 'ch340') {
				disconnectCH340();
			} else if (currentDeviceType === 'ft232r') {
				disconnectFT232R();
			}
			
			isUsbConnected = false;
			isReconnecting = false;
			reconnectAttempts = 0;
			isConnectingFT232R = false;
			currentDeviceType = null;
			updateUsbStatus('disconnected');
			updateServerButton();
			log('🔌 USB Disconnected', 'warning');
		}
		
		function toggleUsb() {
			if (isReconnecting) {
				log('⏳ Reconnection in progress...', 'warning');
				return;
			}
			
			if (isUsbConnected) {
				disconnectUsb();
			} else {
				connectUsb();
			}
		}
		
		// ============================================
		// USB STATUS UI UPDATES (UPDATED)
		// ============================================
		function updateUsbStatus(status) {
			const card = elements.usbStatusCard;
			const dot = elements.usbDot;
			const text = elements.usbStatusText;
			const sub = elements.usbStatusSub;
			const signal = elements.usbSignal;
			const btn = elements.btnUsb;
		
			card.classList.remove('connected', 'reconnecting');
			dot.classList.remove('connected', 'reconnecting');
			btn.classList.remove('connected', 'reconnecting');
		
			const deviceName = currentDeviceType === 'ch340' ? 'CH340' : (currentDeviceType === 'ft232r' ? 'FT232R' : 'USB');
		
			switch(status) {
				case 'connected':
					card.classList.add('connected');
					dot.classList.add('connected');
					btn.classList.add('connected');
					if (currentDeviceType === 'ft232r') {
						text.textContent = `✅ FT232R Connected`;
						sub.textContent = `FTDI FT232R • 9600 baud • WebUSB`;
					} else if (currentDeviceType === 'ch340') {
						text.textContent = `✅ CH340 Connected`;
						sub.textContent = `CH340 Serial • 9600 baud • Android Bridge`;
					} else {
						text.textContent = `✅ USB Connected`;
						sub.textContent = `Ready for meter reading`;
					}
					signal.textContent = '● Active';
					signal.style.color = '#00e676';
					btn.textContent = '🔌 DISCONNECT USB';
					break;
					
				case 'reconnecting':
					card.classList.add('reconnecting');
					dot.classList.add('reconnecting');
					btn.classList.add('reconnecting');
					text.textContent = `🔄 Reconnecting ${deviceName}...`;
					sub.textContent = `Attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}`;
					signal.textContent = '● Weak';
					signal.style.color = '#ff9800';
					btn.textContent = '⏳ RECONNECTING...';
					break;
					
				case 'connecting':
					text.textContent = '🔌 Connecting USB...';
					sub.textContent = 'Detecting device type...';
					signal.textContent = '';
					btn.textContent = '⏳ CONNECTING...';
					break;
					
				case 'disconnected':
				default:
					text.textContent = '❌ No USB Device Connected';
					sub.textContent = 'Connect CH340 or FT232R meter';
					signal.textContent = '';
					btn.textContent = '🔌 CONNECT USB';
					break;
			}
		}
		
		// ============================================
		// DATA PROCESSING (Keep existing implementation)
		// ============================================
		function arrayBufferToHex(buffer) {
			const bytes = new Uint8Array(buffer);
			let hex = '';
			for (let i = 0; i < bytes.length; i++) {
				hex += bytes[i].toString(16).padStart(2, '0').toUpperCase();
			}
			return hex;
		}
		
		function processReceivedData(hexData, textData) {
			if (!isServerRunning) {
				// Still log data for debugging even if server not running
				if (hexData && hexData.length > 0) {
					console.log(`Data received but server not running: ${hexData.substring(0, 32)}...`);
				}
				return;
			}
			
			lastDataTime = Date.now();
		
			// Detect request type and show simple status
			if (hexData.includes("935A64")) {
				log('🔄 Connection request received...', 'info');
			} else if (hexData.includes("A041034110") || hexData.includes("A044034110")) {
				log('🔄 Authentication in progress...', 'info');
			} else if (hexData.includes("0100010800")) {
				log('📊 Reading meter clock...', 'info');
			} else if (hexData.includes("0100600100")) {
				log('📊 Reading meter serial...', 'info');
			} else if (hexData.includes("0201020204")) {
				log('📊 Reading billing data...', 'info');
				
				if (!creditDeductedThisSession) {
					const success = deductCredit();
					if (success !== false) {
						creditDeductedThisSession = true;
					}
				}
			} else if (hexData.includes("0100010700") || hexData.includes("0100030700")) {
				log('📊 Reading instant values...', 'info');
			} else if (hexData.includes("5356A2")) {
				log('✅ Reading Complete!', 'success');
				
				try { if (window.Android) Android.vibrate(100); } catch(e) {}
			}
		
			// Process and send response
			const reply = CurrentLogic.processPacket(hexData);
			if (reply) {
				setTimeout(() => {
					if (currentDeviceType === 'ch340') {
						sendCH340Data(reply);
					} else if (currentDeviceType === 'ft232r' && ft232rDevice && ft232rDevice.opened) {
						sendFT232RData(ft232rDevice, reply);
					}
				}, 50);
			}
		}
		
		// ============================================
		// MANUAL DEVICE SELECTION (Optional)
		// ============================================
		async function connectSpecificDevice(deviceType) {
			if (isUsbConnected) {
				disconnectUsb();
			}
			
			if (deviceType === 'ft232r') {
				await connectFT232R();
			} else if (deviceType === 'ch340') {
				connectCH340();
			}
		}
		
		// ============================================
		// AUTO DETECTION ON PAGE LOAD
		// ============================================
		async function autoDetectAndConnect() {
			log('🔍 Auto-detecting USB devices...', 'info');
			
			// Check for FT232R via WebUSB
			if (navigator.usb) {
				try {
					const devices = await navigator.usb.getDevices();
					const ft232rFound = devices.find(device => 
						device.vendorId === parseInt(USB_DEVICES.FT232R.vid, 16) && 
						device.productId === parseInt(USB_DEVICES.FT232R.pid, 16)
					);
					
					if (ft232rFound) {
						log('✅ FT232R already paired, connecting...', 'success');
						await connectFT232R();
						return true;
					}
				} catch(e) {
					console.error('Auto-detect error:', e);
				}
			}
			
			// Check for CH340 via Android Bridge
			if (window.Android && typeof Android.isDeviceConnected === 'function') {
				try {
					const isConnected = Android.isDeviceConnected();
					if (isConnected) {
						log('✅ CH340 detected, connecting...', 'success');
						connectCH340();
						return true;
					}
				} catch(e) {}
			}
			
			log('ℹ️ No USB device detected. Please connect manually.', 'info');
			return false;
		}
    </script>
