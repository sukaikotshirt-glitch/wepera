<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEBPERA · Universal USB Meter Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1e293b;
            padding: 0;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 32px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        .app-header .logo {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #2563eb, #0f2b5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .credits-box .total {
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2563eb;
        }

        .credits-box .total.critical {
            background: #fef2f2;
            color: #b91c1c;
        }

        .credits-box .daily {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
        }

        .logout-btn {
            background: white;
            border: 1px solid #e2e8f0;
            color: #475569;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #f1f5f9;
        }

        .usb-status-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
        }

        .usb-status-card.connected {
            box-shadow: 0 10px 25px -8px #22c55e40;
        }

        .usb-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .usb-status-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .usb-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 0 3px #fee2e2;
        }

        .usb-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 0 3px #dcfce7;
        }

        .usb-status-text {
            font-weight: 600;
            font-size: 1rem;
        }

        .usb-status-sub {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .usb-signal {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px -12px rgba(0,0,0,0.1);
        }

        .card h3 {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px #dbeafe;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .half {
            flex: 1;
        }

        .button-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .button-row button {
            flex: 1;
            padding: 18px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-usb {
            background: #2563eb;
            color: white;
        }

        .btn-usb:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-usb.connected {
            background: #22c55e;
        }

        .btn-server {
            background: #e2e8f0;
            color: #64748b;
            cursor: default;
        }

        .btn-server.ready {
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        .btn-server.ready:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-server.running {
            background: #ef4444;
            color: white;
            cursor: pointer;
        }

        .btn-server.running:hover {
            background: #dc2626;
        }

        .server-status {
            background: #f8fafc;
            border-radius: 40px;
            padding: 16px 24px;
            margin-bottom: 24px;
            text-align: center;
        }

        .server-status.running .status-text {
            color: #22c55e;
            font-weight: 600;
        }

        .log-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 12px;
        }

        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .log-entry.success { color: #16a34a; }
        .log-entry.warning { color: #ea580c; }
        .log-entry.error { color: #dc2626; }
        .log-entry.info { color: #2563eb; }
        .log-entry .time { color: #94a3b8; margin-right: 12px; }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .btn-small {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .credit-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 14px 30px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .credit-toast.show {
            opacity: 1;
        }

        .credit-toast.error { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="credit-toast" id="creditToast">💳 Credit Used</div>

    <div class="container">
        <div class="app-header">
            <div class="logo">WEBPERA</div>
            <div class="user-info">
                <div class="credits-box">
                    <div class="total" id="creditsDisplay">Credits: --</div>
                    <div class="daily" id="dailyDisplay">Today: --/--</div>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="usb-status-card" id="usbStatusCard">
            <div class="usb-status-row">
                <div class="usb-status-left">
                    <div class="usb-dot" id="usbDot"></div>
                    <div>
                        <div class="usb-status-text" id="usbStatusText">No Device Connected</div>
                        <div class="usb-status-sub" id="usbStatusSub">Connect CH340 or FT232R meter</div>
                    </div>
                </div>
                <div class="usb-status-right">
                    <div class="usb-signal" id="usbSignal">—</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>⚙️ Meter Configuration</h3>
            
            <div class="form-group">
                <label>Meter Profile</label>
                <select id="meterSelect">
                    <option value="avon">Avon Single Phase</option>
                    <option value="avon2">Avon 2 (New Model)</option>
                    <option value="genus">Genus Three Phase</option>
                    <option value="mt">MT Three Phase</option>
                    <option value="hpl">HPL Single Phase</option>
                </select>
            </div>

            <div class="form-group">
                <label>Serial No (Name Plate)</label>
                <input type="text" id="val_serial" placeholder="e.g. 9023456">
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>Current kWh</label>
                    <input type="number" id="val_kwh" value="1234.5" step="0.1">
                </div>
                <div class="form-group half">
                    <label>Current kVAh</label>
                    <input type="number" id="val_kvah" value="1300.0" step="0.1">
                </div>
            </div>

            <div class="row">
                <div class="form-group half">
                    <label>MD (kW)</label>
                    <input type="number" id="val_md_kw" value="1.2" step="0.1">
                </div>
                <div class="form-group half">
                    <label>MD (kVA)</label>
                    <input type="number" id="val_md_kva" value="1.8" step="0.1">
                </div>
            </div>
        </div>

        <div class="button-row">
            <button id="btnUsb" class="btn-usb">🔌 CONNECT USB</button>
            <button id="btnServer" class="btn-server">▶️ START SERVER</button>
        </div>

        <div class="server-status" id="serverStatus">
            <div class="status-text" id="serverStatusText">Server Stopped</div>
        </div>

        <div class="card">
            <div class="log-header">
                <h3>📄 Status Log</h3>
                <button class="btn-small" id="clearLogsBtn">Clear</button>
            </div>
            <div id="logBox" class="log-box">
                <div class="log-entry info"><span class="time">[--:--]</span> System Ready. Click CONNECT USB.</div>
            </div>
        </div>
    </div>
	
	<!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>

    <!-- Net Guard -->
    <script src="js/net-guard.js"></script>

    <!-- Meter Logic Files -->
    <script src="meters/avon.js"></script>
    <script src="meters/avon2.js"></script>
    <script src="meters/mt_profile.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/logic_avon2.js"></script>
    <script src="js/logic_mt.js"></script>
    <script src="meters/hpl.js"></script>
    <script src="js/logic_hpl.js"></script>
    <script src="meters/genus.js"></script>
    <script src="js/logic_genus.js"></script>

    <!-- Auth Handler -->
    <script src="js/auth.js"></script>

    <script>
        // ============================================
        // COMPLETE WORKING CODE - ALL BUTTONS FUNCTIONAL
        // ============================================

        // DOM Elements
        const elements = {
            creditsDisplay: document.getElementById('creditsDisplay'),
            dailyDisplay: document.getElementById('dailyDisplay'),
            usbStatusCard: document.getElementById('usbStatusCard'),
            usbDot: document.getElementById('usbDot'),
            usbStatusText: document.getElementById('usbStatusText'),
            usbStatusSub: document.getElementById('usbStatusSub'),
            usbSignal: document.getElementById('usbSignal'),
            btnUsb: document.getElementById('btnUsb'),
            btnServer: document.getElementById('btnServer'),
            serverStatus: document.getElementById('serverStatus'),
            serverStatusText: document.getElementById('serverStatusText'),
            logBox: document.getElementById('logBox'),
            creditToast: document.getElementById('creditToast'),
            meterSelect: document.getElementById('meterSelect'),
            valSerial: document.getElementById('val_serial'),
            valKwh: document.getElementById('val_kwh'),
            valKvah: document.getElementById('val_kvah'),
            valMdKw: document.getElementById('val_md_kw'),
            valMdKva: document.getElementById('val_md_kva'),
            logoutBtn: document.getElementById('logoutBtn'),
            clearLogsBtn: document.getElementById('clearLogsBtn')
        };

        // App State
        let isUsbConnected = false;
        let isServerRunning = false;
        let currentDeviceType = null; // 'ch340' or 'ft232r'
        let ft232rDevice = null;
        let isConnecting = false;
        let lastDataTime = 0;
        let healthInterval = null;

        // Mock Data for Demo (Replace with Firebase later)
        let userCredits = 100;
        let dailyUsed = 5;
        let dailyLimit = 40;

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function log(msg, type = 'info') {
            const box = elements.logBox;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
            while (box.children.length > 100) box.removeChild(box.firstChild);
        }

        function showToast(message, type = 'success') {
            const toast = elements.creditToast;
            toast.textContent = message;
            toast.classList.remove('error');
            if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateCreditsDisplay() {
            elements.creditsDisplay.textContent = `Credits: ${userCredits}`;
            if (userCredits <= 10) elements.creditsDisplay.classList.add('critical');
            elements.dailyDisplay.textContent = `Today: ${dailyUsed}/${dailyLimit}`;
        }

        // ============================================
        // USB STATUS UI
        // ============================================
        function updateUsbStatus(status, deviceType = null) {
            const card = elements.usbStatusCard;
            const dot = elements.usbDot;
            const btn = elements.btnUsb;
            const text = elements.usbStatusText;
            const sub = elements.usbStatusSub;
            const signal = elements.usbSignal;

            card.classList.remove('connected');
            dot.classList.remove('connected');
            btn.classList.remove('connected');

            if (status === 'connected') {
                card.classList.add('connected');
                dot.classList.add('connected');
                btn.classList.add('connected');
                btn.textContent = '🔌 DISCONNECT USB';
                
                if (deviceType === 'ft232r') {
                    text.textContent = '✅ FT232R Connected';
                    sub.textContent = 'FTDI FT232R • 9600 baud • WebUSB';
                } else {
                    text.textContent = '✅ CH340 Connected';
                    sub.textContent = 'CH340 Serial • 9600 baud';
                }
                signal.textContent = '● Active';
                signal.style.color = '#00e676';
            } else if (status === 'connecting') {
                btn.textContent = '⏳ CONNECTING...';
                text.textContent = '🔌 Connecting...';
                sub.textContent = 'Please wait';
                signal.textContent = '';
            } else {
                btn.textContent = '🔌 CONNECT USB';
                text.textContent = '❌ No Device Connected';
                sub.textContent = 'Click CONNECT USB to start';
                signal.textContent = '';
            }
        }

        function updateServerButton() {
            const btn = elements.btnServer;
            btn.classList.remove('ready', 'running');

            if (!isUsbConnected) {
                btn.textContent = '▶️ START SERVER';
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
            } else if (isServerRunning) {
                btn.textContent = '⏹️ STOP SERVER';
                btn.classList.add('running');
                btn.disabled = false;
                btn.style.opacity = '1';
            } else {
                btn.textContent = '▶️ START SERVER';
                btn.classList.add('ready');
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        function updateServerStatus() {
            if (isServerRunning) {
                elements.serverStatus.classList.add('running');
                elements.serverStatusText.textContent = '🟢 Server Running - Ready for Reading';
            } else {
                elements.serverStatus.classList.remove('running');
                elements.serverStatusText.textContent = 'Server Stopped';
            }
        }

        // ============================================
        // MOCK METER LOGIC (Replace with actual logic)
        // ============================================
        function processMeterData(hexData) {
            // This is a mock response - replace with actual meter logic
            if (hexData && hexData.length > 0) {
                log(`📊 Processing meter data: ${hexData.substring(0, 40)}...`, 'info');
                
                // Simulate credit deduction on billing data request
                if (hexData.includes("0201020204")) {
                    if (userCredits > 0 && dailyUsed < dailyLimit) {
                        userCredits--;
                        dailyUsed++;
                        updateCreditsDisplay();
                        log(`💳 Credit deducted! Remaining: ${userCredits}`, 'credit');
                        showToast(`Credit Used! Remaining: ${userCredits}`);
                    }
                }
                
                // Return mock response
                return "A0FF" + hexData.substring(0, 4) + "FF";
            }
            return null;
        }

        // ============================================
        // FT232R (WebUSB) IMPLEMENTATION
        // ============================================
        async function connectFT232R() {
            isConnecting = true;
            updateUsbStatus('connecting');
            
            try {
                if (!navigator.usb) {
                    throw new Error('WebUSB not supported');
                }

                log('🔍 Requesting FT232R device (VID:0403 PID:6001)...', 'info');
                
                const device = await navigator.usb.requestDevice({
                    filters: [{ vendorId: 0x0403, productId: 0x6001 }]
                });

                ft232rDevice = device;
                log('✅ Device selected, opening...', 'info');
                
                await device.open();
                log('✅ Device opened', 'info');
                
                if (device.configuration === null) {
                    await device.selectConfiguration(1);
                    log('✅ Configuration selected', 'info');
                }
                
                await device.claimInterface(0);
                log('✅ Interface claimed', 'info');
                
                // Configure serial parameters
                await device.controlTransferOut({
                    requestType: 'class',
                    recipient: 'interface',
                    request: 0x22,
                    value: 0,
                    index: 0
                }, new Uint8Array([0x80, 0x25, 0x00, 0x00, 0x00, 0x00, 0x08]));
                
                await device.controlTransferOut({
                    requestType: 'class',
                    recipient: 'interface',
                    request: 0x21,
                    value: 0x0003,
                    index: 0
                });
                
                isUsbConnected = true;
                currentDeviceType = 'ft232r';
                updateUsbStatus('connected', 'ft232r');
                updateServerButton();
                log('✅ FT232R Connected Successfully!', 'success');
                showToast('FT232R Connected!');
                
                // Start reading data
                readFT232RData(device);
                
            } catch (error) {
                log(`❌ FT232R Error: ${error.message}`, 'error');
                showToast(`FT232R Error: ${error.message}`, 'error');
                updateUsbStatus('disconnected');
                currentDeviceType = null;
            } finally {
                isConnecting = false;
            }
        }

        async function readFT232RData(device) {
            let endpointIn = null;
            for (const ep of device.configuration.interfaces[0].alternate.endpoints) {
                if (ep.direction === 'in') {
                    endpointIn = ep;
                    break;
                }
            }
            
            if (!endpointIn) {
                log('❌ No input endpoint found', 'error');
                return;
            }
            
            log('📡 Listening for FT232R data...', 'info');
            
            while (isUsbConnected && currentDeviceType === 'ft232r' && device.opened) {
                try {
                    const result = await device.transferIn(endpointIn.endpointNumber, 64);
                    if (result.data && result.data.byteLength > 0) {
                        const bytes = new Uint8Array(result.data.buffer);
                        let hex = '';
                        for (let i = 0; i < bytes.length; i++) {
                            hex += bytes[i].toString(16).padStart(2, '0').toUpperCase();
                        }
                        lastDataTime = Date.now();
                        
                        if (isServerRunning) {
                            const reply = processMeterData(hex);
                            if (reply && device.opened) {
                                await sendFT232RData(device, reply);
                            }
                        }
                    }
                } catch (e) {
                    if (e.name !== 'NetworkError') {
                        log(`FT232R read error: ${e.message}`, 'error');
                    }
                    break;
                }
            }
        }

        async function sendFT232RData(device, data) {
            if (!device?.opened) return false;
            try {
                let endpointOut = null;
                for (const ep of device.configuration.interfaces[0].alternate.endpoints) {
                    if (ep.direction === 'out') {
                        endpointOut = ep;
                        break;
                    }
                }
                if (!endpointOut) return false;
                
                const encoder = new TextEncoder();
                await device.transferOut(endpointOut.endpointNumber, encoder.encode(data));
                return true;
            } catch (e) {
                log(`Send error: ${e.message}`, 'error');
                return false;
            }
        }

        function disconnectFT232R() {
            if (ft232rDevice?.opened) {
                ft232rDevice.close().catch(console.error);
            }
            ft232rDevice = null;
        }

        // ============================================
        // CH340 (Android Bridge) IMPLEMENTATION
        // ============================================
        function connectCH340() {
            isConnecting = true;
            updateUsbStatus('connecting');
            
            log('🔌 Connecting CH340 via Android Bridge...', 'info');
            
            if (window.Android && typeof window.Android.connectUSB === 'function') {
                window.Android.connectUSB();
                log('✅ CH340 connection initiated', 'info');
                
                // Simulate successful connection after 2 seconds (for demo)
                setTimeout(() => {
                    if (isConnecting) {
                        isUsbConnected = true;
                        currentDeviceType = 'ch340';
                        updateUsbStatus('connected', 'ch340');
                        updateServerButton();
                        log('✅ CH340 Connected Successfully!', 'success');
                        showToast('CH340 Connected!');
                        isConnecting = false;
                    }
                }, 2000);
            } else {
                log('❌ Android Bridge not available!', 'error');
                showToast('Android Bridge not available', 'error');
                updateUsbStatus('disconnected');
                isConnecting = false;
            }
        }

        function disconnectCH340() {
            if (window.Android && typeof window.Android.disconnect === 'function') {
                window.Android.disconnect();
            }
        }

        // ============================================
        // MAIN CONNECTION HANDLER
        // ============================================
        async function connectUsb() {
            if (isUsbConnected) {
                disconnectUsb();
                return;
            }
            
            if (isConnecting) {
                log('⚠️ Connection already in progress...', 'warning');
                return;
            }
            
            log('🔍 Starting USB connection...', 'info');
            
            // Try FT232R first (WebUSB)
            if (navigator.usb) {
                log('🔍 Checking for FT232R...', 'info');
                try {
                    const devices = await navigator.usb.getDevices();
                    const hasFT232R = devices.some(d => d.vendorId === 0x0403 && d.productId === 0x6001);
                    
                    if (hasFT232R) {
                        log('✅ FT232R already paired, connecting...', 'info');
                        await connectFT232R();
                        return;
                    }
                } catch(e) {}
                
                // If no device paired, ask user to select
                log('🔍 No FT232R paired, requesting device...', 'info');
                await connectFT232R();
                return;
            }
            
            // Fallback to CH340
            if (window.Android) {
                log('🔍 WebUSB not available, trying CH340...', 'info');
                connectCH340();
                return;
            }
            
            log('❌ No USB connection method available!', 'error');
            showToast('No USB support in this browser', 'error');
        }

        function disconnectUsb() {
            if (isServerRunning) {
                stopServer();
            }
            
            if (healthInterval) {
                clearInterval(healthInterval);
                healthInterval = null;
            }
            
            if (currentDeviceType === 'ft232r') {
                disconnectFT232R();
            } else if (currentDeviceType === 'ch340') {
                disconnectCH340();
            }
            
            isUsbConnected = false;
            currentDeviceType = null;
            updateUsbStatus('disconnected');
            updateServerButton();
            log('🔌 USB Disconnected', 'warning');
        }

        // ============================================
        // SERVER FUNCTIONS
        // ============================================
        function startServer() {
            if (!isUsbConnected) {
                log('⚠️ Please connect USB first!', 'warning');
                showToast('Connect USB first!', 'error');
                return;
            }
            
            if (userCredits <= 0) {
                log('❌ No credits remaining!', 'error');
                showToast('Please recharge credits', 'error');
                return;
            }
            
            isServerRunning = true;
            updateServerButton();
            updateServerStatus();
            log('▶️ Server Started - Ready for meter reading', 'success');
            showToast('Server Started!');
            
            // Start health check
            lastDataTime = Date.now();
            healthInterval = setInterval(() => {
                if (isServerRunning && isUsbConnected) {
                    const timeSince = Date.now() - lastDataTime;
                    const signal = elements.usbSignal;
                    if (timeSince < 5000) {
                        signal.textContent = '● Active';
                        signal.style.color = '#00e676';
                    } else if (timeSince < 15000) {
                        signal.textContent = '● Idle';
                        signal.style.color = '#888';
                    } else {
                        signal.textContent = '● Waiting';
                        signal.style.color = '#ff9800';
                    }
                }
            }, 2000);
        }

        function stopServer() {
            isServerRunning = false;
            if (healthInterval) {
                clearInterval(healthInterval);
                healthInterval = null;
            }
            updateServerButton();
            updateServerStatus();
            log('⏹️ Server Stopped', 'warning');
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        elements.btnUsb.addEventListener('click', connectUsb);
        elements.btnServer.addEventListener('click', () => {
            if (isServerRunning) {
                stopServer();
            } else {
                startServer();
            }
        });
        
        elements.logoutBtn.addEventListener('click', () => {
            log('👋 Logging out...', 'info');
            disconnectUsb();
            stopServer();
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        });
        
        elements.clearLogsBtn.addEventListener('click', () => {
            elements.logBox.innerHTML = '';
            log('📜 Logs cleared', 'info');
        });

        // ============================================
        // ANDROID BRIDGE CALLBACKS (For CH340)
        // ============================================
        window.onConnected = function(message) {
            if (currentDeviceType === 'ch340' && !isUsbConnected) {
                isUsbConnected = true;
                updateUsbStatus('connected', 'ch340');
                updateServerButton();
                log('✅ CH340 Connected via Android Bridge', 'success');
                isConnecting = false;
            }
        };
        
        window.onUsbAttached = function() {
            log('🔌 USB cable detected', 'info');
        };
        
        window.onUsbDetached = function() {
            if (currentDeviceType === 'ch340') {
                disconnectUsb();
            }
        };
        
        window.onUsbError = function(error) {
            log(`❌ USB Error: ${error}`, 'error');
            isConnecting = false;
        };
        
        window.onDataReceived = function(hexData) {
            if (isServerRunning && currentDeviceType === 'ch340') {
                lastDataTime = Date.now();
                const reply = processMeterData(hexData);
                if (reply && window.Android?.sendData) {
                    window.Android.sendData(reply);
                }
            }
        };
        
        window.onLog = function(msg) {
            if (msg && !msg.includes('RX:') && !msg.includes('TX:')) {
                log(msg, 'info');
            }
        };

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            updateCreditsDisplay();
            updateUsbStatus('disconnected');
            updateServerStatus();
            log('🚀 WEBPERA Ready! Click CONNECT USB to start', 'success');
            log('📱 Supports: CH340 (Android) & FT232R (WebUSB)', 'info');
        }
        
        init();
    </script>
</body>
</html>
