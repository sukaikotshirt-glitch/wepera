<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEBPERA · USB Meter Reader (CH340/FTDI)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; color: #1e293b; }
        .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 32px; }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: white; border-radius: 28px; margin-bottom: 24px; box-shadow: 0 8px 20px -6px rgba(0,0,0,0.05); }
        .logo { font-weight: 700; font-size: 1.5rem; background: linear-gradient(135deg, #2563eb, #0f2b5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .credits-box .total { background: #eef2ff; padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; font-weight: 600; color: #2563eb; }
        .logout-btn { background: white; border: 1px solid #e2e8f0; padding: 8px 18px; border-radius: 40px; cursor: pointer; }
        .usb-status-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1); }
        .usb-status-row { display: flex; justify-content: space-between; align-items: center; }
        .usb-status-left { display: flex; align-items: center; gap: 16px; }
        .usb-dot { width: 14px; height: 14px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 0 3px #fee2e2; }
        .usb-dot.connected { background: #22c55e; box-shadow: 0 0 0 3px #dcfce7; }
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 14px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; font-family: 'Inter', sans-serif; }
        .row { display: flex; gap: 16px; }
        .half { flex: 1; }
        .button-row { display: flex; gap: 16px; margin-bottom: 24px; }
        .button-row button { flex: 1; padding: 18px 10px; border-radius: 30px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-usb { background: #2563eb; color: white; }
        .btn-usb.connected { background: #22c55e; }
        .btn-server { background: #e2e8f0; color: #64748b; cursor: default; }
        .btn-server.ready { background: #2563eb; color: white; cursor: pointer; }
        .btn-server.running { background: #ef4444; color: white; cursor: pointer; }
        .log-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 20px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; margin-top: 12px; }
        .log-entry { padding: 6px 0; border-bottom: 1px solid #e2e8f0; }
        .log-entry.success { color: #16a34a; }
        .log-entry.error { color: #dc2626; }
        .log-entry .time { color: #94a3b8; margin-right: 12px; }
        .credit-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: white; padding: 14px 30px; border-radius: 60px; font-weight: 500; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2); z-index: 1000; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .credit-toast.show { opacity: 1; }
        .credit-toast.error { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="credit-toast" id="creditToast">💳 Credit Used</div>
    <div class="container">
        <div class="app-header">
            <div class="logo">WEBPERA</div>
            <div class="user-info">
                <div class="credits-box"><div class="total" id="creditsDisplay">Credits: 100</div></div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="usb-status-card" id="usbStatusCard">
            <div class="usb-status-row">
                <div class="usb-status-left">
                    <div class="usb-dot" id="usbDot"></div>
                    <div><div class="usb-status-text" id="usbStatusText">USB Not Connected</div></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>⚙️ Meter Configuration</h3>
            <div class="form-group"><label>Meter Profile</label>
                <select id="meterSelect">
                    <option value="avon">Avon Single Phase</option>
                    <option value="avon2">Avon 2 (New Model)</option>
                    <option value="genus">Genus Three Phase</option>
                    <option value="mt">MT Three Phase</option>
                    <option value="hpl">HPL Single Phase</option>
                </select>
            </div>
            <div class="form-group"><label>Serial No</label><input type="text" id="val_serial" value="9023456"></div>
            <div class="row"><div class="half"><label>Current kWh</label><input type="number" id="val_kwh" value="1234.5"></div>
            <div class="half"><label>Current kVAh</label><input type="number" id="val_kvah" value="1300.0"></div></div>
        </div>

        <div class="button-row">
            <button id="btnUsb" class="btn-usb" onclick="connectUSB()">🔌 CONNECT USB</button>
            <button id="btnServer" class="btn-server" onclick="toggleServer()">▶️ START SERVER</button>
        </div>

        <div class="card">
            <div class="log-header"><h3>📄 Status Log</h3><button class="btn-small" onclick="clearLogs()">Clear</button></div>
            <div id="logBox" class="log-box"><div class="log-entry"><span class="time">[--:--]</span> System Ready. Click Connect USB.</div></div>
        </div>
    </div>

	<!-- Firebase & scripts (keep as is) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
   <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>

    <!-- Net Guard -->
    <script src="js/net-guard.js"></script>

    <!-- Utils and Logic -->
    <script src="js/utils.js"></script>
    <script src="meters/avon.js"></script>
    <script src="meters/avon2.js"></script>
    <script src="meters/mt_profile.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/logic_avon2.js"></script>
    <script src="js/logic_mt.js"></script>
    <script src="meters/hpl.js"></script>
    <script src="js/logic_hpl.js"></script>
    <script src="meters/genus.js"></script>
    <script src="js/logic_genus.js"></script>

    <!-- Auth Handler -->
    <script src="js/auth.js"></script>


    <script>
        // ========== WEBUSB IMPLEMENTATION (REAL USB CONNECTION) ==========
        let usbDevice = null;
        let usbInterface = null;
        let usbEndpointIn = null;
        let usbEndpointOut = null;
        let isUsbConnected = false;
        let isServerRunning = false;
        let reader = null;
        let keepReading = false;
        let creditDeductedThisSession = false;
        let userCredits = 100;
        let dailyUsed = 0;
        let dailyLimit = 40;

        // CH340 and FTDI USB IDs
        const CH340_VID = 0x1A86;    // 6790 decimal
        const CH340_PID = 0x7523;    // 29987 decimal
        const FTDI_VID = 0x0403;     // 1027 decimal  
        const FTDI_PID = 0x6001;     // 24577 decimal

        function log(msg, type = '') {
            const box = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logBox').innerHTML = '';
            log('Logs cleared', 'info');
        }

        function updateUSBStatus(connected) {
            isUsbConnected = connected;
            const dot = document.getElementById('usbDot');
            const text = document.getElementById('usbStatusText');
            const btn = document.getElementById('btnUsb');
            
            if (connected) {
                dot.classList.add('connected');
                text.textContent = '✅ USB Connected (CH340/FTDI)';
                btn.textContent = '🔌 DISCONNECT USB';
                btn.classList.add('connected');
                btn.setAttribute('onclick', 'disconnectUSB()');
            } else {
                dot.classList.remove('connected');
                text.textContent = '❌ USB Not Connected';
                btn.textContent = '🔌 CONNECT USB';
                btn.classList.remove('connected');
                btn.setAttribute('onclick', 'connectUSB()');
            }
        }

        async function connectUSB() {
            log('🔍 Searching for CH340 or FTDI device...', 'info');
            
            try {
                // Request device with both CH340 and FTDI filters
                usbDevice = await navigator.usb.requestDevice({
                    filters: [
                        { vendorId: CH340_VID, productId: CH340_PID },  // CH340
                        { vendorId: FTDI_VID, productId: FTDI_PID }      // FTDI
                    ]
                });
                
                log(`✅ Device found: ${usbDevice.productName || 'USB Serial Adapter'}`, 'success');
                
                await usbDevice.open();
                
                // Select configuration
                if (usbDevice.configuration === null) {
                    await usbDevice.selectConfiguration(1);
                }
                
                // Find the correct interface (usually index 0 or 1 for serial)
                usbInterface = usbDevice.configuration.interfaces.find(iface => 
                    iface.alternates.some(alt => alt.interfaceClass === 0xFF || alt.interfaceClass === 0x02)
                );
                
                if (!usbInterface) {
                    usbInterface = usbDevice.configuration.interfaces[0];
                }
                
                const interfaceNumber = usbInterface.interfaceNumber;
                await usbDevice.claimInterface(interfaceNumber);
                
                // Find endpoints
                const alt = usbInterface.alternates[0];
                usbEndpointIn = alt.endpoints.find(ep => ep.direction === 'in');
                usbEndpointOut = alt.endpoints.find(ep => ep.direction === 'out');
                
                if (!usbEndpointIn || !usbEndpointOut) {
                    throw new Error('Required endpoints not found');
                }
                
                log(`📡 Interface ${interfaceNumber} claimed`, 'success');
                log(`⬇️ IN endpoint: ${usbEndpointIn.endpointNumber} | ⬆️ OUT endpoint: ${usbEndpointOut.endpointNumber}`, 'info');
                
                updateUSBStatus(true);
                
                // Start reading data
                startReading();
                
                // Configure serial parameters (baud rate 9600 for meter)
                await configureSerial(9600);
                
                log('📊 USB Serial ready at 9600 baud', 'success');
                
            } catch (error) {
                log(`❌ Connection failed: ${error.message}`, 'error');
                console.error(error);
                updateUSBStatus(false);
            }
        }

        async function configureSerial(baudRate) {
            if (!usbDevice) return;
            
            try {
                // CH340 specific control transfer for baud rate
                // Standard USB CDC ACM control transfer
                const BAUD_RATE_COMMAND = 0x20; // SET_LINE_CODING
                const lineCoding = new ArrayBuffer(7);
                const view = new DataView(lineCoding);
                view.setUint32(0, baudRate, true);  // baud rate
                view.setUint8(4, 0);  // stop bits (1)
                view.setUint8(5, 0);  // parity (none)
                view.setUint8(6, 8);  // data bits (8)
                
                await usbDevice.controlTransferOut({
                    requestType: 'class',
                    recipient: 'interface',
                    request: BAUD_RATE_COMMAND,
                    value: 0,
                    index: 0
                }, lineCoding);
                
                log(`⚙️ Baud rate set to ${baudRate}`, 'info');
            } catch (err) {
                log(`⚠️ Baud rate config warning: ${err.message}`, 'warning');
            }
        }

        async function startReading() {
            keepReading = true;
            
            while (keepReading && usbDevice && isUsbConnected) {
                try {
                    const result = await usbDevice.transferIn(usbEndpointIn.endpointNumber, 64);
                    
                    if (result.data && result.data.byteLength > 0) {
                        const bytes = new Uint8Array(result.data.buffer);
                        const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
                        
                        if (hex.length > 0) {
                            onDataReceived(hex);
                        }
                    }
                } catch (error) {
                    if (keepReading) {
                        log(`⚠️ Read error: ${error.message}`, 'error');
                    }
                    break;
                }
                
                await new Promise(resolve => setTimeout(resolve, 10));
            }
        }

        async function sendUSBData(hexData) {
            if (!usbDevice || !isUsbConnected || !usbEndpointOut) {
                log('❌ Cannot send: USB not connected', 'error');
                return false;
            }
            
            try {
                // Convert hex string to bytes
                const bytes = new Uint8Array(hexData.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                await usbDevice.transferOut(usbEndpointOut.endpointNumber, bytes);
                log(`📤 TX: ${hexData.substring(0, 40)}${hexData.length > 40 ? '...' : ''}`, 'info');
                return true;
            } catch (error) {
                log(`❌ Send failed: ${error.message}`, 'error');
                return false;
            }
        }

        async function disconnectUSB() {
            keepReading = false;
            
            if (usbInterface && usbDevice) {
                try {
                    await usbDevice.releaseInterface(usbInterface.interfaceNumber);
                } catch(e) {}
            }
            
            if (usbDevice) {
                try {
                    await usbDevice.close();
                } catch(e) {}
            }
            
            usbDevice = null;
            usbInterface = null;
            usbEndpointIn = null;
            usbEndpointOut = null;
            isServerRunning = false;
            updateUSBStatus(false);
            updateServerButton();
            log('🔌 USB Disconnected', 'warning');
        }

        // ========== METER LOGIC (Simplified but functional) ==========
        function processPacket(hexData) {
            // Simulate meter response based on request type
            if (hexData.includes("0201020204")) {
                // Billing data request - deduct credit
                if (!creditDeductedThisSession) {
                    deductCredit();
                    creditDeductedThisSession = true;
                }
                // Return simulated meter data
                return "A0FF0102030405060708090A0B0C0D0E0F";
            }
            
            if (hexData.includes("0100010800")) {
                // Clock read request
                return "A0FF" + new Date().getTime().toString(16).substring(0, 16);
            }
            
            if (hexData.includes("0100600100")) {
                // Serial number request
                const serial = document.getElementById('val_serial').value || "9023456";
                return "A0FF" + Array.from(serial).map(c => c.charCodeAt(0).toString(16)).join('').substring(0, 20);
            }
            
            return null;
        }

        function onDataReceived(hexData) {
            if (!isServerRunning) return;
            
            // Log received data (shortened)
            if (hexData.includes("0201020204")) {
                log('📊 Billing data request received - processing...', 'info');
                deductCredit();
            } else if (hexData.includes("5356A2")) {
                log('✅ Reading Complete!', 'success');
            } else if (hexData.length > 4) {
                log(`📥 RX: ${hexData.substring(0, 30)}${hexData.length > 30 ? '...' : ''}`, 'info');
            }
            
            const reply = processPacket(hexData);
            if (reply) {
                setTimeout(() => sendUSBData(reply), 50);
            }
        }

        // ========== CREDIT SYSTEM ==========
        function updateCreditsDisplay() {
            document.getElementById('creditsDisplay').textContent = `Credits: ${userCredits}`;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('creditToast');
            toast.textContent = message;
            toast.classList.toggle('error', type === 'error');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function deductCredit() {
            if (userCredits <= 0) {
                log('❌ Credits exhausted!', 'error');
                showToast('Credits exhausted!', 'error');
                return false;
            }
            
            if (dailyUsed >= dailyLimit) {
                log('❌ Daily limit reached!', 'error');
                showToast('Daily limit reached!', 'error');
                return false;
            }
            
            userCredits--;
            dailyUsed++;
            updateCreditsDisplay();
            log(`💳 Credit deducted | Today: ${dailyUsed}/${dailyLimit} | Remaining: ${userCredits}`, 'credit');
            showToast(`💳 Credit used! Remaining: ${userCredits}`);
            return true;
        }

        function logout() {
            disconnectUSB();
            window.location.href = 'index.html';
        }

        // ========== SERVER CONTROLS ==========
        function toggleServer() {
            if (!isUsbConnected) {
                log('⚠️ Please connect USB first!', 'warning');
                showToast('Connect USB first!', 'error');
                return;
            }
            
            isServerRunning = !isServerRunning;
            updateServerButton();
            
            if (isServerRunning) {
                creditDeductedThisSession = false;
                log('▶️ Server Started - Waiting for meter reading...', 'success');
            } else {
                log('⏹️ Server Stopped', 'warning');
            }
        }

        function updateServerButton() {
            const btn = document.getElementById('btnServer');
            if (!isUsbConnected) {
                btn.textContent = '▶️ START SERVER';
                btn.classList.remove('ready', 'running');
                btn.classList.add('btn-server');
            } else if (isServerRunning) {
                btn.textContent = '⏹️ STOP SERVER';
                btn.classList.remove('ready');
                btn.classList.add('running');
            } else {
                btn.textContent = '▶️ START SERVER';
                btn.classList.remove('running');
                btn.classList.add('ready');
            }
        }

        // Check WebUSB support
        if (!navigator.usb) {
            log('❌ WebUSB not supported! Please use Chrome/Edge browser.', 'error');
            document.getElementById('btnUsb').disabled = true;
            document.getElementById('btnUsb').style.opacity = '0.5';
        } else {
            log('✅ WebUSB supported. Click Connect USB and select your CH340/FTDI device.', 'success');
        }
    </script>
</body>
</html>
