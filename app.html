<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEBPERA · Universal USB Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1e293b;
            padding: 0;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 32px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .app-header .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2563eb, #0f2b5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .credits-box .total {
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2563eb;
            border: 1px solid #dbeafe;
            display: inline-block;
        }

        .credits-box .total.critical {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #fecaca;
        }

        .credits-box .daily {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
        }

        .logout-btn {
            background: white;
            border: 1px solid #e2e8f0;
            color: #475569;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #f1f5f9;
        }

        .usb-status-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .usb-status-card.connected {
            box-shadow: 0 10px 25px -8px #22c55e40;
        }

        .usb-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .usb-status-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .usb-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 0 3px #fee2e2;
        }

        .usb-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 0 3px #dcfce7;
        }

        .usb-dot.reconnecting {
            background: #f97316;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 3px #ffedd5; }
            50% { box-shadow: 0 0 0 6px #ffedd5; opacity: 0.7; }
        }

        .usb-status-text {
            font-weight: 600;
            font-size: 1rem;
        }

        .usb-status-sub {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .usb-signal {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px -12px rgba(0,0,0,0.1);
        }

        .card h3 {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.15s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 4px #dbeafe;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .half {
            flex: 1;
        }

        .button-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .button-row button {
            flex: 1;
            padding: 18px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-usb {
            background: #2563eb;
            color: white;
            box-shadow: 0 12px 20px -14px #2563eb;
        }

        .btn-usb.connected {
            background: #22c55e;
        }

        .btn-usb.reconnecting {
            background: #f97316;
            animation: softBlink 1.2s infinite;
        }

        @keyframes softBlink {
            0% { opacity: 1; }
            50% { opacity: 0.8; background: #fb923c; }
        }

        .btn-server {
            background: #e2e8f0;
            color: #64748b;
            cursor: default;
        }

        .btn-server.ready {
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        .btn-server.running {
            background: #ef4444;
            color: white;
            cursor: pointer;
        }

        .server-status {
            background: #f8fafc;
            border-radius: 40px;
            padding: 16px 24px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .server-status.running .status-text {
            color: #22c55e;
            font-weight: 600;
        }

        .log-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Menlo', monospace;
            font-size: 0.8rem;
            margin-top: 12px;
        }

        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .log-entry.success { color: #16a34a; }
        .log-entry.warning { color: #ea580c; }
        .log-entry.error { color: #dc2626; }
        .log-entry.info { color: #2563eb; }
        .log-entry.credit { color: #16a34a; font-weight: 600; }
        .log-entry .time { color: #94a3b8; margin-right: 12px; }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .btn-small {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .credit-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 14px 30px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .credit-toast.show { opacity: 1; }
        .credit-toast.error { background: #ef4444; color: white; }
        
        .blackout {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .blackout.active { display: flex; }
    </style>
</head>
<body>
    <div class="blackout" id="blackout">
        <div class="blackout-msg">📡 No Internet Connection</div>
        <div class="blackout-sub">Please connect to continue</div>
    </div>
    <div class="credit-toast" id="creditToast">💳 Credit Used</div>

    <div class="container">
        <div class="app-header">
            <div class="logo">WEBPERA</div>
            <div class="user-info">
                <div class="credits-box">
                    <div class="total" id="creditsDisplay">Credits: --</div>
                    <div class="daily" id="dailyDisplay">Today: --/--</div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="usb-status-card" id="usbStatusCard">
            <div class="usb-status-row">
                <div class="usb-status-left">
                    <div class="usb-dot" id="usbDot"></div>
                    <div>
                        <div class="usb-status-text" id="usbStatusText">USB Not Connected</div>
                        <div class="usb-status-sub" id="usbStatusSub">Connect USB cable (CH340/FTDI)</div>
                    </div>
                </div>
                <div class="usb-status-right">
                    <div class="usb-signal" id="usbSignal">—</div>
                </div>
            </div>
        </div>

        <div class="card" id="configPanel">
            <h3>⚙️ Meter Configuration</h3>
            <div class="form-group">
                <label>Meter Profile</label>
                <select id="meterSelect">
                    <option value="avon">Avon Single Phase</option>
                    <option value="avon2">Avon 2 (New Model)</option>
                    <option value="genus">Genus Three Phase</option>
                    <option value="mt">MT Three Phase</option>
                    <option value="hpl">HPL Single Phase</option>
                </select>
            </div>
            <div class="form-group">
                <label>Serial No (Name Plate)</label>
                <input type="text" id="val_serial" placeholder="e.g. 9023456">
            </div>
            <div class="row">
                <div class="form-group half">
                    <label>Current kWh</label>
                    <input type="number" id="val_kwh" value="1234.5" step="0.1">
                </div>
                <div class="form-group half">
                    <label>Current kVAh</label>
                    <input type="number" id="val_kvah" value="1300.0" step="0.1">
                </div>
            </div>
            <div class="row">
                <div class="form-group half">
                    <label>MD (kW)</label>
                    <input type="number" id="val_md_kw" value="1.2" step="0.1">
                </div>
                <div class="form-group half">
                    <label>MD (kVA)</label>
                    <input type="number" id="val_md_kva" value="1.8" step="0.1">
                </div>
            </div>
        </div>

        <div class="button-row">
            <button id="btnUsb" class="btn-usb" onclick="toggleUsb()">🔌 CONNECT USB</button>
            <button id="btnServer" class="btn-server" onclick="toggleServer()">▶️ START SERVER</button>
        </div>

        <div class="server-status" id="serverStatus">
            <div class="status-text" id="serverStatusText">Server Stopped</div>
        </div>

        <div class="card">
            <div class="log-header">
                <h3>📄 Status Log</h3>
                <button class="btn-small" onclick="clearLogs()">Clear</button>
            </div>
            <div id="logBox" class="log-box">
                <div class="log-entry info"><span class="time">[--:--]</span> Universal USB Bridge Ready (CH340 + FTDI)</div>
            </div>
        </div>
    </div>

    <!-- Firebase & scripts (keep as is) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
   <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>

    <!-- Net Guard -->
    <script src="js/net-guard.js"></script>

    <!-- Utils and Logic -->
    <script src="js/utils.js"></script>
    <script src="meters/avon.js"></script>
    <script src="meters/avon2.js"></script>
    <script src="meters/mt_profile.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/logic_avon2.js"></script>
    <script src="js/logic_mt.js"></script>
    <script src="meters/hpl.js"></script>
    <script src="js/logic_hpl.js"></script>
    <script src="meters/genus.js"></script>
    <script src="js/logic_genus.js"></script>

    <!-- Auth Handler -->
    <script src="js/auth.js"></script>
    
    <script> 
        // ----------------------------- MOCK LOGIC (Minimal but complete) ----------------------
        const Logic = {
            uiValues: { serial: "", kwh: 0, kvah: 0, md_kw: 0, md_kva: 0 },
            init: function() {},
            processPacket: function(hex) {
                // Basic response simulation for meter reading
                if (hex.includes("0201020204")) return "A0FF0210";  // billing ack
                if (hex.includes("0100010700")) return "A0FF0310";
                if (hex.includes("0100600100")) return "A0FF0410";
                return null;
            }
        };
        const Logic_Avon2 = Logic, Logic_HPL = Logic, Logic_Genus = Logic, Logic_MT = Logic;
        
        // ----------------------------- APP STATE --------------------------------------------
        let isUsbConnected = false;
        let isServerRunning = false;
        let isReconnecting = false;
        let currentUser = null;
        let userCredits = 100;    // demo credits
        let dailyLimit = 40;
        let dailyUsed = 0;
        let creditDeductedThisSession = false;
        let lastDataTime = 0;
        let usbHealthInterval = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT = 3;
        let CurrentLogic = Logic;
        
        // Auth mock (skip real for demo but keep logout flow)
        const auth = { currentUser: { uid: "demo" }, onAuthStateChanged: (cb) => cb({ uid: "demo" }), signOut: () => { window.location.href = 'index.html'; } };
        const db = { collection: () => ({ doc: () => ({ get: async () => ({ exists: true, data: () => ({ credits: 100, dailyLimit: 40, dailyUsed: 0, lastResetDate: "" }) }), update: async () => {} }) }) };
        
        // Override with real Firebase if available, else safe mock
        if (typeof firebase !== 'undefined' && firebase.initializeApp) {
            try { firebase.initializeApp(firebaseConfig); } catch(e) {}
            const realAuth = firebase.auth();
            const realDb = firebase.firestore();
            auth.onAuthStateChanged = realAuth.onAuthStateChanged.bind(realAuth);
            auth.signOut = realAuth.signOut.bind(realAuth);
            window.auth = realAuth;
            window.db = realDb;
        }
        
        // Helper functions
        function log(msg, type = '') {
            const box = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
            while(box.children.length > 100) box.removeChild(box.firstChild);
        }
        
        function showToast(msg, type='success') {
            const toast = document.getElementById('creditToast');
            toast.textContent = msg;
            toast.classList.remove('error');
            if(type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        function updateCreditsDisplay() {
            const totalEl = document.getElementById('creditsDisplay');
            totalEl.textContent = `Credits: ${userCredits}`;
            if(userCredits <= 10) totalEl.classList.add('critical');
            document.getElementById('dailyDisplay').textContent = `Today: ${dailyUsed}/${dailyLimit}`;
        }
        
        async function deductCredit() {
            if(creditDeductedThisSession) return false;
            if(userCredits <= 0 || dailyUsed >= dailyLimit) {
                showToast(userCredits <= 0 ? "Subscription Expired" : "Daily limit reached", 'error');
                return false;
            }
            userCredits--;
            dailyUsed++;
            updateCreditsDisplay();
            creditDeductedThisSession = true;
            showToast(`💳 Credit Used | Today: ${dailyUsed}/${dailyLimit} | Left: ${userCredits}`);
            log(`💳 Credit deducted. Remaining: ${userCredits}`, 'credit');
            if(userCredits <= 0) setTimeout(() => logout(), 1500);
            return true;
        }
        
        function updateUsbStatus(status) {
            const card = document.getElementById('usbStatusCard');
            const dot = document.getElementById('usbDot');
            const text = document.getElementById('usbStatusText');
            const sub = document.getElementById('usbStatusSub');
            const signal = document.getElementById('usbSignal');
            const btn = document.getElementById('btnUsb');
            card.classList.remove('connected', 'reconnecting');
            dot.classList.remove('connected', 'reconnecting');
            btn.classList.remove('connected', 'reconnecting');
            if(status === 'connected') {
                card.classList.add('connected'); dot.classList.add('connected'); btn.classList.add('connected');
                text.textContent = '✅ USB Connected'; sub.textContent = 'CH340 / FTDI • 9600 baud';
                signal.textContent = '● Active'; signal.style.color = '#00e676';
                btn.textContent = '🔌 DISCONNECT USB';
            } else if(status === 'reconnecting') {
                card.classList.add('reconnecting'); dot.classList.add('reconnecting'); btn.classList.add('reconnecting');
                text.textContent = '🔄 Reconnecting...'; sub.textContent = `Attempt ${reconnectAttempts}/${MAX_RECONNECT}`;
                signal.textContent = '● Retry'; signal.style.color = '#ff9800';
                btn.textContent = '⏳ RECONNECTING...';
            } else if(status === 'connecting') {
                text.textContent = '🔌 Connecting...'; sub.textContent = 'Probing CH340 & FTDI';
                btn.textContent = '⏳ CONNECTING...';
            } else {
                text.textContent = '❌ USB Not Connected'; sub.textContent = 'Connect USB cable (CH340/FTDI)';
                btn.textContent = '🔌 CONNECT USB';
                signal.textContent = '—';
            }
        }
        
        // ========== UNIVERSAL USB BRIDGE - CH340 + FTDI DUAL SUPPORT ==========
        function connectUsb() {
            if(isUsbConnected) return;
            log('🔌 Initiating USB connection: detecting CH340 & FTDI...', 'info');
            updateUsbStatus('connecting');
            
            // Use Android WebView interface if available
            if(typeof Android !== 'undefined' && Android.connectUSB) {
                // Step 1: Try CH340 (VID: 6790, PID: 29987)
                try {
                    log('📟 Attempting CH340 (VID:0x1A86, PID:0x7523)', 'info');
                    Android.connectUSB(6790, 29987);  // CH340 classic
                } catch(e) { log('CH340 init error', 'error'); }
                
                // Step 2: Fallback to FTDI after short delay if not connected
                setTimeout(() => {
                    if(!isUsbConnected && typeof Android.connectUSB === 'function') {
                        log('🔁 Trying FTDI (VID:0x0403, PID:0x6001)', 'warning');
                        try {
                            Android.connectUSB(0x0403, 0x6001);  // FTDI FT232
                        } catch(e) { log('FTDI connection error', 'error'); }
                    }
                }, 1000);
            } else {
                log('❌ Android bridge missing - ensure WebView USB API available', 'error');
                updateUsbStatus('disconnected');
                showToast('USB Bridge not available', 'error');
            }
        }
        
        function disconnectUsb() {
            if(isServerRunning) stopServer();
            if(usbHealthInterval) clearInterval(usbHealthInterval);
            try { if(typeof Android !== 'undefined' && Android.disconnect) Android.disconnect(); } catch(e) {}
            isUsbConnected = false;
            isReconnecting = false;
            reconnectAttempts = 0;
            updateUsbStatus('disconnected');
            updateServerButton();
            log('🔌 USB disconnected', 'warning');
        }
        
        function attemptReconnect() {
            if(reconnectAttempts >= MAX_RECONNECT) {
                log('❌ Auto-reconnect failed, manual intervention required', 'error');
                isReconnecting = false;
                reconnectAttempts = 0;
                updateUsbStatus('disconnected');
                return;
            }
            reconnectAttempts++;
            isReconnecting = true;
            updateUsbStatus('reconnecting');
            log(`🔄 Auto-reconnect attempt ${reconnectAttempts}/${MAX_RECONNECT}`, 'warning');
            setTimeout(() => {
                if(typeof Android !== 'undefined' && Android.connectUSB) {
                    try { Android.connectUSB(6790, 29987); } catch(e) { setTimeout(attemptReconnect, 2000); }
                    setTimeout(() => { if(!isUsbConnected) attemptReconnect(); }, 1800);
                } else { attemptReconnect(); }
            }, 1000);
        }
        
        function startUsbHealth() {
            if(usbHealthInterval) clearInterval(usbHealthInterval);
            lastDataTime = Date.now();
            usbHealthInterval = setInterval(() => {
                if(!isUsbConnected || !isServerRunning) return;
                const idle = Date.now() - lastDataTime;
                const signalEl = document.getElementById('usbSignal');
                if(idle < 5000) { signalEl.textContent = '● Active'; signalEl.style.color = '#00e676'; }
                else if(idle < 15000) { signalEl.textContent = '● Idle'; signalEl.style.color = '#888'; }
                else { signalEl.textContent = '● Waiting'; signalEl.style.color = '#ff9800'; }
            }, 2000);
        }
        
        // ========== SERVER CONTROLS ==========
        function toggleServer() {
            if(!isUsbConnected) { log('⚠️ Connect USB first', 'warning'); showToast('Connect USB first', 'error'); return; }
            if(isServerRunning) stopServer();
            else startServer();
        }
        
        function startServer() {
            if(userCredits <= 0 || dailyUsed >= dailyLimit) {
                showToast(userCredits <=0 ? "No credits" : "Daily limit", 'error');
                return;
            }
            creditDeductedThisSession = false;
            const meter = document.getElementById('meterSelect').value;
            if(meter === 'avon') CurrentLogic = Logic;
            else if(meter === 'avon2') CurrentLogic = Logic_Avon2;
            else if(meter === 'hpl') CurrentLogic = Logic_HPL;
            else if(meter === 'genus') CurrentLogic = Logic_Genus;
            else CurrentLogic = Logic_MT;
            CurrentLogic.init?.();
            CurrentLogic.uiValues = {
                serial: document.getElementById('val_serial').value || "0000000",
                kwh: parseFloat(document.getElementById('val_kwh').value) || 0,
                kvah: parseFloat(document.getElementById('val_kvah').value) || 0,
                md_kw: parseFloat(document.getElementById('val_md_kw').value) || 0,
                md_kva: parseFloat(document.getElementById('val_md_kva').value) || 0
            };
            isServerRunning = true;
            updateServerButton();
            document.getElementById('serverStatus').classList.add('running');
            document.getElementById('serverStatusText').textContent = '🟢 Server Running - Ready for Reading';
            document.querySelectorAll('#configPanel input, #configPanel select').forEach(el => el.disabled = true);
            startUsbHealth();
            log(`▶️ Server started (${meter.toUpperCase()})`, 'success');
        }
        
        function stopServer() {
            isServerRunning = false;
            creditDeductedThisSession = false;
            if(usbHealthInterval) clearInterval(usbHealthInterval);
            updateServerButton();
            document.getElementById('serverStatus').classList.remove('running');
            document.getElementById('serverStatusText').textContent = 'Server Stopped';
            document.querySelectorAll('#configPanel input, #configPanel select').forEach(el => el.disabled = false);
            log('⏹️ Server stopped', 'warning');
        }
        
        function updateServerButton() {
            const btn = document.getElementById('btnServer');
            btn.classList.remove('ready', 'running');
            if(!isUsbConnected) btn.textContent = '▶️ START SERVER';
            else if(isServerRunning) { btn.textContent = '⏹️ STOP SERVER'; btn.classList.add('running'); }
            else { btn.textContent = '▶️ START SERVER'; btn.classList.add('ready'); }
        }
        
        function toggleUsb() {
            if(isReconnecting) { log('Reconnection in progress', 'warning'); return; }
            if(isUsbConnected) disconnectUsb();
            else connectUsb();
        }
        
        function clearLogs() {
            document.getElementById('logBox').innerHTML = '';
            log('Logs cleared', 'info');
        }
        
        async function logout() {
            if(usbHealthInterval) clearInterval(usbHealthInterval);
            try { if(window.auth && window.auth.signOut) await window.auth.signOut(); } catch(e) {}
            window.location.href = 'index.html';
        }
        
        // ========== ANDROID BRIDGE CALLBACKS (called from native WebView) ==========
        window.onConnected = function(message) {
            isUsbConnected = true;
            isReconnecting = false;
            reconnectAttempts = 0;
            updateUsbStatus('connected');
            updateServerButton();
            log('✅ USB bridge established: ' + (message || 'CH340/FTDI active'), 'success');
            if(typeof Android !== 'undefined' && Android.vibrate) Android.vibrate(80);
        };
        
        window.onUsbAttached = function() {
            log('🔌 USB hardware detected', 'info');
            setTimeout(() => { if(!isUsbConnected) connectUsb(); }, 300);
        };
        
        window.onUsbDetached = function() {
            log('⚠️ USB cable removed', 'error');
            const wasRunning = isServerRunning;
            isUsbConnected = false;
            if(wasRunning) stopServer();
            updateUsbStatus('disconnected');
            updateServerButton();
            if(usbHealthInterval) clearInterval(usbHealthInterval);
            showToast('USB disconnected', 'error');
        };
        
        window.onUsbError = function(err) {
            log(`❌ USB error: ${err}`, 'error');
            if(isUsbConnected && !isReconnecting) {
                isUsbConnected = false;
                attemptReconnect();
            } else if(!isUsbConnected && !isReconnecting && reconnectAttempts === 0) {
                updateUsbStatus('disconnected');
                showToast('USB connection failed', 'error');
            }
        };
        
        window.onUsbPermissionDenied = function() {
            log('❌ USB permission denied', 'error');
            showToast('USB access denied', 'error');
            updateUsbStatus('disconnected');
        };
        
        window.onDataReceived = function(hexData) {
            if(!isServerRunning) return;
            lastDataTime = Date.now();
            // Optional logs for specific commands
            if(hexData.includes("0201020204")) {
                if(!creditDeductedThisSession) deductCredit();
                log('📊 Billing data request - credit applied', 'info');
            } else if(hexData.includes("0100010700")) log('📊 Instant values request', 'info');
            else if(hexData.includes("5356A2")) log('✅ Reading cycle complete', 'success');
            
            const reply = CurrentLogic.processPacket(hexData);
            if(reply && typeof Android !== 'undefined' && Android.sendData) {
                setTimeout(() => { try { Android.sendData(reply); } catch(e) { log('TX error', 'error'); } }, 30);
            }
        };
        
        window.onLog = function(msg) {
            if(msg && !msg.includes("RX:") && !msg.includes("TX:")) log(msg.substring(0, 100), 'info');
        };
        
        // net guard mock
        window.initNetGuard = function() {
            setInterval(() => {
                if(!navigator.onLine) document.getElementById('blackout').classList.add('active');
                else document.getElementById('blackout').classList.remove('active');
            }, 2000);
        };
        
        // ========== INIT ==========
        window.onload = function() {
            CurrentLogic = Logic;
            updateUsbStatus('disconnected');
            updateServerButton();
            document.getElementById('serverStatusText').textContent = 'Server Stopped';
            updateCreditsDisplay();
            initNetGuard();
            log('🚀 WEBPERA Universal Bridge Active (CH340 + FTDI ready)', 'success');
            log('📲 Connect your USB meter (supports CH340 / FTDI chips)', 'info');
            // Auto-attempt if USB already attached
            setTimeout(() => { if(typeof Android !== 'undefined' && Android.isDeviceAttached) { onUsbAttached(); } }, 500);
        };
    </script>
</body>
</html>
